<!-- ======================= home/import.html v2.4.0 =======================
     Wijziging v2.4.0:
     - padding-top: 100px toegevoegd aan main — ruimte voor sticky TopBar + Navbar
     - Volledige inline commentaar toegevoegd op elke coderegel

     Wijziging v2.3.0 (sessie 25):
     - i18next geïntegreerd: laadvolgorde scripts in <head> toegevoegd
     - i18nModule.init() + loadNamespace('import') toegevoegd
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded() geladen
     - Alle tekst vervangen door data-i18n="import:*" attributen
     - Custom file input gebouwd: native input verborgen, eigen knop + span
       zodat "Kies bestand" en "Geen bestand geselecteerd" vertaalbaar zijn
     - <title> dynamisch gezet via i18nModule

     Wijziging v2.2.0 (sessie 25):
     - Eerste i18n refactor

     Wijziging v2.1.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("import") toegevoegd in fetch-scriptblok

     Wijziging v2.0.3 (F5-04):
     - AccessGuard toegevoegd: alleen owner mag importeren
     - shareModule.js + accessGuard.js toegevoegd aan laadvolgorde

     Scripts: supabase → utils.js → auth.js → siteAnalytics.js →
              i18n init → [TopBar fetch → topbar.js] → schema.js →
              storage.js → shareModule.js → accessGuard.js → import.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">                                                  <!-- Tekencodering instellen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive weergave -->
    <title>Import</title>                                                   <!-- Wordt overschreven door i18n na init -->

    <!-- ======================= FAVICON ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">                         <!-- Standaard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">        <!-- PNG favicon 32px -->
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">        <!-- iOS homescreen icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">    <!-- Android homescreen icon -->

    <!-- ======================= GLOBALE CSS ======================= -->
    <link rel="stylesheet" href="../css/style.css">                         <!-- Globale stijlen inclusief sticky header -->

    <!-- ======================= I18NEXT CDN — VOLGORDE KRITISCH =======================
         Regel voor elke pagina: deze 4 scripts altijd in <head>, vóór alle andere JS.
         Reden: i18nModule.init() moet klaar zijn vóór fetch van TopBar/Navbar/Footer,
         zodat buildLanguageSwitcher() de <select> vindt na injectie.
         ============================================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>                                               <!-- i18next core bibliotheek -->
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>                        <!-- HTTP back-end plugin — laadt JSON bestanden via fetch -->
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script> <!-- Language detector — leest navigator / localStorage / cookie -->
    <script src="/MyFamTreeCollab/js/i18n.js"></script>                     <!-- Eigen i18n module -->

    <!-- ======================= PAGINA-SPECIFIEKE STIJLEN ======================= -->
    <style>

        /* ── Tijdelijk: ruimte voor sticky TopBar + Navbar ──
           Verwijderen zodra style.css v1.0.7 live is         */
        main {
            padding-top: 150px; /* 35px topbar + ~56px navbar + 9px marge */
        }

        /* ── Welkomstblok: introductietekst bovenaan pagina ── */
        .welkom-blok { margin-bottom: 24px; }                               /* Ruimte onder het blok */
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; } /* Paginatitel stijl */
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }         /* Introtekst stijl */

        /* ── Import sectie: uploadkaart ── */
        .import-sectie {
            border: 1px solid #ddd;     /* Lichte rand */
            border-radius: 6px;         /* Afgeronde hoeken */
            padding: 24px;              /* Interne marge */
            margin-bottom: 20px;        /* Ruimte onder de kaart */
            background: #fafafa;        /* Lichte achtergrond */
            max-width: 560px;           /* Maximale breedte */
        }
        .import-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 6px 0; color: #333; } /* Sectietitel */
        .import-sectie .subtitel { font-size: 0.88rem; color: #888; margin: 0 0 18px 0; }           /* Ondertitel */
        .import-sectie p  { font-size: 0.9rem; color: #555; line-height: 1.6; margin: 0 0 16px 0; } /* Paragraaf stijl */

        /* ── Custom file input: verbergt native browser input ── */
        #importFile {
            display: none;              /* Native file picker volledig verborgen */
        }

        /* ── Custom file input rij: knop + bestandsnaam naast elkaar ── */
        .custom-file-wrapper {
            display: flex;              /* Horizontale flex layout */
            align-items: center;        /* Verticaal uitlijnen */
            gap: 12px;                  /* Ruimte tussen knop en naam */
            margin-bottom: 16px;        /* Ruimte onder de rij */
        }

        /* ── Kies bestand knop: triggert de verborgen native input ── */
        .knop-kies-bestand {
            padding: 8px 16px;          /* Klikruimte */
            background: #6c757d;        /* Grijze achtergrond */
            color: #fff;                /* Witte tekst */
            border: none;               /* Geen rand */
            border-radius: 4px;         /* Afgeronde hoeken */
            font-size: 0.9rem;          /* Leesbare tekstgrootte */
            font-weight: bold;          /* Vetgedrukt */
            cursor: pointer;            /* Pointer cursor */
            white-space: nowrap;        /* Tekst niet afbreken */
        }
        .knop-kies-bestand:hover { background: #5a6268; }                   /* Donkerder grijs bij hover */

        /* ── Bestandsnaam span: toont naam of "Geen bestand geselecteerd" ── */
        #bestandsnaam {
            font-size: 0.9rem;          /* Leesbare tekstgrootte */
            color: #666;                /* Grijze tekst */
            overflow: hidden;           /* Lange namen afkappen */
            text-overflow: ellipsis;    /* Ellipsis bij overflow */
            white-space: nowrap;        /* Geen regelomloop */
        }

        /* ── Import knop: start het importproces ── */
        .knop-import {
            padding: 10px 24px;         /* Klikruimte */
            background: #1E90FF;        /* Blauwe achtergrond */
            color: #fff;                /* Witte tekst */
            border: none;               /* Geen rand */
            border-radius: 5px;         /* Afgeronde hoeken */
            font-size: 0.95rem;         /* Leesbare tekstgrootte */
            font-weight: bold;          /* Vetgedrukt */
            cursor: pointer;            /* Pointer cursor */
        }
        .knop-import:hover { background: #1278d4; }                         /* Donkerder blauw bij hover */

        /* ── Import status: feedback na import poging ── */
        #importStatus { font-size: 0.9rem; margin-top: 12px; }             /* Kleine tekst met ruimte boven */

        /* ── Info blok: uitleg over ondersteunde formaten ── */
        .info-blok {
            max-width: 560px;           /* Maximale breedte */
            background: #eef4fb;        /* Lichtblauwe achtergrond */
            border-left: 4px solid #1E90FF; /* Blauwe linkerrand */
            border-radius: 0 6px 6px 0; /* Rechter hoeken afgerond */
            padding: 14px 18px;         /* Interne marge */
            font-size: 0.88rem;         /* Iets kleiner dan bodytekst */
            color: #333;                /* Donkergrijze tekst */
            line-height: 1.7;           /* Ruime regelafstand */
        }
        .info-blok strong { color: #004080; }                               /* Donkerblauwe nadruk */

    </style>
</head>
<body>

    <!-- ======================= TOPBAR ======================= -->
    <div id="topbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= NAVBAR ======================= -->
    <div id="navbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= PAGINA-INHOUD ======================= -->
    <main>
        <div class="container">                                             <!-- Centreert inhoud binnen main -->

            <!-- ── WELKOM ── Introductietekst bovenaan de pagina ── -->
            <div class="welkom-blok">
                <h1 data-i18n="import:welcome.heading"></h1>               <!-- Paginatitel via i18n -->
                <p  data-i18n="import:welcome.intro"></p>                  <!-- Introtekst via i18n -->
            </div>

            <!-- ── IMPORT FORMULIER ── Uploadkaart met bestandskiezer ── -->
            <div class="import-sectie">
                <h2 data-i18n="import:form.heading"></h2>                  <!-- Sectietitel via i18n -->
                <p class="subtitel" data-i18n="import:form.subtitle"></p>  <!-- Ondertitel via i18n -->

                <!-- Native input verborgen — wordt getriggerd via knop hieronder -->
                <input type="file" id="importFile" accept=".csv,.txt">     <!-- Verborgen native file picker -->

                <!-- Custom file input: eigen knop + bestandsnaam span -->
                <div class="custom-file-wrapper">
                    <button type="button"
                            class="knop-kies-bestand"
                            id="kiesBestandBtn"
                            data-i18n="import:file.button">Kies bestand</button>   <!-- Triggert verborgen native input -->
                    <span id="bestandsnaam"
                          data-i18n="import:file.noFile">Geen bestand geselecteerd</span> <!-- Toont bestandsnaam na selectie -->
                </div>

                <!-- Import knop — start verwerking via import.js -->
                <button id="importBtn"
                        class="knop-import"
                        data-i18n="import:form.button"></button>           <!-- Knoptekst via i18n -->

                <!-- Status feedback — ingevuld door import.js -->
                <p id="importStatus"></p>                                  <!-- Leeg tot import gestart is -->
            </div>

            <!-- ── INFO BLOK ── Uitleg ondersteunde formaten ── -->
            <div class="info-blok">
                <strong data-i18n="import:info.heading"></strong><br>      <!-- Koptekst via i18n -->
                <span data-i18n="import:info.line1"></span><br>            <!-- Regel 1 via i18n -->
                <span data-i18n="import:info.line2"></span><br>            <!-- Regel 2 via i18n -->
                <span data-i18n="import:info.line3"></span><br>            <!-- Regel 3 via i18n -->
                <span data-i18n="import:info.line4"></span>                <!-- Regel 4 via i18n -->
            </div>

        </div>
    </main>

    <!-- ======================= FOOTER ======================= -->
    <div id="footer-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= EXTERNE SCRIPTS ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase SDK -->
    <script src="../js/utils.js"></script>                                  <!-- Utilities -->
    <script src="../js/auth.js"></script>                                   <!-- Authenticatie module -->
    <script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>            <!-- Bezoektracking — na auth.js zodat tier beschikbaar is -->

    <!-- ======================= INITIALISATIE ======================= -->
    <script>

        // ── i18n initialiseren ──
        // Moet als eerste — vóór de fetch calls — zodat vertalingen
        // klaar zijn op het moment dat componenten worden geïnjecteerd
        i18nModule.init().then(function () {

            i18nModule.loadNamespace('import');                             // Import namespace laden na common
            document.title = i18nModule.t('import:page.title');            // Paginatitel instellen via i18n

            // ── TopBar laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/TopBar.html')                   // TopBar HTML ophalen
                .then(r => r.text())                                        // Response naar tekst converteren
                .then(function (html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('topbar-placeholder')
                    );
                    var s = document.createElement('script');              // Script element aanmaken
                    s.src = '../js/topbar.js';                             // Pad naar topbar.js
                    document.body.appendChild(s);                          // Aan DOM toevoegen om laden te starten
                });

            // ── Navbar laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/Navbar.html')                   // Navbar HTML ophalen
                .then(r => r.text())                                        // Response naar tekst converteren
                .then(function (html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('navbar-placeholder')
                    );
                });

            // ── Footer laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/Footer.html')                   // Footer HTML ophalen
                .then(r => r.text())                                        // Response naar tekst converteren
                .then(function (html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('footer-placeholder')
                    );
                });

        });

        // Pagina tracking — buiten i18n init zodat het niets blokkeert
        SiteAnalytics.trackPage("import");                                 // Bezoek registreren in Supabase page_visits tabel

    </script>

    <!-- ======================= DOMEIN SCRIPTS ======================= -->
    <script src="../js/schema.js"></script>                                 <!-- Schema definities -->
    <script src="../js/storage.js"></script>                                <!-- Lokale opslag module -->
    <script src="../js/shareModule.js"></script>                            <!-- Vereist door accessGuard.js -->
    <script src="../js/accessGuard.js"></script>                            <!-- Rolcheck: alleen owner -->
    <script src="../js/import.js"></script>                                 <!-- Import logica -->

    <!-- ======================= CUSTOM FILE INPUT + ROLCHECK ======================= -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            var kiesBtn     = document.getElementById('kiesBestandBtn');   // Eigen kies-knop ophalen
            var nativeInput = document.getElementById('importFile');       // Verborgen native input ophalen
            var naamSpan    = document.getElementById('bestandsnaam');     // Bestandsnaam span ophalen

            // Klik op eigen knop → opent de verborgen native file picker
            kiesBtn.addEventListener('click', function () {
                nativeInput.click();                                        // Native file dialog openen
            });

            // Na bestandsselectie: toon bestandsnaam of reset naar standaardtekst
            nativeInput.addEventListener('change', function () {
                if (nativeInput.files.length > 0) {
                    naamSpan.textContent = i18nModule.t('import:file.selected') + nativeInput.files[0].name; // Bestandsnaam tonen
                    naamSpan.removeAttribute('data-i18n');                 // Key verwijderen zodat i18n dit niet overschrijft
                } else {
                    naamSpan.textContent = i18nModule.t('import:file.noFile'); // Reset naar standaardtekst
                    naamSpan.setAttribute('data-i18n', 'import:file.noFile'); // Key herstellen voor taalwissel
                }
            });

            // Rolcheck: alleen owner mag importeren
            window.AccessGuard.check([]);                                  // Lege array: alleen owner wordt doorgelaten
        });
    </script>

</body>
</html>
