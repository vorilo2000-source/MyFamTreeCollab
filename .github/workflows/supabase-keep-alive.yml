# ==============================================================================
# File: .github/workflows/supabase-keep-alive.yml
# Version: 1.2.0
# Description: Prevents Supabase project from being paused due to inactivity.
#              Runs at randomized times across the week to avoid a predictable
#              pattern. Each trigger sends a lightweight REST ping to Supabase.
# ==============================================================================

name: Supabase Keep Alive

on:
  # Multiple randomized triggers spread across the week
  # Monday 07:17, Wednesday 14:43, Friday 09:31, Sunday 21:08
  schedule:
    - cron: "17 7 * * 1"
    - cron: "43 14 * * 3"
    - cron: "31 9 * * 5"
    - cron: "8 21 * * 0"

  # Allow manual trigger via GitHub Actions UI
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ENDPOINT="${SUPABASE_URL}/rest/v1/page_visits?select=id&limit=1"

          RESPONSE=$(curl --silent --show-error \
            --write-out "%{http_code}" \
            --output /tmp/curl_body.txt \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${ENDPOINT}")

          echo "Supabase response status: $RESPONSE"

          if [[ "$RESPONSE" -lt 200 || "$RESPONSE" -ge 300 ]]; then
            echo "ERROR: Unexpected response code $RESPONSE"
            cat /tmp/curl_body.txt
            exit 1
          fi

          echo "Supabase ping successful."
