name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets presence
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret is empty or not set"
            exit 1
          else
            echo "SUPABASE_URL is set (length: ${#SUPABASE_URL})"
          fi

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY secret is empty or not set"
            exit 1
          else
            echo "SUPABASE_ANON_KEY is set (length: ${#SUPABASE_ANON_KEY})"
          fi

      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ENDPOINT="${SUPABASE_URL}/rest/v1/page_visits?select=id&limit=1"
          echo "Endpoint length: ${#ENDPOINT}"

          RESPONSE=$(curl --silent --show-error \
            --write-out "%{http_code}" \
            --output /tmp/curl_body.txt \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${ENDPOINT}")

          echo "Supabase response status: $RESPONSE"
          echo "Supabase response body:"
          cat /tmp/curl_body.txt

          if [[ "$RESPONSE" -lt 200 || "$RESPONSE" -ge 300 ]]; then
            echo "ERROR: Unexpected response code $RESPONSE"
            exit 1
          fi

          echo "Supabase ping successful."
