<!-- ======================= home/confirm.html v1.3.0 =======================
     Wijziging v1.3.0 (sessie 26):
     - i18n geïntegreerd: i18next scripts + i18n.js toegevoegd aan <head>
     - Alle statische en dynamische teksten via i18nModule.t('auth:confirm.*')
     - TopBar via i18nModule.onComponentLoaded()

     v1.2.0: Authorization header verwijderd uit notifyAdmin()
     v1.1.0: notificatie-mail naar admin na succesvolle bevestiging
     v1.0.0: Nieuwe pagina — verwerkt Supabase email bevestiging
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Paginatitel wordt via JS gezet na i18n init -->
    <title>E-mail bevestigen — MyFamTreeCollab</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

    <!-- ======================= i18next bibliotheken ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="js/i18n.js"></script>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .confirm-wrap {
            max-width: 480px;
            margin: 80px auto;
            padding: 40px 32px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            text-align: center;
        }
        .confirm-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
        .confirm-wrap h1 { font-size: 1.5rem; margin-bottom: 12px; color: #222; }
        .confirm-msg { color: #555; line-height: 1.6; margin-bottom: 24px; }
        .confirm-wrap.success { border-color: #28a745; }
        .confirm-wrap.success .confirm-icon::after { content: "✅"; }
        .confirm-wrap.error   { border-color: #dc3545; }
        .confirm-wrap.error   .confirm-icon::after { content: "❌"; }
        .confirm-wrap.loading .confirm-icon::after { content: "⏳"; }
        .btn-primary {
            background: #1E90FF; color: #fff; padding: 12px 26px;
            border-radius: 6px; text-decoration: none;
            font-weight: bold; display: inline-block;
        }
        .btn-primary:hover { background: #1278d4; }
    </style>
</head>
<body>

<!-- ======================= TopBar placeholder ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Bevestiging blok ======================= -->
<!-- Teksten worden via JS ingevuld na i18n init -->
<div class="confirm-wrap loading" id="confirmBox">
    <span class="confirm-icon" id="confirmIcon"></span>
    <h1 id="confirmTitle"></h1>
    <p class="confirm-msg" id="confirmMsg"></p>
    <div id="confirmAction"></div>
</div>

<!-- ======================= Footer placeholder ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= Scripts ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>

<script>
// ======================= i18n initialisatie =======================
i18nModule.init()
    .then(function () { return i18nModule.loadNamespace('auth'); })
    .then(function () {

    // Paginatitel vertalen
    document.title = i18nModule.t('auth:confirm.pageTitle');

    // Laad TopBar en activeer i18n + topbar.js
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
            var s = document.createElement('script');
            s.src = 'js/topbar.js';
            document.body.appendChild(s);
        });

    // Laad Footer en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
        });

    // ======================= DOM elementen =======================
    var SUPABASE_URL = "https://oihzuwlcgyyeuhghjahp.supabase.co";
    var box    = document.getElementById('confirmBox');
    var title  = document.getElementById('confirmTitle');
    var msg    = document.getElementById('confirmMsg');
    var action = document.getElementById('confirmAction');

    // Laadtekst tonen via i18n
    title.textContent = i18nModule.t('auth:confirm.loadingTitle');
    msg.textContent   = i18nModule.t('auth:confirm.loadingMsg');

    // ======================= notifyAdmin(email) =======================
    async function notifyAdmin(email) {
        try {
            await fetch(SUPABASE_URL + '/functions/v1/dynamic-responder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
        } catch (e) {
            console.warn('[confirm] notifyAdmin fout (niet kritiek):', e);
        }
    }

    // ======================= Toon succes — via i18n =======================
    function showSuccess() {
        box.className     = 'confirm-wrap success';
        title.textContent = i18nModule.t('auth:confirm.successTitle');
        msg.textContent   = i18nModule.t('auth:confirm.successMsg');
        action.innerHTML  =
            '<a href="/MyFamTreeCollab/home/index.html" class="btn-primary">' +
            i18nModule.t('auth:confirm.successBtn') + '</a>';
        setTimeout(function () {
            window.location.href = '/MyFamTreeCollab/home/index.html';
        }, 3000);
    }

    // ======================= Toon fout — via i18n =======================
    function showError(errMsg) {
        box.className     = 'confirm-wrap error';
        title.textContent = i18nModule.t('auth:confirm.errorTitle');
        msg.textContent   = errMsg || i18nModule.t('auth:confirm.errorDefault');
        action.innerHTML  =
            '<a href="/MyFamTreeCollab/home/register.html" class="btn-primary">' +
            i18nModule.t('auth:confirm.errorBtn') + '</a>';
    }

    // ======================= URL parameters =======================
    var params    = new URLSearchParams(window.location.search);
    var tokenHash = params.get('token_hash');
    var type      = params.get('type');

    if (!tokenHash || !type) {
        showError(i18nModule.t('auth:confirm.invalidLink')); // Vertaald
        return;
    }

    // ======================= Supabase verifyOtp =======================
    (async function () {
        var client = AuthModule.getClient();
        var result = await client.auth.verifyOtp({
            token_hash: tokenHash,
            type:       type
        });

        if (result.error) {
            showError(result.error.message);
            return;
        }

        var email = result.data.user ? result.data.user.email : '';
        await notifyAdmin(email);
        showSuccess();
    })();

}); // einde i18n.then()
</script>

</body>
</html>
