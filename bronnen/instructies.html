<!-- ======================= bronnen/instructies.html v0.2.0 =======================
     consistente opmaak, facelift — Navbar + TopBar + 'komt binnenkort' blok,
     geen aparte header meer, script.js verwijderd. Login + Favicon / App-icoon toegevoegd

     Wijziging v0.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("instructies") toegevoegd in fetch-scriptblok
     - Dubbele Supabase/utils/auth script-blokken bovenaan opgeruimd
     - Padverwijzing /js/ gecorrigeerd naar ../js/
     - Navbar placeholder ID gecorrigeerd naar navbar-placeholder (was Navbar-placeholder)
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructies</title>
        
    <!-- ======================= Favicon ======================= -->
     <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico"> <!-- Verwijst naar ico in img map -->
     <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png"> <!-- 32x32 variant -->
     <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png"> <!-- Apple icon -->
     <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        /* ======================= BINNENKORT BLOK ======================= */
        .binnenkort-blok {                                                 /* Centraal informatieblok */
            max-width: 520px;                                              /* Niet te breed */
            margin: 0 auto;                                                /* Horizontaal centreren */
            text-align: center;                                            /* Tekst centreren */
            padding: 48px 24px;                                            /* Ruimte rondom de inhoud */
        }
        .binnenkort-blok .icoon { font-size: 3rem; margin-bottom: 16px; } /* Groot icoon boven de tekst */
        .binnenkort-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 12px 0; color: #222; }
        .binnenkort-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0 0 24px 0; }
        .knop-home {                                                       /* Knop terug naar home */
            display: inline-block; padding: 10px 24px;
            background: #1E90FF; color: #fff; text-decoration: none;
            border-radius: 5px; font-size: 0.95rem; font-weight: bold;
        }
        .knop-home:hover { background: #1278d4; }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="binnenkort-blok">
        <div class="icoon">📚</div>                                        <!-- Instructies icoon -->
        <h1>Instructies</h1>
        <p>
            De instructie pagina is momenteel in ontwikkeling.<br>
            Binnenkort kun je hier je stamboom instructies bekijken.
        </p>
        <a href="/MyFamTreeCollab/" class="knop-home">Terug naar Home</a>
    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — volgorde is verplicht:
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     4. siteAnalytics.js   — bezoektracking, na auth.js
     5. TopBar fetch        — laadt TopBar HTML, daarna topbar.js
     6. Navbar fetch        — onafhankelijk, mag parallel
     7. Footer fetch
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: SiteAnalytics — na auth.js zodat tier beschikbaar is -->

<script>
    // Stap 1: TopBar HTML laden, daarna PAS topbar.js injecteren
    // Dit garandeert dat #top-auth in de DOM zit vóór topbar.js initialiseert
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;
            // #top-auth bestaat nu — veilig om topbar.js te laden
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });

    // Stap 2: Navbar laden — geen auth-afhankelijkheid, mag parallel
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            var ph = document.getElementById('navbar-placeholder');
            if (ph) ph.innerHTML = data;
        });

    // Stap 3: Footer laden
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;
        });

    // Pagina tracking — na fetch-calls zodat een fout hier niets blokkeert
    SiteAnalytics.trackPage("instructies"); // Bezoek registreren in Supabase page_visits tabel
</script>

</body>
</html>
