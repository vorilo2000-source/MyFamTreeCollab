     Wijziging v0.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("evenement") toegevoegd in fetch-scriptblok
     - Dubbele Supabase/utils/auth script-blokken bovenaan opgeruimd
     - Padverwijzing /js/ gecorrigeerd naar ../js/
     - Navbar placeholder ID gecorrigeerd naar navbar-placeholder
     - Favicon paden gecorrigeerd naar /MyFamTreeCollab/img/
     ============================================================ -->

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tijdelijk niet beschikbaar</title>

       <!-- ======================= Favicon ======================= -->
     <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico"> <!-- Verwijst naar ico in img map -->
     <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png"> <!-- 32x32 variant -->
     <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png"> <!-- Apple icon -->
     <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
</head>
    
<body>
<header>
    <h1>Mijn Website</h1>
</header>

<main style="text-align:center; padding:4rem;">
    <h2>Pagina tijdelijk niet bereikbaar</h2>
    <p>Deze pagina is momenteel in ontwikkeling of tijdelijk niet beschikbaar.</p>
    <p>Onze excuses voor het ongemak.</p>
    <p>U wordt automatisch doorgestuurd naar de homepage in <span id="countdown">5</span> seconden...</p>
    <br>
    <a href="https://vorilo2000-source.github.io/MyFamTreeCollab/index.html" class="btn">Ga direct naar Home</a>
</main>

<script>
    // Aftelling instellen
    let countdown = 5; // seconden
    const countdownElement = document.getElementById('countdown');

    const interval = setInterval(() => {
        countdown--;
        countdownElement.textContent = countdown;
        if (countdown <= 0) {
            clearInterval(interval);
            window.location.href = 'https://vorilo2000-source.github.io/MyFamTreeCollab/index.html';
        }
    }, 1000);
    
</script>
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — volgorde is verplicht:
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     6. Pagina-scripts      — altijd als laatste
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: SiteAnalytics — na auth.js zodat tier beschikbaar is -->
    
<script>
 // Stap Footer laden
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;
        });

    // Pagina tracking — na fetch-calls zodat een fout hier niets blokkeert
    SiteAnalytics.trackPage("maintenance"); // Bezoek registreren in Supabase page_visits tabel
</script>

</body>
</html>
