<!-- ======================= stamboom/timeline.html v2.2.0 =======================
     Tijdlijnpagina: visualiseert personen op een horizontale tijdas via HTML5 Canvas
     Wijziging v2.2.0: sticky generatiekolom
     - #timelineContainer gesplitst in #tlStickyCol (sticky links) + #tlScrollArea (canvas)
     - Bij horizontaal scrollen blijft de generatiekolom zichtbaar aan de linkerkant
     Wijziging v2.1.0: canvas-rendering vervangen DOM-nodes, container aangepast,
                       tooltip-overlay toegevoegd, welkomstblok behouden
     v2.1.1 Login + Favicon / App-icoon
     Scripts: utils.js → schema.js → storage.js → LiveSearch.js → relatieEngine.js → timeline.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tijdlijn</title>

    <!-- ===== Favicon / App-icoon ===== -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/timeline.css">
    <style>
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 20px; }
        #sandboxSearch {
            width: 50%;
            padding: 9px 12px;
            font-size: 1rem;
            border: 1px solid #bbb;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #sandboxSearch:focus {
            outline: none;
            border-color: #1E90FF;
        }

        /* ======================= TIJDLIJN BUITENSTE WRAPPER ======================= */
        /* overflow-x: auto zit hier zodat sticky werkt binnen de scrollbare context  */
        #timelineContainer {
            position: relative;            /* Ankerpunt voor tooltip */
            display: flex;                 /* Sticky kolom + canvas naast elkaar */
            flex-direction: row;           /* Horizontale layout */
            align-items: stretch;          /* Beide kolommen even hoog */
            overflow-x: auto;              /* Horizontale scroll op de hele container */
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            min-height: 120px;
        }

        /* ======================= STICKY GENERATIEKOLOM ======================= */
        /* Blijft zichtbaar aan de linkerkant bij horizontaal scrollen             */
        #tlStickyCol {
            position: sticky;              /* Plakt aan de linkerkant bij scrollen */
            left: 0;                       /* Altijd zichtbaar aan linkerzijde */
            width: 155px;                  /* Zelfde breedte als LABEL_COL_W in timeline.js */
            flex-shrink: 0;               /* Kolom mag niet krimpen */
            background: rgba(248,248,248,0.97); /* Lichte achtergrond — dekt canvas af */
            border-right: 1px solid #e0e0e0;   /* Scheidingslijn tussen kolom en canvas */
            z-index: 20;                   /* Boven het canvas zodat labels altijd zichtbaar zijn */
            font-family: sans-serif;
            font-size: 10px;
            color: #666;
            overflow: hidden;              /* Labels die buiten de kolom vallen worden afgekapt */
            pointer-events: none;          /* Klikken gaan door naar canvas */
        }

        /* ======================= SCROLL GEBIED (canvas) ======================= */
        #tlScrollArea {
            position: relative;            /* Ankerpunt voor absoluut gepositioneerde tooltip */
            flex: 1;                       /* Neemt resterende breedte in */
            min-width: 0;                  /* Voorkomt dat flex-child buiten container groeit */
        }

        /* ======================= CANVAS ======================= */
        #timelineCanvas {
            display: block;                /* Geen inline witruimte onder canvas */
            cursor: default;
        }

        /* ======================= PLACEHOLDER TEKST ======================= */
        #timelinePlaceholder {
            padding: 40px 20px;
            text-align: center;
            color: #999;
            font-size: 0.95rem;
        }

        /* ======================= TOOLTIP ======================= */
        #timelineTooltip {
            position: absolute;            /* Zweeft boven canvas, relatief aan #tlScrollArea */
            pointer-events: none;
            background: rgba(30, 30, 30, 0.92);
            color: #fff;
            font-size: 0.82rem;
            line-height: 1.5;
            padding: 8px 12px;
            border-radius: 5px;
            white-space: pre-line;
            max-width: 240px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => {
        const ph = document.getElementById('Navbar-placeholder');
        if (ph) ph.innerHTML = data;
    });
</script>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="container">

        <!-- ======================= Welkomstblok ======================= -->
        <div class="welkom-blok">
            <h1>Welkom bij je stamboom Tijdlijn</h1>
            <p>
                Zoek een persoon op om de tijdlijn van zijn of haar familie te bekijken.
                Elke persoon wordt weergegeven als een horizontale balk van geboorte tot overlijden,
                gegroepeerd per generatie.
            </p>
        </div>

        <!-- ======================= Zoekbalk ======================= -->
        <div class="zoek-sectie">
            <input type="text" id="sandboxSearch" placeholder="Zoek op naam, ID of geboortedatum...">
        </div>

        <!-- ======================= Tijdlijn container ======================= -->
        <div id="timelineContainer">

            <!-- Sticky generatiekolom: blijft zichtbaar bij horizontaal scrollen -->
            <!-- timeline.js vult deze kolom met generatielabels via updateGenLabels() -->
            <div id="tlStickyCol"></div>

            <!-- Scrollgebied: bevat canvas en tooltip -->
            <div id="tlScrollArea">

                <!-- Placeholder: zichtbaar zolang geen persoon geselecteerd is -->
                <div id="timelinePlaceholder">Zoek een persoon om de tijdlijn te laden.</div>

                <!-- Canvas: timeline.js tekent hier de balkjes en tijdas -->
                <canvas id="timelineCanvas" style="display: none;"></canvas>

                <!-- Tooltip: wordt door timeline.js gepositioneerd op hover -->
                <div id="timelineTooltip"></div>

            </div>

        </div>

    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — volgorde is verplicht:
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     4. TopBar fetch        — laadt TopBar HTML, daarna topbar.js
     5. Navbar fetch        — onafhankelijk, mag parallel
     6. Pagina-scripts      — altijd als laatste
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>

<script>
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });

    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('navbar-placeholder').innerHTML = data;
        });

    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

<!-- ======================= Scripts (volgorde verplicht) ======================= -->
<script src="../js/utils.js"></script>
<script src="../js/schema.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/LiveSearch.js"></script>
<script src="../js/relatieEngine.js"></script>
<script src="../js/timeline.js"></script>

</body>
</html>
