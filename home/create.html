<!-- ======================= home/create.html v2.3.0 =======================
     Wijziging v2.3.0:
     - padding-top: 100px toegevoegd aan main — ruimte voor sticky TopBar + Navbar
     - Volledige inline commentaar toegevoegd op elke coderegel

     Wijziging v2.2.0 (sessie 25):
     - i18next geïntegreerd: laadvolgorde scripts in <head> toegevoegd
     - i18nModule.init() + loadNamespace('create') toegevoegd
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded() geladen
     - Alle tekst vervangen door data-i18n="create:*" attributen
     - Placeholders via data-i18n="[placeholder]create:*"
     - Select opties vertaald via data-i18n
     - <title> dynamisch gezet via i18nModule

     Wijziging v2.1.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("create") toegevoegd in fetch-scriptblok

     Wijziging v2.0.2 (F5-04):
     - AccessGuard toegevoegd: alleen owner mag nieuwe stamboom aanmaken

     Scripts laadvolgorde: supabase → utils.js → auth.js → siteAnalytics.js →
                           i18n init → [TopBar fetch → topbar.js] → schema.js →
                           idGenerator.js → storage.js → shareModule.js →
                           accessGuard.js → create.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">                                                  <!-- Tekencodering instellen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive weergave -->
    <title>Nieuwe Stamboom</title>                                          <!-- Wordt overschreven door i18n na init -->

    <!-- ======================= FAVICON ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">                         <!-- Standaard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">        <!-- PNG favicon 32px -->
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">        <!-- iOS homescreen icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">    <!-- Android homescreen icon -->

    <!-- ======================= GLOBALE CSS ======================= -->
    <link rel="stylesheet" href="../css/style.css">                         <!-- Globale stijlen inclusief sticky header -->

    <!-- ======================= I18NEXT CDN — VOLGORDE KRITISCH =======================
         Regel voor elke pagina: deze 4 scripts altijd in <head>, vóór alle andere JS.
         Reden: i18nModule.init() moet klaar zijn vóór fetch van TopBar/Navbar/Footer,
         zodat buildLanguageSwitcher() de <select> vindt na injectie.
         ============================================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>                                               <!-- i18next core bibliotheek -->
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>                        <!-- HTTP back-end plugin — laadt JSON bestanden via fetch -->
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script> <!-- Language detector — leest navigator / localStorage / cookie -->
    <script src="/MyFamTreeCollab/js/i18n.js"></script>                     <!-- Eigen i18n module -->

    <!-- ======================= PAGINA-SPECIFIEKE STIJLEN ======================= -->
    <style>

        /* ── Tijdelijk: ruimte voor sticky TopBar + Navbar ──
           Verwijderen zodra style.css v1.0.7 live is         */
        main {
            padding-top: 100px; /* 35px topbar + ~56px navbar + 9px marge */
        }

        /* ── Welkomstblok: introductietekst bovenaan pagina ── */
        .welkom-blok { margin-bottom: 24px; }                               /* Ruimte onder het blok */
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; } /* Paginatitel stijl */
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }         /* Introtekst stijl */

        /* ── Formulier sectie: invoerkaart ── */
        .formulier-sectie {
            border: 1px solid #ddd;     /* Lichte rand */
            border-radius: 6px;         /* Afgeronde hoeken */
            padding: 24px;              /* Interne marge */
            margin-bottom: 20px;        /* Ruimte onder de kaart */
            background: #fafafa;        /* Lichte achtergrond */
            max-width: 560px;           /* Maximale breedte */
        }
        .formulier-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 6px 0; color: #333; } /* Sectietitel */
        .formulier-sectie .subtitel { font-size: 0.88rem; color: #888; margin: 0 0 20px 0; }           /* Ondertitel */

        /* ── Veld rijen: horizontale invoervelden ── */
        .veld-rij { display: flex; gap: 12px; margin-bottom: 14px; }        /* Flex rij met ruimte tussen velden */
        .veld { flex: 1; display: flex; flex-direction: column; gap: 4px; } /* Enkel veld: label + input gestapeld */
        .veld label { font-size: 0.88rem; font-weight: bold; color: #444; } /* Label stijl */
        .veld input, .veld select {
            padding: 7px 9px;           /* Interne marge */
            border: 1px solid #ccc;     /* Lichte rand */
            border-radius: 4px;         /* Afgeronde hoeken */
            font-size: 0.95rem;         /* Leesbare tekstgrootte */
            background: #fff;           /* Witte achtergrond */
            width: 100%;                /* Volledige breedte */
            box-sizing: border-box;     /* Padding meegeteld in breedte */
        }
        .veld input:focus, .veld select:focus { outline: none; border-color: #1E90FF; } /* Blauwe rand bij focus */

        /* ── Opslaan knop ── */
        .knop-opslaan {
            padding: 10px 24px;         /* Klikruimte */
            background: #1E90FF;        /* Blauwe achtergrond */
            color: #fff;                /* Witte tekst */
            border: none;               /* Geen rand */
            border-radius: 5px;         /* Afgeronde hoeken */
            font-size: 0.95rem;         /* Leesbare tekstgrootte */
            font-weight: bold;          /* Vetgedrukt */
            cursor: pointer;            /* Pointer cursor */
            margin-top: 6px;            /* Ruimte boven de knop */
        }
        .knop-opslaan:hover { background: #1278d4; }                        /* Donkerder blauw bij hover */

        /* ── Bevestigen knop ── */
        .knop-bevestigen {
            padding: 10px 24px;         /* Klikruimte */
            background: #28a745;        /* Groene achtergrond */
            color: #fff;                /* Witte tekst */
            border: none;               /* Geen rand */
            border-radius: 5px;         /* Afgeronde hoeken */
            font-size: 0.95rem;         /* Leesbare tekstgrootte */
            font-weight: bold;          /* Vetgedrukt */
            cursor: pointer;            /* Pointer cursor */
            margin-top: 12px;           /* Ruimte boven de knop */
        }
        .knop-bevestigen:hover { background: #218838; }                     /* Donkerder groen bij hover */

        /* ── Preview sectie: toont ingevoerde data vóór opslaan ── */
        .preview-sectie {
            display: none;              /* Standaard verborgen — zichtbaar na submit */
            border: 1px solid #ddd;     /* Lichte rand */
            border-radius: 6px;         /* Afgeronde hoeken */
            padding: 20px 24px;         /* Interne marge */
            margin-bottom: 20px;        /* Ruimte onder de kaart */
            background: #fafafa;        /* Lichte achtergrond */
            max-width: 560px;           /* Maximale breedte */
        }
        .preview-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 12px 0; color: #333; } /* Sectietitel */
        .preview-sectie pre {
            background: #f0f0f0;        /* Lichtgrijze achtergrond */
            border-radius: 4px;         /* Afgeronde hoeken */
            padding: 12px;              /* Interne marge */
            font-size: 0.85rem;         /* Kleinere tekstgrootte */
            overflow-x: auto;           /* Horizontaal scrollen bij lange regels */
            white-space: pre-wrap;      /* Regelomloop behouden */
        }

        /* ── Waarschuwingsblok: zichtbaar bij rolconflict ── */
        .waarschuwing {
            display: none;              /* Standaard verborgen — zichtbaar via JS */
            max-width: 560px;           /* Maximale breedte */
            margin-bottom: 16px;        /* Ruimte onder het blok */
            padding: 12px 16px;         /* Interne marge */
            background: #fff3cd;        /* Gele achtergrond */
            color: #856404;             /* Donkergele tekst */
            border-radius: 5px;         /* Afgeronde hoeken */
            border: 1px solid #ffeeba;  /* Gele rand */
            font-size: 0.9rem;          /* Iets kleiner dan bodytekst */
        }

        /* ── Manage link: verwijzing naar bestaande stambomen ── */
        .manage-link { margin-bottom: 20px; max-width: 560px; }             /* Ruimte en breedte */
        .manage-link p { font-size: 0.9rem; color: #555; margin: 0 0 10px 0; } /* Introtext stijl */
        .knop-manage {
            display: inline-block;      /* Blokniveau voor padding */
            padding: 10px 20px;         /* Klikruimte */
            background: #4CAF50;        /* Groene achtergrond */
            color: #fff;                /* Witte tekst */
            text-decoration: none;      /* Geen underline */
            border-radius: 5px;         /* Afgeronde hoeken */
            font-size: 0.95rem;         /* Leesbare tekstgrootte */
            font-weight: bold;          /* Vetgedrukt */
        }
        .knop-manage:hover { background: #43a047; }                         /* Donkerder groen bij hover */

    </style>
</head>
<body>

    <!-- ======================= TOPBAR ======================= -->
    <div id="topbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= NAVBAR ======================= -->
    <div id="navbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= PAGINA-INHOUD ======================= -->
    <main>
        <div class="container">                                             <!-- Centreert inhoud binnen main -->

            <!-- ── WELKOM ── Introductietekst bovenaan de pagina ── -->
            <div class="welkom-blok">
                <h1 data-i18n="create:welcome.heading"></h1>               <!-- Paginatitel via i18n -->
                <p  data-i18n="create:welcome.intro"></p>                  <!-- Introtekst via i18n -->
            </div>

            <!-- ── WAARSCHUWING ── Zichtbaar bij rolconflict via create.js ── -->
            <div id="warningMessage" class="waarschuwing"></div>           <!-- Tekst wordt via create.js ingevuld -->

            <!-- ── FORMULIER ── Invoerkaart voor nieuwe persoon ── -->
            <div class="formulier-sectie">
                <h2 data-i18n="create:form.heading"></h2>                  <!-- Sectietitel via i18n -->
                <p class="subtitel" data-i18n="create:form.subtitle"></p>  <!-- Ondertitel via i18n -->

                <form id="persoonForm">                                     <!-- Formulier — afgehandeld door create.js -->

                    <!-- Rij 1: Doopnaam + Roepnaam -->
                    <div class="veld-rij">
                        <div class="veld">
                            <label for="doopnaam" data-i18n="create:form.doopnaam"></label>        <!-- Label via i18n -->
                            <input type="text" id="doopnaam" name="doopnaam"
                                   data-i18n="[placeholder]create:form.doopnaamPH">                <!-- Placeholder via i18n -->
                        </div>
                        <div class="veld">
                            <label for="roepnaam">
                                <span data-i18n="create:form.roepnaam"></span>                     <!-- Label via i18n -->
                                <span style="color:#c00;"> *</span>                                <!-- Verplicht veld indicator -->
                            </label>
                            <input type="text" id="roepnaam" name="roepnaam"
                                   data-i18n="[placeholder]create:form.roepnaamPH">                <!-- Placeholder via i18n -->
                        </div>
                    </div>

                    <!-- Rij 2: Prefix + Achternaam -->
                    <div class="veld-rij">
                        <div class="veld">
                            <label for="prefix" data-i18n="create:form.prefix"></label>           <!-- Label via i18n -->
                            <input type="text" id="prefix" name="prefix"
                                   data-i18n="[placeholder]create:form.prefixPH">                 <!-- Placeholder via i18n -->
                        </div>
                        <div class="veld">
                            <label for="achternaam">
                                <span data-i18n="create:form.achternaam"></span>                   <!-- Label via i18n -->
                                <span style="color:#c00;"> *</span>                                <!-- Verplicht veld indicator -->
                            </label>
                            <input type="text" id="achternaam" name="achternaam"
                                   data-i18n="[placeholder]create:form.achternaamPH">             <!-- Placeholder via i18n -->
                        </div>
                    </div>

                    <!-- Rij 3: Geboortedatum + Geslacht -->
                    <div class="veld-rij">
                        <div class="veld">
                            <label for="geboortedatum" data-i18n="create:form.geboortedatum"></label> <!-- Label via i18n -->
                            <input type="date" id="geboortedatum" name="geboortedatum">               <!-- Datumkiezer -->
                        </div>
                        <div class="veld">
                            <label for="geslacht" data-i18n="create:form.geslacht"></label>           <!-- Label via i18n -->
                            <select id="geslacht" name="geslacht">                                    <!-- Dropdown geslacht -->
                                <option value=""  data-i18n="create:form.geslachtPH"></option>        <!-- Lege standaardoptie -->
                                <option value="M" data-i18n="create:form.man"></option>               <!-- Man -->
                                <option value="V" data-i18n="create:form.vrouw"></option>             <!-- Vrouw -->
                                <option value="X" data-i18n="create:form.anders"></option>            <!-- Anders -->
                            </select>
                        </div>
                    </div>

                    <!-- Opslaan knop -->
                    <button type="submit" class="knop-opslaan"
                            data-i18n="create:form.opslaan"></button>      <!-- Knoptekst via i18n -->

                </form>
            </div>

            <!-- ── PREVIEW ── Toont ingevoerde data vóór definitief opslaan ── -->
            <div id="personPreview" class="preview-sectie">                <!-- Standaard verborgen — zichtbaar na submit -->
                <h2 data-i18n="create:preview.heading"></h2>               <!-- Sectietitel via i18n -->
                <pre id="previewContent"></pre>                            <!-- Inhoud ingevuld door create.js -->
                <button id="confirmBtn" class="knop-bevestigen"
                        data-i18n="create:preview.confirm"></button>       <!-- Bevestigen knop via i18n -->
            </div>

            <!-- ── MANAGE LINK ── Verwijzing naar bestaande stambomen ── -->
            <div class="manage-link">
                <p data-i18n="create:manage.intro"></p>                    <!-- Introtext via i18n -->
                <a href="../stamboom/manage.html" class="knop-manage"
                   data-i18n="create:manage.button"></a>                   <!-- Knoptekst via i18n -->
            </div>

        </div>
    </main>

    <!-- ======================= FOOTER ======================= -->
    <div id="footer-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= EXTERNE SCRIPTS ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase SDK -->
    <script src="../js/utils.js"></script>                                  <!-- Utilities -->
    <script src="../js/auth.js"></script>                                   <!-- Authenticatie module -->
    <script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>            <!-- Bezoektracking — na auth.js zodat tier beschikbaar is -->

    <!-- ======================= INITIALISATIE ======================= -->
    <script>

        // ── i18n initialiseren ──
        // Moet als eerste — vóór de fetch calls — zodat vertalingen
        // klaar zijn op het moment dat componenten worden geïnjecteerd
        i18nModule.init().then(function () {

            i18nModule.loadNamespace('create');                             // Create namespace laden na common
            document.title = i18nModule.t('create:page.title');            // Paginatitel instellen via i18n

            // ── TopBar laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/TopBar.html')                   // TopBar HTML ophalen
                .then(r => r.text())                                        // Response naar tekst converteren
                .then(function (html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('topbar-placeholder')
                    );
                    var s = document.createElement('script');              // Script element aanmaken
                    s.src = '../js/topbar.js';                             // Pad naar topbar.js
                    document.body.appendChild(s);                          // Aan DOM toevoegen om laden te starten
                });

            // ── Navbar laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/Navbar.html')                   // Navbar HTML ophalen
                .then(r => r.text())                                        // Response naar tekst converteren
                .then(function (html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('navbar-placeholder')
                    );
                });

            // ── Footer laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/Footer.html')                   // Footer HTML ophalen
                .then(r => r.text())                                        // Response naar tekst converteren
                .then(function (html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('footer-placeholder')
                    );
                });

        });

        // Pagina tracking — buiten i18n init zodat het niets blokkeert
        SiteAnalytics.trackPage("create");                                 // Bezoek registreren in Supabase page_visits tabel

    </script>

    <!-- ======================= DOMEIN SCRIPTS ======================= -->
    <script src="../js/schema.js"></script>                                 <!-- Schema definities -->
    <script src="../js/idGenerator.js"></script>                            <!-- ID generator -->
    <script src="../js/storage.js"></script>                                <!-- Lokale opslag module -->
    <script src="../js/shareModule.js"></script>                            <!-- Vereist door accessGuard.js -->
    <script src="../js/accessGuard.js"></script>                            <!-- Rolcheck: alleen owner -->
    <script src="../js/create.js"></script>                                 <!-- Formulierlogica -->

    <!-- ======================= ROLCHECK ======================= -->
    <script>
        // Rolcheck: create.html is alleen toegankelijk voor owner.
        // Viewer en Editor krijgen een foutblok te zien via AccessGuard.
        document.addEventListener('DOMContentLoaded', function () {
            window.AccessGuard.check([]);                                  // Lege array: alleen owner wordt doorgelaten
        });
    </script>

</body>
</html>
