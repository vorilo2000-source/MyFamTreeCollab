<!-- ======================= admin/accountbeheer.html v2.1.0 =======================
     Admin accountbeheer pagina — kleurenschema bijgewerkt naar #565656 thema
     Wijziging t.o.v. v2.0.2: alleen kleuren in <style> aangepast, geen structuur
     ======================================================================= -->

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountbeheer</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ─── Kleurvariabelen — centrale definitie voor heel de pagina ─── */
        :root {
            --bg-page:        #565656;    /* hoofdachtergrond van <main> */
            --bg-card:        #4a4a4a;    /* kaart achtergrond */
            --bg-card-hover:  #505050;    /* kaart hover */
            --bg-thead:       #3e3e3e;    /* tabelkop achtergrond */
            --bg-row-hover:   #4e4e4e;    /* rij hover */
            --bg-input:       #3e3e3e;    /* invoervelden en dropdowns */
            --bg-modal:       #3e3e3e;    /* modal achtergrond */
            --bg-toast:       #2a2a2a;    /* toast achtergrond */
            --border:         #6a6a6a;    /* standaard rand kleur */
            --border-light:   #5a5a5a;    /* lichtere rand variant */
            --text-primary:   #f0f0f0;    /* hoofdtekst */
            --text-secondary: #c0c0c0;    /* subtitel / labels */
            --text-muted:     #999;       /* gedimde tekst */
            --accent:         #00d4aa;    /* teal accent (zelfde als analytics) */

            /* ─── Tier kleuren — aangepast voor donker thema ─── */
            --tier-totaal-bg:  #4a4a5a;   /* grijsblauw — neutraal totaal */
            --tier-totaal-fg:  #c8c8ff;   /* lichtpaars op grijsblauw */
            --tier-viewer-bg:  #1a3a2a;   /* donkergroen */
            --tier-viewer-fg:  #6ee09a;   /* helder groen */
            --tier-editor-bg:  #1a2a3a;   /* donkerblauw */
            --tier-editor-fg:  #6ab4f0;   /* helder blauw */
            --tier-owner-bg:   #3a2e0a;   /* donkergoud */
            --tier-owner-fg:   #f0c040;   /* helder goud */
            --tier-admin-bg:   #3a1a1a;   /* donkerrood */
            --tier-admin-fg:   #f08080;   /* helder rood */
        }

        /* ─── Main achtergrond ─── */
        main {
            background-color: var(--bg-page);            /* #565656 — zoals afgesproken */
            min-height: 100vh;                           /* volledige hoogte */
        }

        /* ─── Accountbeheer pagina stijlen ─── */
        .admin-wrap {
            max-width: 1100px;                           /* maximale breedte van de content */
            margin: 0 auto;                              /* horizontaal centreren */
            padding: 32px 24px;                         /* ruimte rondom de content */
        }

        .admin-wrap h1 {
            font-size: 1.6rem;                           /* paginatitel grootte */
            font-weight: bold;                           /* vetgedrukt */
            color: var(--text-primary);                  /* lichte tekst op donkere achtergrond */
            margin-bottom: 8px;                          /* ruimte onder de titel */
        }

        .admin-wrap .subtitel {
            font-size: 0.9rem;                           /* kleinere tekst voor subtitel */
            color: var(--text-secondary);                /* gedimde lichte tekst */
            margin-bottom: 28px;                         /* ruimte onder de subtitel */
        }

        /* ─── Statistieken ─── */
        .stats-grid {
            display: grid;                               /* grid layout voor de kaarten */
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* responsief */
            gap: 12px;                                   /* ruimte tussen de kaarten */
            margin-bottom: 28px;                         /* ruimte onder het grid */
        }

        .stat-card {
            background: var(--bg-card);                  /* donkere kaart achtergrond */
            border: 1px solid var(--border);             /* subtiele rand */
            border-radius: 8px;                          /* afgeronde hoeken */
            padding: 16px;                               /* ruimte binnen de kaart */
            text-align: center;                          /* tekst centreren */
            border-top: 3px solid var(--accent);         /* teal accent streep bovenaan */
        }

        /* Tier-specifieke accentkleur bovenaan elke stat-kaart */
        .stat-card:nth-child(1) { border-top-color: var(--tier-totaal-fg); }  /* totaal — paars */
        .stat-card:nth-child(2) { border-top-color: var(--tier-viewer-fg); }  /* viewer — groen */
        .stat-card:nth-child(3) { border-top-color: var(--tier-editor-fg); }  /* editor — blauw */
        .stat-card:nth-child(4) { border-top-color: var(--tier-owner-fg);  }  /* owner — goud */
        .stat-card:nth-child(5) { border-top-color: var(--tier-admin-fg);  }  /* admin — rood */

        .stat-label {
            font-size: 0.75rem;                          /* kleine label tekst */
            text-transform: uppercase;                   /* hoofdletters */
            letter-spacing: 0.08em;                      /* ruimte tussen letters */
            color: var(--text-muted);                    /* gedimde tekst */
            margin-bottom: 6px;                          /* ruimte onder het label */
        }

        .stat-value {
            font-size: 2rem;                             /* groot getal */
            font-weight: bold;                           /* vetgedrukt */
            color: var(--text-primary);                  /* lichte tekst */
        }

        /* Tier-specifieke kleur voor het getal zelf */
        #statTotal  { color: var(--tier-totaal-fg); }   /* totaal — paars */
        #statViewer { color: var(--tier-viewer-fg); }   /* viewer — groen */
        #statEditor { color: var(--tier-editor-fg); }   /* editor — blauw */
        #statOwner  { color: var(--tier-owner-fg);  }   /* owner — goud */
        #statAdmin  { color: var(--tier-admin-fg);  }   /* admin — rood */

        /* ─── Toolbar (zoekbalk + filter + knop) ─── */
        .toolbar {
            display: flex;                               /* horizontale rij */
            gap: 10px;                                   /* ruimte tussen elementen */
            margin-bottom: 16px;                         /* ruimte onder de toolbar */
            flex-wrap: wrap;                             /* doorbreken op kleine schermen */
            align-items: center;                         /* verticaal uitlijnen */
        }

        .toolbar input {
            flex: 1;                                     /* neemt beschikbare ruimte in */
            min-width: 200px;                            /* minimale breedte */
            padding: 8px 12px;                          /* ruimte binnen het invoerveld */
            border: 1px solid var(--border);             /* rand */
            border-radius: 5px;                          /* afgeronde hoeken */
            font-size: 0.9rem;                           /* tekstgrootte */
            background: var(--bg-input);                 /* donkere invoer achtergrond */
            color: var(--text-primary);                  /* lichte tekst */
        }

        .toolbar input::placeholder { color: var(--text-muted); }  /* gedimde placeholder tekst */

        .toolbar select, .toolbar button {
            padding: 8px 14px;                          /* ruimte binnen select en knop */
            border: 1px solid var(--border);             /* rand */
            border-radius: 5px;                          /* afgeronde hoeken */
            font-size: 0.9rem;                           /* tekstgrootte */
            background: var(--bg-input);                 /* donkere achtergrond */
            color: var(--text-primary);                  /* lichte tekst */
            cursor: pointer;                             /* handcursor */
        }

        .toolbar button:hover { background: var(--bg-card-hover); }  /* iets lichter bij hover */

        /* ─── Gebruikerstabel ─── */
 .table-wrap {
    overflow-x: auto;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    background: #6e6e6e;    /* ← middelgrijs voor de tabelrijen */
}

        table {
            width: 100%;                                 /* volledige breedte */
            border-collapse: collapse;                   /* geen dubbele randen */
            font-size: 0.88rem;                          /* tekstgrootte in de tabel */
        }

        thead { background: var(--bg-thead); }          /* donkere tabelkop */

        thead th {
            padding: 10px 14px;                         /* ruimte in de koptekst cellen */
            text-align: left;                            /* links uitlijnen */
            font-size: 0.75rem;                          /* kleine koptekst */
            text-transform: uppercase;                   /* hoofdletters */
            letter-spacing: 0.08em;                      /* ruimte tussen letters */
            color: var(--text-secondary);                /* gedimde lichte koptekst */
            border-bottom: 1px solid var(--border);      /* scheidingslijn onder kop */
            white-space: nowrap;                         /* geen afbreking */
        }

        tbody tr { border-bottom: 1px solid var(--border-light); background: #6e6e6e; }  /* middelgrijs + rijscheiding */
tbody tr:last-child { border-bottom: none; }                 /* geen lijn na laatste rij */
tbody tr:hover { background: var(--bg-row-hover); }         /* donkerder bij hover */
tbody td { padding: 10px 14px; vertical-align: middle; color: var(--text-primary); } /* cel opmaak */

        .col-email { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } /* lange e-mails afkappen */

        /* ─── Tier badges ─── */
        .tier-badge {
            display: inline-block;                       /* inline blok element */
            padding: 3px 10px;                          /* ruimte binnen de badge */
            border-radius: 12px;                         /* ronde badge vorm */
            font-size: 0.75rem;                          /* kleine tekst */
            font-weight: 600;                            /* halfvet */
            text-transform: uppercase;                   /* hoofdletters */
        }

        .tier-badge.viewer { background: var(--tier-viewer-bg); color: var(--tier-viewer-fg); } /* groen */
        .tier-badge.editor { background: var(--tier-editor-bg); color: var(--tier-editor-fg); } /* blauw */
        .tier-badge.owner  { background: var(--tier-owner-bg);  color: var(--tier-owner-fg);  } /* goud */
        .tier-badge.admin  { background: var(--tier-admin-bg);  color: var(--tier-admin-fg);  } /* rood */

        /* ─── Tier select dropdown ─── */
        .tier-select {
            padding: 4px 8px;                            /* ruimte binnen de dropdown */
            border: 1px solid var(--border);             /* rand */
            border-radius: 4px;                          /* afgeronde hoeken */
            font-size: 0.85rem;                          /* tekstgrootte */
            background: var(--bg-input);                 /* donkere achtergrond */
            color: var(--text-primary);                  /* lichte tekst */
            cursor: pointer;                             /* handcursor */
        }

        /* ─── Actieknoppen per rij ─── */
        .row-actions { display: flex; gap: 6px; }       /* horizontale rij knoppen */

        .btn-action {
            padding: 4px 10px;                           /* ruimte binnen de knop */
            border: 1px solid var(--border);             /* rand */
            border-radius: 4px;                          /* afgeronde hoeken */
            font-size: 0.8rem;                           /* kleine tekstgrootte */
            background: var(--bg-input);                 /* donkere achtergrond */
            color: var(--text-primary);                  /* lichte tekst */
            cursor: pointer;                             /* handcursor */
            transition: all 0.15s;                       /* vloeiende hover animatie */
        }

        .btn-action:hover        { background: var(--bg-card-hover); }                                          /* lichter grijs bij opslaan hover */
        .btn-action.danger:hover { background: var(--tier-admin-bg); border-color: var(--tier-admin-fg); color: var(--tier-admin-fg); } /* rood bij verwijderen hover */

        .loading-row td, .empty-row td {
            text-align: center;                          /* centreer laad/leeg tekst */
            color: var(--text-muted);                    /* gedimde tekst */
            padding: 40px;                               /* ruimte rondom de tekst */
        }

        /* ─── Toast notificatie ─── */
        #toast {
            position: fixed;                             /* vast op het scherm */
            bottom: 24px;                               /* afstand van onderkant */
            right: 24px;                                /* afstand van rechterkant */
            background: var(--bg-toast);                 /* zeer donkere achtergrond */
            color: var(--text-primary);                  /* lichte tekst */
            font-size: 0.88rem;                          /* tekstgrootte */
            padding: 10px 18px;                         /* ruimte binnen de toast */
            border-radius: 6px;                          /* afgeronde hoeken */
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);     /* zwaardere schaduw op donker thema */
            opacity: 0;                                  /* standaard onzichtbaar */
            transform: translateY(8px);                  /* licht naar beneden verschoven */
            transition: opacity 0.2s, transform 0.2s;   /* vloeiende animatie */
            pointer-events: none;                        /* niet klikbaar */
            z-index: 999;                                /* boven alles */
            max-width: 300px;                            /* maximale breedte */
        }

        #toast.show  { opacity: 1; transform: translateY(0); }              /* zichtbaar maken */
        #toast.error { background: var(--tier-admin-bg); color: var(--tier-admin-fg); } /* rood bij fout */

        /* ─── Bevestigingsmodal ─── */
        .modal-overlay {
            position: fixed;                             /* vast op het scherm */
            inset: 0;                                    /* volledige viewport bedekken */
            background: rgba(0,0,0,0.65);               /* donkerdere overlay op donker thema */
            display: flex;                               /* flexbox voor centreren */
            align-items: center;                         /* verticaal centreren */
            justify-content: center;                     /* horizontaal centreren */
            z-index: 500;                                /* boven de pagina */
            opacity: 0;                                  /* standaard onzichtbaar */
            pointer-events: none;                        /* niet klikbaar als gesloten */
            transition: opacity 0.2s;                    /* vloeiende animatie */
        }

        .modal-overlay.open { opacity: 1; pointer-events: all; }            /* modal openen */

        .modal-box {
            background: var(--bg-modal);                 /* donkere modal achtergrond */
            border: 1px solid var(--border);             /* subtiele rand */
            border-radius: 8px;                          /* afgeronde hoeken */
            padding: 28px;                               /* ruimte binnen de modal */
            width: 360px;                                /* breedte van de modal */
            max-width: 90vw;                             /* niet breder dan het scherm */
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);     /* zwaardere schaduw */
        }

        .modal-box h3 { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: var(--text-primary); }   /* modaltitel licht */
        .modal-box p  { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }  /* modaltekst gedimed */
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }                                     /* knoppen rechts */

        .btn-cancel {
            padding: 8px 18px;                           /* ruimte binnen annuleerknop */
            border: 1px solid var(--border);             /* rand */
            border-radius: 5px;                          /* afgeronde hoeken */
            background: var(--bg-input);                 /* donkere achtergrond */
            color: var(--text-primary);                  /* lichte tekst */
            font-size: 0.9rem;                           /* tekstgrootte */
            cursor: pointer;                             /* handcursor */
        }

        .btn-confirm-delete {
            padding: 8px 18px;                           /* ruimte binnen verwijderknop */
            border: none;                                /* geen rand */
            border-radius: 5px;                          /* afgeronde hoeken */
            background: var(--tier-admin-bg);            /* donkerrode achtergrond */
            color: var(--tier-admin-fg);                 /* heldere rode tekst */
            font-size: 0.9rem;                           /* tekstgrootte */
            cursor: pointer;                             /* handcursor */
            border: 1px solid var(--tier-admin-fg);      /* rode rand */
        }

        .btn-confirm-delete:hover { background: #4a2020; } /* iets lichter rood bij hover */

        /* ─── Timestamp label ─── */
        #lastRefresh { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 20px; } /* gedimde tijdstempel */
    </style>
</head>
<body>

<!-- ======================= source view enablement  ======================= -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
  <div class="admin-wrap">

    <h1>Accountbeheer</h1>
    <p id="lastRefresh" class="subtitel">Laden...</p>

    <!-- Statistieken -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Totaal</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Viewer</div>
        <div class="stat-value" id="statViewer">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Editor</div>
        <div class="stat-value" id="statEditor">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Owner</div>
        <div class="stat-value" id="statOwner">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Admin</div>
        <div class="stat-value" id="statAdmin">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Zoek op e-mail of gebruikersnaam…" />
      <select id="tierFilter">
        <option value="all">Alle tiers</option>
        <option value="viewer">Viewer</option>
        <option value="editor">Editor</option>
        <option value="owner">Owner</option>
        <option value="admin">Admin</option>
      </select>
      <button id="btnRefresh">↻ Vernieuwen</button>
    </div>

    <!-- Tabel -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>E-mail</th>
            <th>Huidige tier</th>
            <th>Tier wijzigen</th>
            <th>Aangemeld op</th>
            <th>Laatste login</th>
            <th>Acties</th>
          </tr>
        </thead>
        <tbody id="usersTbody">
          <tr class="loading-row"><td colspan="6">Laden…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- ─── Toast ─── -->
<div id="toast"></div>

<!-- ─── Modal ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>Gebruiker verwijderen</h3>
    <p>Weet je zeker dat je <strong id="modalName"></strong> wilt verwijderen? Dit kan niet ongedaan worden gemaakt.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Annuleren</button>
      <button class="btn-confirm-delete" id="btnConfirm">Verwijderen</button>
    </div>
  </div>
</div>

<!-- =============================================================
     SCRIPTS — verplichte volgorde
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/MyFamTreeCollab/js/utils.js"></script>
<script src="/MyFamTreeCollab/js/auth.js"></script>

<script>
    // Stap 1: TopBar HTML laden en in de placeholder zetten
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())                                              // HTML ophalen als tekst
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;    // TopBar HTML in de DOM zetten

            // Stap 2: topbar.js dynamisch laden NA de TopBar HTML
            // Dit garandeert dat #top-auth in de DOM zit vóór topbar.js initialiseert
            var s = document.createElement('script');                          // nieuw script element aanmaken
            s.src = '/MyFamTreeCollab/js/topbar.js';                          // pad naar topbar.js
            s.onload = function() {
                // Stap 3: accountbeheer.js laden NA topbar.js
                // topbar.js herstelt de Supabase sessie — accountbeheer.js heeft dit nodig
                var p = document.createElement('script');                      // nieuw script element aanmaken
                p.src = '/MyFamTreeCollab/js/accountbeheer.js';               // pad naar accountbeheer.js
                document.body.appendChild(p);                                  // script toevoegen aan de DOM
            };
            document.body.appendChild(s);                                      // topbar.js toevoegen aan de DOM
        });

    // Stap 4: Navbar laden — onafhankelijk van auth, mag parallel
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())                                              // HTML ophalen als tekst
        .then(function(data) {
            document.getElementById('navbar-placeholder').innerHTML = data;    // Navbar HTML in de DOM zetten
        });

    // Stap 5: Footer laden — onafhankelijk van auth, mag parallel
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())                                              // HTML ophalen als tekst
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;    // Footer HTML in de DOM zetten
        });
</script>

</body>
</html>
