<!-- ======================= admin/analytics.html v2.8.0 =======================
     Wijziging v2.8.0 (sessie 33):
     - AdminGuard.protect('admin') toegevoegd — niet-admins zien foutscherm
     - AuthModule.onAuthChange uitlog-redirect via adminGuard.js
     - #page-content wrapper toegevoegd rond dashboard inhoud
     - #accessDenied blok toegevoegd (standaard display:none)
     - adminGuard.js toegevoegd aan laadvolgorde (na auth.js)
     Wijziging v2.7.0:
     - CSS toegevoegd voor uitklapbare e-maillijst per tier in tier verdeling
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard — MyFamTreeCollab</title>

    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* ======================= CSS VARIABELEN ======================= */
        :root {
            --bg-main:      #565656;
            --bg-card:      #3a3a3a;
            --bg-card-alt:  #444444;
            --accent:       #00d4aa;
            --accent-dim:   rgba(0, 212, 170, 0.15);
            --text-primary: #f0f0f0;
            --text-muted:   #aaa;
            --border:       rgba(255,255,255,0.08);
            --font-mono:    'IBM Plex Mono', monospace;
            --font-sans:    'IBM Plex Sans', sans-serif;
            --radius:       8px;
            --shadow:       0 4px 20px rgba(0,0,0,0.35);
            --color-danger: #f08080;
        }

        main {
            background-color: var(--bg-main);   /* Zet de achtergrondkleur van de main container via CSS variabele --bg-main */
            min-height: 100vh;                  /* Zorgt dat main minstens even hoog is als de volledige viewport (100% van schermhoogte) */
            padding: 32px 20px 64px;            /* Binnenruimte: boven 32px, links/rechts 20px, onder 64px */
            font-family: var(--font-sans);      /* Zet het lettertype van de main content via CSS variabele --font-sans */
          }

        /* ─── Toegang geweigerd blok ─── */
        .access-denied {
            background: var(--bg-card);
            border: 1px solid var(--color-danger);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            max-width: 480px;
            margin: 60px auto;
        }
        .access-denied h2 { font-size: 1.2rem; color: var(--color-danger); margin-bottom: 10px; font-family: var(--font-sans); }
        .access-denied p  { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }

        /* ─── Verberg tot auth-check klaar ─── */
        #accessDenied { display: none; }
        #page-content  { display: none; }

        /* ======================= DASHBOARD STIJLEN (ongewijzigd) ======================= */
        .dash-wrap { max-width: 1100px; margin: 0 auto; }
        .dash-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .dash-header h1 { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 600; color: var(--accent); margin: 0; letter-spacing: -0.5px; }
        .dash-header h1 span { color: var(--text-muted); font-weight: 400; }
        .btn-refresh { font-family: var(--font-mono); font-size: 0.8rem; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius); padding: 6px 14px; cursor: pointer; transition: background 0.2s; }
        .btn-refresh:hover { background: rgba(0,212,170,0.28); }
        .btn-clear { font-family: var(--font-mono); font-size: 0.8rem; background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid #ff6b6b; border-radius: var(--radius); padding: 6px 14px; cursor: pointer; transition: background 0.2s; margin-left: 8px; }
        .btn-clear:hover { background: rgba(255,80,80,0.25); }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 20px 16px; box-shadow: var(--shadow); position: relative; overflow: hidden; animation: fadeUp 0.4s ease both; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
        .stat-card .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; font-family: var(--font-sans); }
        .stat-card .value { font-family: var(--font-mono); font-size: 2rem; font-weight: 600; color: var(--text-primary); line-height: 1; }
        .stat-card .unit  { font-size: 0.8rem; color: var(--text-muted); margin-left: 4px; font-family: var(--font-sans); }
        .section-title { font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin: 0 0 12px 0; }
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
        @media (max-width: 700px) { .bottom-grid { grid-template-columns: 1fr; } }
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); animation: fadeUp 0.4s ease both; }
        .event-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .event-row:last-child { margin-bottom: 0; }
        .event-label { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-primary); min-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px; height: 8px; overflow: hidden; }
        .event-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); width: 0%; }
        .event-count { font-family: var(--font-mono); font-size: 0.78rem; color: var(--accent); min-width: 28px; text-align: right; }
        .device-grid { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
        .device-pill { background: var(--bg-card-alt); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
        .empty-msg { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted); text-align: center; padding: 24px 0; letter-spacing: 0.5px; }
        .sessions-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 28px; animation: fadeUp 0.4s ease both; overflow-x: auto; overflow-y: auto; max-height: 480px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--font-mono); font-size: 0.78rem; }
        thead th { position: sticky; top: 0; z-index: 1; background: #1a7a4a; text-align: left; color: #ffffff; padding: 10px 12px 10px 10px; border-bottom: 2px solid #0f5c35; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.68rem; }
        tbody td { padding: 9px 12px 9px 10px; color: #1a1a1a; background: #c8c8c8; border-bottom: 1px solid #aaaaaa; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #d8d8d8; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; background: var(--accent-dim); color: var(--accent); }
        .filter-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 24px; }
        .filter-label { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); white-space: nowrap; }
        .tier-filter { display: flex; flex-wrap: wrap; gap: 8px; }
        .tier-btn { font-family: var(--font-mono); font-size: 0.75rem; padding: 5px 14px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; font-weight: 600; transition: opacity 0.15s, transform 0.1s; opacity: 0.45; }
        .tier-btn:hover  { opacity: 0.75; transform: translateY(-1px); }
        .tier-btn.active { opacity: 1;    transform: translateY(-1px); }
        .tier-btn[data-tier="all"]      { background: #555;    color: #fff;    border-color: #777;    }
        .tier-btn[data-tier="anoniem"]  { background: #2a2a2a; color: #888888; border-color: #888888; }
        .tier-btn[data-tier="guest"]    { background: #3a3a4a; color: #aaaacc; border-color: #aaaacc; }
        .tier-btn[data-tier="owner"]    { background: #3a2e0a; color: #f0c040; border-color: #f0c040; }
        .tier-btn[data-tier="admin"]    { background: #3a1a1a; color: #f08080; border-color: #f08080; }
        .tier-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; cursor: pointer; user-select: none; }
        .tier-row:hover { opacity: 0.85; }
        .tier-toggle { font-size: 0.8rem; margin-left: 6px; transition: transform 0.2s; }
        .tier-email-list { display: none; margin: 0 0 12px 8px; border-left: 2px solid rgba(255,255,255,0.08); padding-left: 12px; }
        .tier-email-list.open { display: block; }
        .tier-email { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-primary); padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .tier-email:last-child { border-bottom: none; }
        .tier-email-leeg { color: rgba(255,255,255,0.2); font-style: italic; }
        .dash-footer { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-align: right; margin-top: 8px; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.10s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.20s; }
        .panel:nth-child(1)     { animation-delay: 0.25s; }
        .panel:nth-child(2)     { animation-delay: 0.30s; }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<div id="topbar-placeholder"></div>
<div id="navbar-placeholder"></div>

<main>
    <div class="dash-wrap">

      <!-- Toegang geweigerd scherm -->
      <div id="accessDenied" class="access-denied">
        <h2>Geen toegang</h2>
        <p>Deze pagina is alleen toegankelijk voor administrators.<br>
           Log in met een admin-account om verder te gaan.</p>
      </div>

      <!-- Dashboard inhoud — zichtbaar na geslaagde admin-check -->
      <div id="page-content">
        <div class="dash-header">
          <h1>Analytics <span>Dashboard</span></h1>
          <div>
            <button class="btn-refresh" id="btn-refresh">&#8635; Vernieuwen</button>
            <button class="btn-clear"   id="btn-clear">&#x2715; Data wissen</button>
          </div>
        </div>

        <div class="filter-bar">
          <span class="filter-label">Filter op account</span>
          <div class="tier-filter">
            <button class="tier-btn active" data-tier="all">Alle</button>
            <button class="tier-btn" data-tier="anoniem">Niet ingelogd</button>
            <button class="tier-btn" data-tier="guest">Guest</button>
            <button class="tier-btn" data-tier="owner">Owner</button>
            <button class="tier-btn" data-tier="admin">Admin</button>
          </div>
        </div>

        <div class="stat-grid" id="stat-grid"></div>

        <div class="bottom-grid">
          <div class="panel" id="panel-events">
            <p class="section-title">Pagina bezoeken</p>
            <div id="events-chart"></div>
          </div>
          <div class="panel" id="panel-pages">
            <p class="section-title">Tier verdeling</p>
            <div id="pages-chart" style="margin-bottom:20px;"></div>
            <p class="section-title">Sessies</p>
            <div class="device-grid" id="device-grid"></div>
          </div>
        </div>

        <div class="sessions-panel">
          <p class="section-title">Recente bezoeken</p>
          <div id="sessions-table"></div>
        </div>

        <div class="dash-footer" id="dash-footer"></div>
      </div><!-- /page-content -->

    </div>
</main>

<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — verplichte volgorde:
     supabase → utils.js → auth.js → adminGuard.js → siteAnalytics.js
     → TopBar fetch → topbar.js → admin-check → analytics-dashboard.js
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/adminGuard.js"></script>       <!-- Admin toegangsbeveiliging -->
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>   <!-- Bezoektracking -->

<script>
    // TopBar laden → topbar.js → admin-check → analytics-dashboard.js
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(function(r) { return r.text(); })
        .then(function(html) {
            document.getElementById('topbar-placeholder').innerHTML = html;  // TopBar injecteren
            var s = document.createElement('script');                        // topbar script
            s.src = '../js/topbar.js';                                       // pad topbar.js
            s.onload = function() {
                AdminGuard.protect('admin').then(function(granted) {         // admin-check
                    if (!granted) return;                                     // stop als geen toegang
                    var p = document.createElement('script');                // analytics script
                    p.src = 'analytics-dashboard.js';                       // pad analytics
                    document.body.appendChild(p);                            // toevoegen aan DOM
                });
            };
            document.body.appendChild(s);                                    // topbar.js toevoegen
        });

    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(function(r) { return r.text(); })
        .then(function(html) { document.getElementById('navbar-placeholder').innerHTML = html; });

    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(function(r) { return r.text(); })
        .then(function(html) { document.getElementById('footer-placeholder').innerHTML = html; });
</script>

</body>
</html>
