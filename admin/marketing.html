<!-- ======================= admin/marketing.html v4.1.0 =======================
    Marketing & Communicatieplan — admin only

    Wijzigingen v3.0.0 (sessie 37):
     - Volledig herschreven: standaard dataformaat marketing.md
     - Tabs: Taken / Kalender / KPI's / Kanalen / Templates
     - Kalender: maand/week/dag weergave
     - KPI's: bewerkbaar via modal
     - Markdown toolbar in alle forms

    Wijzigingen v4.0.0 (sessie 40):
     - Kalender tab verwijderd (centrale agenda via agenda.html)
     - KPI tab verwijderd (toekomstig kpi.html)
     - agendaStore.js toegevoegd aan laadvolgorde
     - AgendaStore.sync() na elke _saveAll()
     - Modal taak: omschrijving ondersteunt HTML-tags in textarea
     - Modal taak: gepubliceerd checkbox = "Publiceren in agenda" (alleen agenda-koppeling)
     - Status badge in kaart/lijst: kleur op basis van status (identiek aan backlog.html)
     - Tabs: Taken / Kanalen / Templates
     - "Naar agenda" knop toegevoegd in actiebalk

    Wijzigingen v4.1.0 (sessie 40):
     - Fix: _mapStatus/_mapPrio gebruikten ongeldige unicode-escapes, MD import faalde
     - Kernboodschap komt dynamisch uit marketing.md (> Kernboodschap: regel)
       en is bewerkbaar via projectinfo-paneel, niet meer hardcoded
     - Textarea's vergroot voor leesbaarheid: standaard 180px, lange velden 240px
     - Markdown/HTML toolbar uitgebreid: H1, H2, H3, <br>, <hr>, link bij omschrijving en templates
     - MD-preview ondersteunt nu # / ## / ### koppen, <br>, <hr> en [tekst](url) links
     - MD export bevat > Kernboodschap: regel indien aanwezig

    Afhankelijkheden:
     - ../js/utils.js · ../js/auth.js
     - /MyFamTreeCollab/js/adminGuard.js
     - /MyFamTreeCollab/js/siteAnalytics.js
     - ../js/agendaStore.js
     - ../js/topbar.js (via fetch)
    ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketing &amp; Communicatie &#x2014; Admin</title>
  <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── CSS variabelen: identiek aan backlog.html ── */
    :root{--bg-main:#565656;--bg-card:#3a3a3a;--bg-card-alt:#444;--accent:#00d4aa;--accent-dim:rgba(0,212,170,0.15);--text-primary:#f0f0f0;--text-muted:#aaa;--border:rgba(255,255,255,0.08);--font-mono:'IBM Plex Mono',monospace;--font-sans:'IBM Plex Sans',sans-serif;--radius:8px;--shadow:0 4px 20px rgba(0,0,0,0.35);--danger:#f08080;}

    /* ── Toegangsblokken ── */
    #accessDenied{display:none;text-align:center;padding:4rem 2rem;color:var(--text-primary);}
    #page-content{display:none;}

    /* ── Main layout ── */
    main{background:var(--bg-main);min-height:100vh;padding:150px 20px 64px;font-family:var(--font-sans);color:var(--text-primary);}
    .wrap{max-width:100%;margin:0;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ── Project header ── */
    .proj-header{margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:1rem;}
    .proj-name{font-family:var(--font-mono);font-size:1.4rem;font-weight:600;color:var(--accent);margin:0 0 4px;display:flex;align-items:center;gap:10px;}
    .proj-edit-btn{font-family:var(--font-mono);font-size:0.72rem;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent);border-radius:var(--radius);padding:3px 10px;cursor:pointer;}
    .proj-meta{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted);display:flex;gap:14px;flex-wrap:wrap;}
    .proj-meta b{color:var(--accent);}
    .projinfo-dd{display:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:1rem;}
    .projinfo-dd.open{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

    /* ── Knoppen: identiek aan backlog.html ── */
    .btn{font-family:var(--font-mono);font-size:0.78rem;display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius);background:var(--bg-card);color:var(--text-primary);cursor:pointer;transition:background .15s;text-decoration:none;}
    .btn:hover{background:var(--bg-card-alt);}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-accent{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
    .btn-accent:hover{background:rgba(0,212,170,0.28);}
    .btn-ghost{border-color:transparent;background:transparent;color:var(--text-muted);}
    .btn-ghost:hover{background:rgba(255,255,255,0.06);}
    .btn-danger{background:rgba(240,128,128,0.15);color:var(--danger);border-color:var(--danger);}
    .btn-sm{padding:3px 10px;font-size:0.7rem;}

    /* ── Formulierelementen ── */
    .form-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:3px;}
    .form-input{font-family:var(--font-mono);font-size:0.8rem;width:100%;padding:6px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);background:#2a2a2a;color:var(--text-primary);outline:none;box-sizing:border-box;}
    .form-input:focus{border-color:var(--accent);}
    select.form-input{cursor:pointer;}
    textarea.form-input{resize:vertical;min-height:180px;font-family:var(--font-sans);font-size:0.9rem;line-height:1.7;}
    /* Korte velden (tags, resultaat) blijven compact via inline override min-height:80px */
    textarea.form-input.ta-sm{min-height:80px;}
    /* Lange velden (notities, omschrijving, templates) extra ruimte */
    textarea.form-input.ta-lg{min-height:240px;}
    .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    @media(max-width:520px){.form-grid2,.form-grid3{grid-template-columns:1fr;}}

    /* ── Markdown editor toolbar ── */
    .md-editor-wrap{border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);overflow:hidden;}
    .md-toolbar{display:flex;gap:4px;padding:6px 8px;background:#222;border-bottom:1px solid rgba(255,255,255,0.1);flex-wrap:wrap;}
    .md-btn{font-family:var(--font-mono);font-size:0.72rem;padding:2px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:transparent;color:var(--text-muted);cursor:pointer;}
    .md-btn:hover{background:rgba(255,255,255,0.08);color:var(--text-primary);}
    .md-editor-wrap textarea{border:none;border-radius:0;background:#2a2a2a;}
    .md-preview{background:#222;padding:10px 12px;font-family:var(--font-sans);font-size:0.82rem;color:var(--text-muted);line-height:1.7;border-top:1px solid rgba(255,255,255,0.1);min-height:60px;}
    .md-preview strong{color:var(--text-primary);}
    .md-preview code{font-family:var(--font-mono);font-size:0.75rem;background:rgba(0,212,170,0.1);color:var(--accent);padding:1px 5px;border-radius:3px;}
    .md-preview ul{padding-left:16px;margin:4px 0;}
    .md-preview table{width:100%;border-collapse:collapse;margin:6px 0;font-size:0.78rem;}
    .md-preview th{background:#1a7a4a;color:#fff;padding:5px 8px;text-align:left;}
    .md-preview td{padding:5px 8px;background:#c8c8c8;color:#1a1a1a;border-bottom:1px solid #aaa;}

    /* ── Statistieken ── */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem;}
    .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;animation:fadeUp .4s ease both;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
    .stat-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px;}
    .stat-value{font-family:var(--font-mono);font-size:1.8rem;font-weight:600;color:var(--text-primary);line-height:1;}
    .progress-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;margin-top:6px;}
    .progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}

    /* ── Acties ── */
    .bl-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}

    /* ── Fase pills ── */
    .phases-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:1.25rem;display:flex;flex-direction:column;gap:8px;}
    .phases-bar-top{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
    .phases-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);}
    .phase-pills-wrap{display:flex;flex-wrap:wrap;gap:6px;}
    .phase-pill{font-family:var(--font-mono);font-size:0.72rem;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .phase-pill:hover{border-color:var(--accent);color:var(--accent);}
    .phase-pill.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
    .phase-input-wrap{display:none;flex-wrap:wrap;gap:6px;align-items:center;padding-top:8px;border-top:1px solid var(--border);}
    .phase-input-wrap.open{display:flex;}

    /* ── Filters ── */
    .filter-section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:1.25rem;display:flex;flex-direction:column;gap:10px;}
    .filter-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
    .filter-row-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);min-width:80px;padding-top:4px;white-space:nowrap;}
    .pills-wrap{display:flex;gap:5px;flex-wrap:wrap;}
    .filter-pill{font-family:var(--font-mono);font-size:0.68rem;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
    .filter-pill:hover{border-color:var(--accent);color:var(--accent);}
    .filter-pill.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
    .view-toggle{display:flex;border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);overflow:hidden;}
    .view-toggle button{font-family:var(--font-mono);font-size:0.72rem;padding:5px 12px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;}
    .view-toggle button.active{background:var(--accent-dim);color:var(--accent);}

    /* ── Tabs: Taken / Kanalen / Templates ── */
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap;}
    .tab-btn{font-family:var(--font-mono);font-size:0.75rem;padding:8px 16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
    .tab-btn:hover{color:var(--text-primary);}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* ── Lege staat ── */
    .empty{text-align:center;padding:3rem 2rem;border:1px solid var(--border);border-radius:var(--radius);}
    .empty p{font-family:var(--font-mono);font-size:0.82rem;color:var(--text-muted);margin:8px 0 16px;}

    /* ── Board: identiek aan backlog.html ── */
    .board-scroll{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 300px);border:1px solid var(--border);border-radius:var(--radius);scrollbar-width:thin;scrollbar-color:rgba(0,212,170,0.4) rgba(255,255,255,0.05);}
    .board-scroll::-webkit-scrollbar{width:8px;height:8px;}
    .board-scroll::-webkit-scrollbar-thumb{background:rgba(0,212,170,0.4);border-radius:4px;}
    .board{display:flex;gap:0;min-width:max-content;align-items:flex-start;}
    .board-col{width:250px;flex-shrink:0;padding:0 10px;border-right:1px solid var(--border);}
    .board-col:last-child{border-right:none;}
    .board-col-title{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:flex;align-items:center;gap:5px;position:sticky;top:0;z-index:2;background:var(--bg-main);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
    .board-col-items{display:flex;flex-direction:column;gap:6px;padding-bottom:14px;}
    .board-empty{font-family:var(--font-mono);font-size:0.72rem;color:rgba(255,255,255,0.15);padding:4px 0;}

    /* ── Taakkaart ── */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);animation:fadeUp .3s ease;}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
    .card-id{font-family:var(--font-mono);font-size:10px;color:var(--accent);opacity:.7;cursor:pointer;border-bottom:1px dashed rgba(0,212,170,0.3);}
    .card-title{font-weight:600;font-size:0.82rem;margin-bottom:3px;line-height:1.4;color:var(--text-primary);}
    .card-dates{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);margin-bottom:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    /* Agenda-indicator: toont of item gepubliceerd is in agenda */
    .card-agenda{font-size:0.65rem;padding:1px 6px;border-radius:99px;border:1px solid;}
    .card-agenda.yes{background:rgba(0,212,170,0.15);color:var(--accent);border-color:var(--accent);}
    .card-agenda.no{background:rgba(255,255,255,0.05);color:var(--text-muted);border-color:rgba(255,255,255,0.15);}
    .card-footer{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:4px;}
    .card-tags{margin-top:4px;display:flex;gap:3px;flex-wrap:wrap;}
    .id-edit-input{font-family:var(--font-mono);font-size:10px;background:#2a2a2a;border:1px solid var(--accent);border-radius:4px;color:var(--accent);padding:1px 5px;width:90px;outline:none;}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;gap:3px;font-family:var(--font-mono);font-size:0.65rem;font-weight:600;padding:2px 7px;border-radius:10px;}
    .dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
    .tag{font-family:var(--font-mono);font-size:0.62rem;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.08);color:var(--text-muted);}

    /* ── Prioriteit badges: identiek aan backlog.html ── */
    .p-critical{background:rgba(240,128,128,0.2);color:#f08080;border:1px solid #f08080;}
    .p-high    {background:rgba(249,115,22,0.2); color:#fb923c;border:1px solid #fb923c;}
    .p-medium  {background:rgba(234,179,8,0.2);  color:#fbbf24;border:1px solid #fbbf24;}
    .p-low     {background:rgba(34,197,94,0.2);  color:#4ade80;border:1px solid #4ade80;}
    .p-critical-tbl{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .p-high-tbl    {background:#fff7ed;color:#9a3412;border:1px solid #fdba74;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .p-medium-tbl  {background:#fefce8;color:#854d0e;border:1px solid #fde047;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .p-low-tbl     {background:#f0fdf4;color:#166534;border:1px solid #86efac;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .dot-critical{background:#f08080}.dot-high{background:#fb923c}.dot-medium{background:#fbbf24}.dot-low{background:#4ade80}

    /* ── Status badges: identiek aan backlog.html, kleur op basis van status-waarde ── */
    .s-open      {background:rgba(96,165,250,0.2); color:#60a5fa;border:1px solid #60a5fa;}
    .s-inprogress{background:rgba(167,139,250,0.2);color:#a78bfa;border:1px solid #a78bfa;}
    .s-review    {background:rgba(251,191,36,0.2); color:#fbbf24;border:1px solid #fbbf24;}
    .s-done      {background:rgba(0,212,170,0.2);  color:var(--accent);border:1px solid var(--accent);}
    .s-cancelled {background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid rgba(255,255,255,0.15);}
    .s-future    {background:rgba(244,114,182,0.2);color:#f472b6;border:1px solid #f472b6;}
    .s-open-tbl      {background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .s-inprogress-tbl{background:#faf5ff;color:#6d28d9;border:1px solid #c4b5fd;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .s-review-tbl    {background:#fefce8;color:#854d0e;border:1px solid #fde047;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .s-done-tbl      {background:#f0fdf4;color:#15803d;border:1px solid #86efac;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .s-cancelled-tbl {background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}
    .s-future-tbl    {background:#fdf4ff;color:#7e22ce;border:1px solid #e9d5ff;border-radius:10px;padding:2px 7px;font-size:0.65rem;font-weight:600;display:inline-block;}

    /* ── Lijst tabel: identiek aan backlog.html ── */
    .list-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;max-height:680px;box-shadow:var(--shadow);}
    .list-table{width:100%;border-collapse:separate;border-spacing:0;font-family:var(--font-mono);font-size:0.75rem;}
    .list-table thead th{position:sticky;top:0;z-index:1;background:#1a7a4a;color:#fff;padding:9px 11px;text-align:left;border-bottom:2px solid #0f5c35;font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:0.65rem;white-space:nowrap;}
    .list-table tbody td{padding:7px 11px;color:#1a1a1a;background:#c8c8c8;border-bottom:1px solid #aaa;vertical-align:middle;}
    .list-table tbody tr:last-child td{border-bottom:none;}
    .list-table tbody tr:hover td{background:#d8d8d8;}
    .tbl-id{font-family:var(--font-mono);font-size:0.68rem;color:#1a5c8a;cursor:pointer;border-bottom:1px dashed #1a5c8a;white-space:nowrap;}
    .tbl-id-input{font-family:var(--font-mono);font-size:0.68rem;background:#fff;border:1px solid #1a7a4a;border-radius:4px;padding:2px 5px;width:90px;outline:none;}

    /* ── Kanalen en Templates kaarten ── */
    .data-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;position:relative;overflow:hidden;animation:fadeUp .3s ease;}
    .data-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
    .data-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
    .data-card-title{font-family:var(--font-mono);font-size:0.85rem;font-weight:600;color:var(--accent);}
    .data-card-body{padding:0 16px 14px;border-top:1px solid var(--border);}
    .data-card-meta{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
    .data-card-tag{font-family:var(--font-mono);font-size:0.65rem;padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);color:var(--text-muted);}
    .data-card-desc{font-family:var(--font-sans);font-size:0.8rem;color:var(--text-muted);line-height:1.6;}
    .tpl-header{cursor:pointer;user-select:none;}
    .tpl-toggle{font-size:0.72rem;color:var(--text-muted);transition:transform .2s;}
    .data-card.open .tpl-toggle{transform:rotate(180deg);}
    .tpl-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);}
    .data-card.open .tpl-body{display:block;}
    .tpl-text{font-family:var(--font-sans);font-size:0.8rem;color:var(--text-muted);line-height:1.8;white-space:pre-wrap;margin-top:10px;}

    /* ── Toegang geweigerd ── */

    .access-denied p{font-size:0.88rem;color:var(--text-muted);line-height:1.6;}

  <script>
  // Layout laden: topbar -> admin-check -> Mkt.init()
  fetch('/MyFamTreeCollab/Layout/TopBar.html').then(function(r){return r.text();}).then(function(html){
    document.getElementById('topbar-placeholder').innerHTML=html; // topbar injecteren
    var s=document.createElement('script'); s.src='../js/topbar.js'; // topbar.js laden
    s.onload=function(){ AdminGuard.protect('admin').then(function(ok){ if(ok) Mkt.init(); }); }; // alleen admins
    document.body.appendChild(s);
  });
  fetch('/MyFamTreeCollab/Layout/Navbar.html').then(function(r){return r.text();}).then(function(html){ document.getElementById('navbar-placeholder').innerHTML=html; }); // navbar
  fetch('/MyFamTreeCollab/Layout/Footer.html').then(function(r){return r.text();}).then(function(html){ document.getElementById('footer-placeholder').innerHTML=html; }); // footer

  // ================================================================
  // MARKETING MODULE v4.0.0 - vanilla JS
  // Architectuur: identiek aan backlog.html (Backlog module v5.3.2)
  // Tabs: Taken / Kanalen / Templates (kalender en KPI verwijderd)
  // localStorage prefix: mk_* (geen conflict met bl_*, pl_*, ag_*)
  // ================================================================
  var Mkt = (function() {
    // State variabelen
    var taken=[], phases=[], phaseDescs={};
    var kanalen=[], templates=[];
    var projName='', projVersion='', projDate='';
    var projKernboodschap=''; // kernboodschap uit marketing.md, dynamisch geladen
    var view='board', search='', fPhase='All';
    var fStatus=new Set(), fPriority=new Set(), fType=new Set(), fTags=new Set();
    var editTaakId=null, editKanaalIdx=null, editTplIdx=null;

    // Constanten: identiek aan backlog.html
    var STATUSES  =['Open','In Progress','Review','Done','Cancelled','Future'];
    var PRIORITIES=['Critical','High','Medium','Low'];
    var TYPES     =['Facebook','Reddit','Product Hunt','YouTube','Email','Website','Overig'];
    var S_ICON={'Open':'&#x1F4CB;','In Progress':'&#x1F504;','Review':'&#x1F50D;','Done':'&#x2705;','Cancelled':'&#x274C;','Future':'&#x1F52E;'};
    var S_CSS ={'Open':'s-open','In Progress':'s-inprogress','Review':'s-review','Done':'s-done','Cancelled':'s-cancelled','Future':'s-future'};
    var S_TBL ={'Open':'s-open-tbl','In Progress':'s-inprogress-tbl','Review':'s-review-tbl','Done':'s-done-tbl','Cancelled':'s-cancelled-tbl','Future':'s-future-tbl'};
    var P_CSS ={'Critical':'p-critical','High':'p-high','Medium':'p-medium','Low':'p-low'};
    var P_TBL ={'Critical':'p-critical-tbl','High':'p-high-tbl','Medium':'p-medium-tbl','Low':'p-low-tbl'};
    var D_CSS ={'Critical':'dot-critical','High':'dot-high','Medium':'dot-medium','Low':'dot-low'};

    var $ = function(id){ return document.getElementById(id); }; // DOM helper
    var V = function(v){ return v&&v.trim()?v.trim():''; }; // veilige string helper

    // Initialisatie: data laden en UI opbouwen
    function init() {
      _loadProjInfo(); // projectinfo laden uit localStorage
      var s=localStorage.getItem('mk_items'); // opgeslagen taken laden
      if(s) {
        taken     = JSON.parse(s); // taken parsen
        phases    = JSON.parse(localStorage.getItem('mk_phases')    ||'[]'); // fases
        phaseDescs= JSON.parse(localStorage.getItem('mk_phasedescs')||'{}'); // fase-beschrijvingen
        kanalen   = JSON.parse(localStorage.getItem('mk_kanalen')   ||'[]'); // kanalen
        templates = JSON.parse(localStorage.getItem('mk_templates') ||'[]'); // templates
      }
      _bindEvents(); // event listeners registreren
      _renderAll();  // UI opbouwen
      _agSync();     // initiële agenda sync
    }

    // AgendaStore sync: roept AgendaStore.sync() aan na elke _saveAll()
    function _agSync() {
      if(typeof AgendaStore !== 'undefined') AgendaStore.sync(); // ag_cache herberekenen
    }

    // Event bindings: alle knoppen en inputs
    function _bindEvents() {
      // Tabs
      document.querySelectorAll('.tab-btn').forEach(function(b){
        b.addEventListener('click', function(){
          document.querySelectorAll('.tab-btn').forEach(function(x){ x.classList.remove('active'); });
          document.querySelectorAll('.tab-panel').forEach(function(x){ x.classList.remove('active'); });
          b.classList.add('active'); // actieve tab markeren
          $('tab-'+b.dataset.tab).classList.add('active'); // bijbehorend panel tonen
        });
      });

      // Projectinfo

    // Markdown toolbar: koppel toolbar knoppen aan textarea
    function _bindMdToolbar(textareaId, previewId, previewBtnId) {
      var ta=$(textareaId), prev=$(previewId); // textarea en preview elementen
      var wrap=ta.closest('.md-editor-wrap'); // wrapper element
      wrap.querySelectorAll('.md-btn[data-md]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var md=btn.dataset.md; // actie type
          if(md==='preview') { // preview toggle
            var show=prev.style.display==='none'; // huidige staat
            prev.style.display=show?'block':'none'; // preview tonen/verbergen
            ta.style.display=show?'none':'block';   // textarea verbergen/tonen
            if(show) prev.innerHTML=_mdToHtml(ta.value); // MD naar HTML renderen
            return;
          }
          _insertMd(ta, md); // markdown invoegen in textarea
        });
      });
    }

    // Markdown invoegen: wrap of prefix toepassen op geselecteerde tekst
    function _insertMd(ta, type) {
      var s=ta.selectionStart, e=ta.selectionEnd, v=ta.value, sel=v.slice(s,e); // selectie info
      var ins='';
      if(type==='bold')   ins='**'+(sel||'vet tekst')+'**'; // **bold**
      if(type==='italic') ins='_'+(sel||'cursief')+'_';     // _cursief_
      if(type==='h1')     ins='\n# '+(sel||'Koptekst 1')+'\n';   // # H1
      if(type==='h2')     ins='\n## '+(sel||'Koptekst 2')+'\n';  // ## H2
      if(type==='h3')     ins='\n### '+(sel||'Koptekst 3')+'\n'; // ### H3
      if(type==='list')   ins='\n- '+(sel||'item')+'\n- item\n'; // lijst
      if(type==='code')   ins='`'+(sel||'code')+'`';        // `code`
      if(type==='link')   ins='['+(sel||'tekst')+'](https://)'; // [tekst](url)
      if(type==='br')     ins='<br>\n'; // regeleinde (HTML)
      if(type==='hr')     ins='\n<hr>\n'; // horizontale lijn (HTML)
      if(type==='table')  ins='\n| Kolom 1 | Kolom 2 |\n|---------|----------|\n| Cel 1   | Cel 2   |\n'; // tabel
      ta.value=v.slice(0,s)+ins+v.slice(e); // tekst invoegen
      ta.focus(); ta.selectionStart=ta.selectionEnd=s+ins.length; // cursor na invoeg
    }

    // Render alles: meta, stats, pills, filters, taken, kanalen, templates
    function _renderAll() {
      _renderMeta(); _renderStats(); _renderPhasePills();
      _renderFilterPills(); _renderTaken();
      _renderKanalen(); _renderTemplates();
      _updatePhasesInModal();
    }

    // Meta-balk: projectnaam en statistieken
    function _renderMeta() {
      var t=taken.length, done=taken.filter(function(i){ return i.status==='Done'; }).length;
      var pct=t?Math.round(done/t*100):0; // voortgangspercentage
      $('proj-name-txt').textContent=projName||'Marketing & Communicatieplan';
      $('proj-meta').innerHTML=
        (projVersion?'<span>&#x1F4E6; <b>'+projVersion+'</b></span>':'')+
        (projDate   ?'<span>&#x1F4C5; <b>'+_fmtDate(projDate)+'</b></span>':'')+
        '<span>&#x1F4CB; <b>'+t+'</b> taken</span>'+
        '<span>&#x2705; <b>'+pct+'%</b> afgerond</span>';
      // Kernboodschap tonen als aanwezig in mk_proj (uit marketing.md geladen)
      var kbEl=$('info-kernboodschap');
      if(kbEl) {
        if(projKernboodschap) {
          kbEl.innerHTML='&#x1F4AC; <b>Kernboodschap:</b> '+_esc(projKernboodschap)+' &middot; <b>Horizon:</b> 12 weken'; // kernboodschap + vaste horizon
          kbEl.style.display='block'; // tonen
        } else {
          kbEl.style.display='none'; // verbergen als geen kernboodschap geladen
        }
      }
    }

    // HTML escapen voor weergave van tekst uit MD
    function _esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Datum formatteren: YYYY-MM-DD -> DD-MM-YYYY
    function _fmtDate(d) { if(!d) return ''; var p=d.split('-'); return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d; }

    // Statistieken: taken per status
    function _renderStats() {
      var t=taken.length;
      var done=taken.filter(function(i){ return i.status==='Done'; }).length;
      var pct=t?Math.round(done/t*100):0;
      var inAgenda=taken.filter(function(i){ return i.gepubliceerd==='ja'&&i.startdate&&i.startdate.trim(); }).length; // in agenda: gepubliceerd + startdatum
      $('stat-grid').innerHTML=
        '<div class="stat-card"><div class="stat-label">Totaal taken</div><div class="stat-value">'+t+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">Open</div><div class="stat-value">'+taken.filter(function(i){ return i.status==='Open'; }).length+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">In uitvoering</div><div class="stat-value">'+taken.filter(function(i){ return i.status==='In Progress'; }).length+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">Gedaan</div><div class="stat-value">'+done+'</div></div>'+
        '<div class="stat-card"><div class="stat-label">Voortgang</div><div class="stat-value">'+pct+'%</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>'+
        '<div class="stat-card" title="Taken gepubliceerd in agenda.html"><div class="stat-label">In agenda</div><div class="stat-value">'+inAgenda+'</div></div>';
    }

    // Fase pills: actieve fase filteren
    function _renderPhasePills() {
      $('phase-pills').innerHTML=phases.map(function(ph){
        return '<span class="phase-pill '+(fPhase===ph?'active':'')+'" data-phase="'+ph+'">'+ph+' <span data-remove="'+ph+'" style="margin-left:4px;opacity:.4;cursor:pointer">&times;</span></span>';
      }).join('');
      $('phase-pills').querySelectorAll('.phase-pill').forEach(function(el){
        el.addEventListener('click', function(e){
          if(e.target.dataset.remove){ _removePhase(e.target.dataset.remove); return; }
          fPhase=fPhase===el.dataset.phase?'All':el.dataset.phase; // toggle filter
          _renderTaken();
        });
      });
    }

    // Filter pills: status, prioriteit, type, tags
    function _renderFilterPills() {
      var allTags=[]; var seen={};
      taken.forEach(function(i){
        (i.tags||'').split(',').map(function(t){ return t.trim(); }).filter(Boolean).forEach(function(t){
          if(!seen[t]){ seen[t]=true; allTags.push(t); }
        });
      });
      allTags.sort();
      _buildPills('fp-status',   STATUSES,   fStatus,   S_ICON);
      _buildPills('fp-priority', PRIORITIES, fPriority, {});
      _buildPills('fp-type',     TYPES,      fType,     {});
      _buildPills('fp-tags',     allTags,    fTags,     {});
    }

    // Pills opbouwen voor een filtergroep
    function _buildPills(cid, opts, activeSet, icons) {
      var el=$(cid);
      el.innerHTML=opts.map(function(o){
        return '<button class="filter-pill '+(activeSet.has(o)?'active':'')+'" data-val="'+o+'">'+(icons[o]?icons[o]+' ':'')+o+'</button>';
      }).join('');
      el.querySelectorAll('.filter-pill').forEach(function(btn){
        btn.addEventListener('click', function(){
          var v=btn.dataset.val;
          if(activeSet.has(v)) activeSet.delete(v); else activeSet.add(v); // toggle
          _renderFilterPills(); _renderTaken();
        });
      });
    }

    // Gefilterde taken op basis van zoekterm en actieve filters
    function _filtered() {
      var q=search.toLowerCase();
      return taken.filter(function(i){
        var mq=!q||(i.title+' '+(i.description||'')+' '+i.id).toLowerCase().includes(q); // zoekterm
        var ms=!fStatus.size   ||fStatus.has(i.status);    // status filter
        var mp=!fPriority.size ||fPriority.has(i.priority); // prioriteit filter
        var mt=!fType.size     ||fType.has(i.type);         // type filter
        var mph=fPhase==='All' ||i.phase===fPhase;           // fase filter
        var it=(i.tags||'').split(',').map(function(t){ return t.trim(); }).filter(Boolean);
        var mta=!fTags.size    ||Array.from(fTags).some(function(t){ return it.includes(t); }); // tag filter
        return mq&&ms&&mp&&mt&&mph&&mta;
      });
    }

    // Taken renderen: board of lijst weergave
    function _renderTaken() {
      var filtered=_filtered();
      if(!taken.length) { // lege staat
        $('bl-content').innerHTML='<div class="empty"><p>Nog geen taken. Laad een .md bestand of voeg je eerste taak toe.</p><button class="btn btn-accent" id="btn-add-empty">+ Eerste taak toevoegen</button></div>';
        $('btn-add-empty').addEventListener('click', function(){ _openTaakModal(); });
        return;
      }
      if(view==='board') $('bl-content').innerHTML=_boardHTML(filtered); // board weergave
      else               $('bl-content').innerHTML=_listHTML(filtered);  // lijst weergave

      // Bewerken en verwijderen knoppen
      $('bl-content').querySelectorAll('[data-edit-taak]').forEach(function(b){ b.addEventListener('click', function(){ _openTaakModal(b.dataset.editTaak); }); });
      $('bl-content').querySelectorAll('[data-delete-taak]').forEach(function(b){ b.addEventListener('click', function(){ _deleteTaak(b.dataset.deleteTaak); }); });
      $('bl-content').querySelectorAll('.tbl-id,.card-id').forEach(function(el){ el.addEventListener('click', function(){ _inlineEditId(el); }); });
    }

    // Board HTML: kolommen per status
    function _boardHTML(filtered) {
      var vis=fStatus.size>0?STATUSES.filter(function(s){ return fStatus.has(s); }):STATUSES;
      var html='<div class="board-scroll"><div class="board">';
      vis.forEach(function(s){
        var col=filtered.filter(function(i){ return i.status===s; });
        html+='<div class="board-col">';
        html+='<div class="board-col-title">'+S_ICON[s]+' '+s.toUpperCase()+' <span style="opacity:.4">('+col.length+')</span></div>';
        html+='<div class="board-col-items">'+(col.length?col.map(_cardHTML).join(''):'<div class="board-empty">&mdash;</div>')+'</div>';
        html+='</div>';
      });
      html+='</div></div>';
      return html;
    }

    // Kaart HTML: status badge kleur op basis van status-waarde
    function _cardHTML(i) {
      var pub=i.gepubliceerd==='ja'; // in agenda gepubliceerd
      var tags=(i.tags||'').split(',').map(function(t){ return t.trim(); }).filter(Boolean);
      var html='<div class="card">';
      html+='<div class="card-header">';
      html+='<span class="card-id" data-id="'+i.id+'">'+i.id+'</span>';
      html+='<div style="display:flex;gap:2px;">';
      html+='<button class="btn btn-ghost" data-edit-taak="'+i.id+'" style="padding:2px 5px;font-size:11px">&#x270F;&#xFE0F;</button>';
      html+='<button class="btn btn-ghost" data-delete-taak="'+i.id+'" style="padding:2px 5px;font-size:11px">&#x1F5D1;</button>';
      html+='</div></div>';
      html+='<div class="card-title">'+i.title+'</div>';
      html+='<div class="card-dates">';
      if(i.startdate) html+='&#x1F4C5; '+i.startdate; // startdatum
      if(i.enddate&&i.enddate!==i.startdate) html+=' &rarr; '+i.enddate; // einddatum
      // Agenda-indicator: toont of item in agenda.html zichtbaar is
      html+='<span class="card-agenda '+(pub?'yes':'no')+'">'+(pub?'&#x2713; In agenda':'&#x25CB; Concept')+'</span>';
      html+='</div>';
      if(i.description) html+='<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;line-height:1.4;">'+(i.description.length>80?i.description.slice(0,80)+'&hellip;':i.description)+'</div>';
      html+='<div class="card-footer">';
      // Prioriteit badge
      html+='<span class="badge '+(P_CSS[i.priority]||'p-medium')+'"><span class="dot '+(D_CSS[i.priority]||'dot-medium')+'"></span>'+i.priority+'</span>';
      // Status badge: kleur bepaald door S_CSS op basis van status-waarde
      html+='<span class="badge '+(S_CSS[i.status]||'s-open')+'">'+S_ICON[i.status]+' '+i.status+'</span>';
      if(i.phase) html+='<span class="badge s-cancelled" style="font-size:0.62rem">'+i.phase+'</span>';
      html+='</div>';
      if(tags.length) html+='<div class="card-tags">'+tags.map(function(t){ return '<span class="tag">'+t+'</span>'; }).join('')+'</div>';
      html+='</div>';
      return html;
    }

    // Lijst HTML: tabelweergave met status badge op basis van status-waarde
    function _listHTML(filtered) {
      if(!filtered.length) return '<p style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.78rem;padding:1rem;text-align:center">Geen taken gevonden.</p>';
      var html='<div class="list-wrap"><table class="list-table">';
      html+='<thead><tr><th>ID</th><th>Titel</th><th>Fase</th><th>Kanaal</th><th>Start</th><th>Eind</th><th>Agenda</th><th>Tags</th><th>Prioriteit</th><th>Status</th><th></th></tr></thead><tbody>';
      filtered.forEach(function(i){
        var pub=i.gepubliceerd==='ja';
        var tags=(i.tags||'').split(',').map(function(t){ return t.trim(); }).filter(Boolean);
        html+='<tr>';
        html+='<td><span class="tbl-id" data-id="'+i.id+'">'+i.id+'</span></td>';
        html+='<td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+i.title+'</td>';
        html+='<td>'+V(i.phase)+'</td>';
        html+='<td>'+V(i.type)+'</td>';
        html+='<td style="white-space:nowrap">'+V(i.startdate)+'</td>';
        html+='<td style="white-space:nowrap">'+V(i.enddate)+'</td>';
        html+='<td>'+(pub?'&#x2705;':'&#x25CB;')+'</td>'; // agenda indicator
        html+='<td>'+tags.map(function(t){ return '<span class="tag" style="background:#e5e7eb;color:#374151">'+t+'</span>'; }).join(' ')+'</td>';
        html+='<td><span class="'+(P_TBL[i.priority]||'p-medium-tbl')+'">'+V(i.priority)+'</span></td>';
        // Status badge: kleur op basis van status-waarde via S_TBL
        html+='<td><span class="'+(S_TBL[i.status]||'s-open-tbl')+'">'+S_ICON[i.status]+' '+V(i.status)+'</span></td>';
        html+='<td style="white-space:nowrap">';
        html+='<button class="btn btn-ghost" data-edit-taak="'+i.id+'" style="padding:2px 5px">&#x270F;&#xFE0F;</button>';
        html+='<button class="btn btn-ghost" data-delete-taak="'+i.id+'" style="padding:2px 5px">&#x1F5D1;</button>';
        html+='</td></tr>';
      });
      html+='</tbody></table></div>';
      return html;
    }

    // Taak modal openen: bewerken of nieuw
    function _openTaakModal(id) {
      editTaakId=id||null; // bewerkings-ID opslaan
      $('mt-title').textContent    = id ? 'Taak bewerken'  : 'Taak toevoegen';
      $('btn-mt-save').textContent = id ? 'Opslaan'        : 'Toevoegen';
      $('ft-id').dataset.manual=''; // handmatige ID reset
      _updatePhasesInModal(); // fases bijwerken in select
      if(id) { // bestaande taak: velden invullen
        var item=taken.find(function(i){ return i.id===id; }); if(!item) return;
        $('ft-id').value=item.id; $('ft-id').dataset.manual='1';
        $('ft-id-preview').textContent='';
        $('ft-title').value=item.title||'';
        $('ft-phase').value=item.phase||'';
        $('ft-type').value=item.type||'Facebook';
        $('ft-priority').value=item.priority||'Medium';
        $('ft-status').value=item.status||'Open';
        $('ft-assignee').value=item.assignee||'';
        $('ft-tags').value=item.tags||'';
        $('ft-description').value=item.description||''; // HTML-tags behouden als plain text
        $('ft-result').value=item.ai||'';
        $('ft-startdate').value=item.startdate||'';
        $('ft-enddate').value=item.enddate||'';
        $('ft-pub').checked=item.gepubliceerd==='ja'; // agenda checkbox
      } else { // nieuwe taak: lege velden
        ['ft-title','ft-assignee','ft-tags','ft-description','ft-result','ft-startdate','ft-enddate'].forEach(function(fid){ $(fid).value=''; });
        $('ft-type').value='Facebook'; $('ft-priority').value='Medium'; $('ft-status').value='Open';
        $('ft-phase').value=''; $('ft-pub').checked=false; // agenda checkbox uit
        _updateAutoId(); // auto ID genereren
      }
      $('md-preview-desc').style.display='none'; // preview verbergen
      $('ft-description').style.display='block'; // textarea tonen
      $('modal-taak').classList.add('open'); // modal tonen
      $('ft-title').focus();
    }

    // Taak opslaan vanuit modal
    function _saveTaak() {
      var title=$('ft-title').value.trim(); if(!title){ $('ft-title').focus(); return; } // titel verplicht
      var id=$('ft-id').value.trim()||_genId($('ft-phase').value, $('ft-type').value); // ID ophalen of genereren
      if(!editTaakId && taken.find(function(i){ return i.id===id; })){ alert('ID bestaat al.'); $('ft-id').focus(); return; }
      var item={
        id:id, title:title, phase:$('ft-phase').value, type:$('ft-type').value,
        priority:$('ft-priority').value, status:$('ft-status').value,
        assignee:$('ft-assignee').value.trim(), tags:$('ft-tags').value.trim(),
        description:$('ft-description').value.trim(), // HTML-tags opslaan als plain text
        ai:$('ft-result').value.trim(),
        startdate:$('ft-startdate').value, enddate:$('ft-enddate').value,
        gepubliceerd:$('ft-pub').checked?'ja':'nee' // agenda-flag
      };
      if(editTaakId) taken=taken.map(function(i){ return i.id===editTaakId?item:i; }); // bewerken
      else taken.push(item); // nieuw toevoegen
      _saveAll(); _closeModal('modal-taak'); _renderAll();
    }

    // Taak verwijderen
    function _deleteTaak(id) {
      if(!confirm('Taak verwijderen?')) return;
      taken=taken.filter(function(i){ return i.id!==id; });
      _saveAll(); _renderAll();
    }

    // Kanaal modal openen
    function _openKanaalModal(idx) {
      editKanaalIdx=(idx!=null)?idx:null;
      $('mkn-title').textContent    = idx!=null ? 'Kanaal bewerken' : 'Kanaal toevoegen';
      $('btn-mkn-save').textContent = idx!=null ? 'Opslaan'         : 'Toevoegen';
      if(idx!=null) { var k=kanalen[idx]; $('fkn-naam').value=k.naam; $('fkn-taal').value=k.taal; $('fkn-freq').value=k.freq; $('fkn-toon').value=k.toon; $('fkn-doel').value=k.doel; $('fkn-groepen').value=k.groepen||''; $('fkn-notities').value=k.notities||''; }
      else { ['fkn-naam','fkn-taal','fkn-freq','fkn-toon','fkn-doel','fkn-groepen','fkn-notities'].forEach(function(id){ $(id).value=''; }); }
      $('modal-kanaal').classList.add('open'); $('fkn-naam').focus();
    }

    // Kanaal opslaan
    function _saveKanaal() {
      var naam=$('fkn-naam').value.trim(); if(!naam) return;
      var k={naam:naam, taal:$('fkn-taal').value.trim(), freq:$('fkn-freq').value.trim(), toon:$('fkn-toon').value.trim(), doel:$('fkn-doel').value.trim(), groepen:$('fkn-groepen').value.trim(), notities:$('fkn-notities').value.trim()};
      if(editKanaalIdx!=null) kanalen[editKanaalIdx]=k; else kanalen.push(k);
      _saveAll(); _closeModal('modal-kanaal'); _renderKanalen();
    }

    // Template modal openen
    function _openTplModal(idx) {
      editTplIdx=(idx!=null)?idx:null;
      $('mtp-title').textContent    = idx!=null ? 'Template bewerken' : 'Template toevoegen';
      $('btn-mtp-save').textContent = idx!=null ? 'Opslaan'           : 'Toevoegen';
      if(idx!=null) { var t=templates[idx]; $('ftp-titel').value=t.titel; $('ftp-kanaal').value=t.kanaal; $('ftp-tekst').value=t.tekst; }
      else { ['ftp-titel','ftp-tekst'].forEach(function(id){ $(id).value=''; }); $('ftp-kanaal').value='Facebook'; }
      $('md-preview-tpl').style.display='none'; $('ftp-tekst').style.display='block';
      $('modal-template').classList.add('open'); $('ftp-titel').focus();
    }

    // Template opslaan
    function _saveTpl() {
      var titel=$('ftp-titel').value.trim(); if(!titel) return;
      var t={titel:titel, kanaal:$('ftp-kanaal').value, tekst:$('ftp-tekst').value.trim()};
      if(editTplIdx!=null) templates[editTplIdx]=t; else templates.push(t);
      _saveAll(); _closeModal('modal-template'); _renderTemplates();
    }

    // ID generatie: [M][fase][type]-[volgnummer]
    function _genId(phase, type) {
      var fl=(phase||'M')[0].toUpperCase(), tl=(type||'O')[0].toUpperCase(); // eerste letters
      var prefix='M'+fl+tl+'-'; // prefix samenstellen
      var used=new Set(taken.filter(function(i){ return i.id&&i.id.startsWith(prefix); }).map(function(i){ return parseInt(i.id.slice(prefix.length))||0; })); // gebruikte nummers
      var n=1; while(used.has(n)) n++; // eerste vrije nummer
      return prefix+String(n).padStart(3,'0'); // bijv. MFF-001
    }

    // Auto ID bijwerken bij fase/type wijziging
    function _updateAutoId() {
      if(editTaakId) return; // niet bij bewerken
      var id=_genId($('ft-phase').value, $('ft-type').value);
      if(!$('ft-id').dataset.manual) $('ft-id').value=id; // alleen als niet handmatig
      $('ft-id-preview').textContent='\u2192 '+id;
    }

    // Inline ID bewerken in tabel
    function _inlineEditId(el) {
      var oldId=el.dataset.id;
      var input=document.createElement('input'); input.className='tbl-id-input id-edit-input'; input.value=oldId;
      el.replaceWith(input); input.focus(); input.select();
      var commit=function(){
        var newId=input.value.trim();
        if(newId&&newId!==oldId){ if(taken.find(function(i){ return i.id===newId; })){ alert('ID bestaat al.'); input.focus(); return; } taken=taken.map(function(i){ return i.id===oldId?Object.assign({},i,{id:newId}):i; }); _saveAll(); }
        _renderTaken();
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', function(e){ if(e.key==='Enter') commit(); if(e.key==='Escape') _renderTaken(); });
    }

    // Fase beheer
    function _addPhase() { var v=$('input-new-phase').value.trim(), d=$('input-new-phase-desc').value.trim(); if(v&&!phases.includes(v)){ phases.push(v); if(d) phaseDescs[v]=d; _saveAll(); } _cancelPhaseInput(); _renderPhasePills(); _updatePhasesInModal(); }
    function _removePhase(ph) { phases=phases.filter(function(p){ return p!==ph; }); if(fPhase===ph) fPhase='All'; _saveAll(); _renderPhasePills(); }
    function _cancelPhaseInput() { $('input-new-phase').value=''; $('input-new-phase-desc').value=''; $('phase-input-wrap').classList.remove('open'); $('btn-new-phase').style.display=''; }
    function _updatePhasesInModal() { if($('ft-phase')) $('ft-phase').innerHTML='<option value="">&mdash; geen &mdash;</option>'+phases.map(function(p){ return '<option value="'+p+'">'+p+'</option>'; }).join(''); }
    function _toggleView() { $('btn-view-board').classList.toggle('active', view==='board'); $('btn-view-list').classList.toggle('active', view==='list'); }

    // Persistentie: opslaan en agenda sync
    function _saveAll() {
      localStorage.setItem('mk_items',      JSON.stringify(taken));       // taken opslaan
      localStorage.setItem('mk_phases',     JSON.stringify(phases));      // fases opslaan
      localStorage.setItem('mk_phasedescs', JSON.stringify(phaseDescs));  // fase-beschrijvingen
      localStorage.setItem('mk_kanalen',    JSON.stringify(kanalen));     // kanalen opslaan
      localStorage.setItem('mk_templates',  JSON.stringify(templates));   // templates opslaan
      _agSync(); // agenda bijwerken na elke save
    }
    function _saveProjInfo() { localStorage.setItem('mk_proj', JSON.stringify({projName:projName,projVersion:projVersion,projDate:projDate,projKernboodschap:projKernboodschap})); }
    function _loadProjInfo() { var p=JSON.parse(localStorage.getItem('mk_proj')||'{}'); projName=p.projName||''; projVersion=p.projVersion||''; projDate=p.projDate||''; projKernboodschap=p.projKernboodschap||''; }

    // MD naar HTML converter (voor preview)
    function _mdToHtml(t) {
      if(!t) return '';
      var html='', inList=false, inTable=false, rows=[];
      var flush=function(){ if(!rows.length){ inTable=false; return; } html+='<table><thead><tr>'+rows[0].map(function(c){ return '<th>'+c+'</th>'; }).join('')+'</tr></thead><tbody>'; rows.slice(2).forEach(function(r){ html+='<tr>'+r.map(function(c){ return '<td>'+c+'</td>'; }).join('')+'</tr>'; }); html+='</tbody></table>'; rows=[]; inTable=false; };
      t.split('\n').forEach(function(line){
        if(line.startsWith('|')){ inTable=true; if(inList){ html+='</ul>'; inList=false; } rows.push(line.split('|').map(function(c){ return c.trim(); }).filter(function(_,i,a){ return i>0&&i<a.length-1; })); return; }
        if(inTable) flush();
        if(!line.trim()){ if(inList){ html+='</ul>'; inList=false; } return; }
        if(line.startsWith('### ')){ if(inList){ html+='</ul>'; inList=false; } html+='<h3>'+_inlineHtml(line.slice(4))+'</h3>'; return; } // ### h3
        if(line.startsWith('## '))  { if(inList){ html+='</ul>'; inList=false; } html+='<h2>'+_inlineHtml(line.slice(3))+'</h2>'; return; } // ## h2
        if(line.startsWith('# '))   { if(inList){ html+='</ul>'; inList=false; } html+='<h1>'+_inlineHtml(line.slice(2))+'</h1>'; return; } // # h1
        if(line.trim()==='<hr>') { if(inList){ html+='</ul>'; inList=false; } html+='<hr>'; return; } // horizontale lijn
        if(line.startsWith('- ')){ if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+_inlineHtml(line.slice(2))+'</li>'; return; }
        if(inList){ html+='</ul>'; inList=false; }
        if(line.startsWith('---')) return;
        html+='<p>'+_inlineHtml(line)+'</p>';
      });
      if(inList) html+='</ul>'; if(inTable) flush();
      return html;
    }

    // Inline HTML: escapen + markdown opmaak
    function _inlineHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') // **bold**
        .replace(/_(.+?)_/g,'<em>$1</em>')               // _cursief_
        .replace(/`([^`]+)`/g,'<code>$1</code>')         // `code`
        .replace(/&lt;br&gt;/g,'<br>')                    // <br> toestaan als regeleinde
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>'); // [tekst](url)
    }

    // MD importeren
    function _importMD(e) {
      var file=e.target.files[0]; if(!file) return;
      if(!confirm('Alle huidige data vervangen door '+file.name+'?')){ e.target.value=''; return; }
      var reader=new FileReader();
      reader.onload=function(ev){ _parseMD(ev.target.result); e.target.value=''; alert('Geladen: '+taken.length+' taken, '+kanalen.length+' kanalen, '+templates.length+' templates.'); _renderAll(); };
      reader.readAsText(file);
    }

    // MD parser: verwerkt [TAKEN], [KANALEN], [TEMPLATES] secties
    function _parseMD(text) {
      taken=[]; phases=[]; phaseDescs={}; kanalen=[]; templates=[];
      var lines=text.split('\n');
      var section='', curPhase='', tplBuf=[], tplTitle='', tplKanaal='', inTpl=false;

      // Projectinfo uit header
      var h1=lines.find(function(l){ return l.startsWith('# '); });
      if(h1){ var raw=h1.replace(/^#\s*/,'').trim(); var d=raw.indexOf('\u2014'); projName=d>-1?raw.slice(d+1).trim():raw; }
      var ver=lines.find(function(l){ return l.startsWith('> Versie:'); });
      if(ver){ var m=ver.match(/Versie:\s*([^\s·\u00b7]+)/); if(m&&m[1]&&m[1]!=='\u2014') projVersion=m[1]; }
      // Kernboodschap lezen uit MD: regel die begint met '> Kernboodschap:'
      var kb=lines.find(function(l){ return l.startsWith('> Kernboodschap:'); });
      projKernboodschap = kb ? kb.replace(/^>\s*Kernboodschap:\s*/,'').trim() : ''; // leeg als niet aanwezig
      _saveProjInfo();

      for(var li=0;li<lines.length;li++) {
        var line=lines[li];
        if(line.match(/^\[TAKEN\]$/))     { section='taken';     continue; }
        if(line.match(/^\[KANALEN\]$/))   { section='kanalen';   continue; }
        if(line.match(/^\[TEMPLATES\]$/)) { section='templates'; continue; }
        // KPI en KALENDER secties overslaan (verwijderd in v4.0.0)
        if(line.match(/^\[KPI\]$/))       { section='skip';      continue; }
        if(line.match(/^\[KALENDER\]$/))  { section='skip';      continue; }
        if(section==='skip') continue;

        // Templates: blokken per ###
        if(section==='templates') {
          if(line.startsWith('### ')){ if(inTpl&&tplTitle) templates.push({titel:tplTitle,kanaal:tplKanaal,tekst:tplBuf.join('\n').trim()}); tplTitle=line.replace(/^###\s*/,'').trim(); tplKanaal='Overig'; tplBuf=[]; inTpl=true; continue; }
          if(inTpl&&line.startsWith('---')&&tplTitle){ templates.push({titel:tplTitle,kanaal:tplKanaal,tekst:tplBuf.join('\n').trim()}); tplTitle=''; tplBuf=[]; inTpl=false; continue; }
          if(inTpl) tplBuf.push(line);
          continue;
        }

        // Tabelrijen verwerken
        if(line.startsWith('|')&&!line.includes('---')) {
          var cells=line.split('|').map(function(c){ return c.trim(); }).filter(function(_,i,a){ return i>0&&i<a.length-1; });
          if(!cells.length||cells[0]==='ID'||cells[0]==='Kanaal'||cells[0]==='Titel') continue;

          if(section==='taken'&&cells.length>=9) {
            var id=cells[0],titel=cells[1],type=cells[2],start=cells[3],eind=cells[4],pub=cells[5],prio=cells[6],status=cells[7],assign=cells[8],tags=cells[9]||'',desc=cells[10]||'',result=cells[11]||'';
            if(id&&titel){ if(!phases.includes(curPhase)&&curPhase) phases.push(curPhase); taken.push({id:id,title:titel,phase:curPhase,type:type||'Overig',startdate:start,enddate:eind,gepubliceerd:pub,priority:_mapPrio(prio),status:_mapStatus(status),assignee:assign,tags:tags,description:desc,ai:result}); }
          }
          if(section==='kanalen'&&cells.length>=4) {
            var naam=cells[0],taal=cells[1],freq=cells[2],toon=cells[3],doel=cells[4]||'',groepen=cells[5]||'',notities=cells[6]||'';
            if(naam) kanalen.push({naam:naam,taal:taal,freq:freq,toon:toon,doel:doel,groepen:groepen,notities:notities});
          }
          continue;
        }

        // Fase koptekst binnen TAKEN
        if(section==='taken'&&line.startsWith('## ')&&!line.includes('[')) curPhase=line.replace(/^##\s*/,'').trim();
      }
      // Laatste template toevoegen
      if(inTpl&&tplTitle) templates.push({titel:tplTitle,kanaal:tplKanaal,tekst:tplBuf.join('\n').trim()});
      _saveAll();
    }

    // Status mapping van MD naar JS
    function _mapStatus(s){
      if(!s) return 'Open'; // geen waarde: standaard Open
      var t=s.toLowerCase(); // case-insensitive matching op de Engelse statusnaam
      if(t.includes('done'))     return 'Done';     // ✅ Done
      if(t.includes('progress')) return 'In Progress'; // 🔄 In Progress
      if(t.includes('review'))   return 'Review';   // 🔍 Review
      if(t.includes('cancel'))   return 'Cancelled';// ❌ Cancelled
      if(t.includes('future'))   return 'Future';   // 🔮 Future
      return 'Open'; // 📋 Open of onbekend
    }
    // Prioriteit mapping van MD naar JS: matcht op de Engelse prioriteitsnaam (taal-onafhankelijk van emoji)
    function _mapPrio(s){
      if(!s) return 'Medium'; // geen waarde: standaard Medium
      var t=s.toLowerCase(); // case-insensitive matching
      if(t.includes('critical')) return 'Critical'; // 🔴 Critical
      if(t.includes('high'))     return 'High';     // 🔴 High
      if(t.includes('low'))      return 'Low';      // 🟢 Low
      return 'Medium'; // 🟡 Medium of onbekend
    }

    // MD exporteren: [TAKEN], [KANALEN], [TEMPLATES]
    function _exportMD() {
      var md='# MyFamTreeCollab \u2014 '+V(projName||'Marketing & Communicatieplan')+'\n';
      md+='## Bijgewerkt: '+(projDate?_fmtDate(projDate):new Date().toLocaleDateString('nl-BE'))+'\n\n';
      md+='> Versie: '+(V(projVersion)||'\u2014')+' \u00b7 Project: MyFamTreeCollab \u00b7 Horizon: 12 weken\n';
      if(V(projKernboodschap)) md+='> Kernboodschap: '+V(projKernboodschap)+'\n'; // kernboodschap exporteren indien aanwezig
      md+='\n---\n\n';

      // TAKEN
      md+='## [TAKEN]\n\n';
      var byPhase={};
      taken.forEach(function(i){ var ph=i.phase||'Overig'; if(!byPhase[ph]) byPhase[ph]=[]; byPhase[ph].push(i); });
      var allPhases=phases.concat(Object.keys(byPhase).filter(function(p){ return !phases.includes(p); }));
      allPhases.forEach(function(ph){
        if(!byPhase[ph]) return;
        md+='## '+ph+'\n\n';
        md+='| ID | Titel | Type | Startdatum | Einddatum | Gepubliceerd | Prioriteit | Status | Toegewezen | Tags | Omschrijving | Resultaat |\n';
        md+='|----|-------|------|------------|-----------|-------------|-----------|--------|------------|------|-------------|----------|\n';
        byPhase[ph].forEach(function(i){
          var p={'Critical':'\uD83D\uDD34','High':'\uD83D\uDD34','Medium':'\uD83D\uDFE1','Low':'\uD83D\uDFE2'}[i.priority]||'\uD83D\uDFE1';
          var sIcon={'Open':'\uD83D\uDCCB','In Progress':'\uD83D\uDD04','Review':'\uD83D\uDD0D','Done':'\u2705','Cancelled':'\u274C','Future':'\uD83D\uDD2E'}[i.status]||'\uD83D\uDCCB';
          md+='| '+V(i.id)+' | '+V(i.title)+' | '+V(i.type)+' | '+V(i.startdate)+' | '+V(i.enddate)+' | '+(i.gepubliceerd||'nee')+' | '+p+' '+V(i.priority)+' | '+sIcon+' '+V(i.status)+' | '+V(i.assignee)+' | '+V(i.tags)+' | '+V(i.description).replace(/\n/g,' ')+' | '+V(i.ai)+' |\n';
        });
        md+='\n';
      });

      // KANALEN
      md+='## [KANALEN]\n\n';
      md+='| Kanaal | Taal | Frequentie | Toon | Doel | Groepen | Notities |\n';
      md+='|--------|------|-----------|------|------|---------|----------|\n';
      kanalen.forEach(function(k){ md+='| '+k.naam+' | '+k.taal+' | '+k.freq+' | '+k.toon+' | '+k.doel+' | '+(k.groepen||'')+' | '+(k.notities||'')+' |\n'; });
      md+='\n';

      // TEMPLATES
      md+='## [TEMPLATES]\n\n';
      templates.forEach(function(t){ md+='### '+t.titel+'\n\n'+t.tekst+'\n\n---\n\n'; });

      var name=(V(projName)||'Marketing').replace(/\s+/g,'-')+(V(projVersion)?'-'+V(projVersion):'')+'.md';
      var a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));
      a.download=name;
      a.click(); // download starten
    }

    return { init:init }; // publieke interface
  })();
  </script>
