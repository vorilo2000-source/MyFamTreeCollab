<!-- ======================= develop/standaardpagina.html v1.4.0 =======================
     Wijziging v1.4.0 (sessie 28):
     - loadScript() helper toegevoegd: laadt een JS-bestand als echte Promise
       zodat de .then()-keten WACHT tot het script volledig geladen én uitgevoerd is.
     - topbar.js wordt nu via loadScript() geladen i.p.v. appendChild(s) zonder await
     - Navbar-fetch start pas NADAT topbar.js geladen én init() uitgevoerd heeft
     - Dit lost de race condition op waarbij _showAdminDropdown() de adminDropdown/
       developDropdown niet kon vinden omdat de Navbar-HTML nog niet geïnjecteerd was.

     Wijziging v1.3.0 (sessie 27):
     - i18n toegevoegd: i18next CDN + i18n.js in laadvolgorde
     - Namespace 'standaardpagina' geladen via i18nModule.init() promise-keten
     - data-i18n attributen toegevoegd op alle zichtbare teksten
     - Components geladen via i18nModule.onComponentLoaded() (i.p.v. innerHTML)
     - document.title via i18nModule.t()
     - Dubbele Supabase/utils/auth script-blokken verwijderd
     - Losse fetch-blokken bovenaan verwijderd
     - Navbar-placeholder hoofdletter N gecorrigeerd naar navbar-placeholder
     - eruda debug-script verwijderd
     - trackPage gecorrigeerd: was "evenement", nu "standaardpagina"
     - Laadvolgorde: supabase → utils → auth → siteAnalytics → i18next CDN → i18n.js

     Wijziging v1.2.0 / v0.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd, trackPage toegevoegd
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standaardpagina</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ======================= BINNENKORT BLOK ======================= */
        .binnenkort-blok { max-width: 520px; margin: 0 auto; text-align: center; padding: 48px 24px; }
        .binnenkort-blok .icoon { font-size: 3rem; margin-bottom: 16px; }
        .binnenkort-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 12px 0; color: #222; }
        .binnenkort-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0 0 24px 0; }
        .knop-home { display: inline-block; padding: 10px 24px; background: #1E90FF; color: #fff; text-decoration: none; border-radius: 5px; font-size: 0.95rem; font-weight: bold; }
        .knop-home:hover { background: #1278d4; }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="binnenkort-blok">
        <div class="icoon">🖼️</div>                                        <!-- Standaardpagina icoon -->
        <h1 data-i18n="standaardpagina:titel">Standaard Pagina</h1>       <!-- i18n: titel -->
        <p data-i18n="standaardpagina:beschrijving">                       <!-- i18n: omschrijving -->
            De standaard pagina is een weergave van een standaard pagina opmaak.
        </p>
        <a href="/MyFamTreeCollab/" class="knop-home"
           data-i18n="standaardpagina:knopHome">Terug naar Home</a>        <!-- i18n: knoptekst -->
    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — verplichte laadvolgorde (sessie 28):
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     4. siteAnalytics.js    — bezoektracking, na auth.js
     5. i18next CDN + plugins — vereist door i18n.js
     6. i18n.js             — wraps i18next, exposeert window.i18nModule
     7. Pagina init script  — init() → loadNamespace → TopBar → topbar.js
                              → Navbar → Footer → analytics
                              (elke stap wacht op de vorige via Promise-keten)
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <!-- Supabase SDK -->
<script src="../js/utils.js"></script>                                         <!-- Gedeelde hulpfuncties -->
<script src="../js/auth.js"></script>                                          <!-- Authenticatie module -->
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>                  <!-- Bezoektracking, na auth.js -->

<!-- i18next en plugins — volgorde is verplicht -->
<script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
<script src="/MyFamTreeCollab/js/i18n.js"></script>                           <!-- i18n module wrapper -->

<script>
    // -------------------------------------------------------------------------
    // loadScript(src)
    // Laadt een extern JS-bestand en geeft een Promise terug die pas resolved
    // wanneer het script volledig geladen én uitgevoerd is (onload).
    // Zo kan de .then()-keten WACHTEN op topbar.js voordat de Navbar-fetch
    // start — dit voorkomt de race condition waarbij _showAdminDropdown()
    // de adminDropdown/developDropdown nog niet in de DOM kon vinden.
    // -------------------------------------------------------------------------
    function loadScript(src) {
        return new Promise(function (resolve, reject) {
            var s    = document.createElement('script');  // Nieuw script-element aanmaken
            s.src    = src;                               // Bronpad instellen
            s.onload  = resolve;                          // Resolve als script geladen is
            s.onerror = reject;                           // Reject bij laadfouten
            document.body.appendChild(s);                 // Aan DOM toevoegen om laden te starten
        });
    }

    // -------------------------------------------------------------------------
    // Hoofdketen — elke stap wacht op de vorige via Promise-chaining.
    // Volgorde is kritisch: topbar.js MOET geladen en uitgevoerd zijn
    // voordat de Navbar-HTML geïnjecteerd wordt, anders vindt
    // _showAdminDropdown() de adminDropdown/developDropdown niet.
    // -------------------------------------------------------------------------
    i18nModule.init()

        // Stap 1: laad de paginaspecifieke vertaalnamespace
        .then(function () {
            return i18nModule.loadNamespace('standaardpagina');            // standaardpagina.json laden
        })

        // Stap 2: paginatitel vertalen
        .then(function () {
            document.title = i18nModule.t('standaardpagina:paginaTitel'); // Titel via i18n instellen
        })

        // Stap 3: TopBar HTML ophalen en injecteren
        .then(function () {
            return fetch('/MyFamTreeCollab/Layout/TopBar.html')            // TopBar HTML ophalen
                .then(function (resp) { return resp.text(); })             // Tekst uitpakken
                .then(function (html) {
                    i18nModule.onComponentLoaded(                          // HTML injecteren + vertalen
                        html,
                        document.getElementById('topbar-placeholder')
                    );
                });
        })

        // Stap 4: topbar.js laden via loadScript() — WACHT tot script uitgevoerd is
        // Dit is de kritische fix: pas als topbar.js klaar is (incl. init() en
        // _showAdminDropdown), mag de Navbar-HTML geïnjecteerd worden.
        .then(function () {
            return loadScript('/MyFamTreeCollab/js/topbar.js');            // topbar.js laden als Promise
        })

        // Stap 5: Navbar HTML ophalen en injecteren
        // Op dit punt zijn adminDropdown en developDropdown nog NIET in de DOM,
        // maar _showAdminDropdown() gebruikt nu een MutationObserver (v2.3.2)
        // die exact reageert zodra ze verschijnen — geen timing-probleem meer.
        .then(function () {
            return fetch('/MyFamTreeCollab/Layout/Navbar.html')            // Navbar HTML ophalen
                .then(function (resp) { return resp.text(); })             // Tekst uitpakken
                .then(function (html) {
                    i18nModule.onComponentLoaded(                          // HTML injecteren + vertalen
                        html,
                        document.getElementById('navbar-placeholder')
                    );
                });
        })

        // Stap 6: Footer HTML ophalen en injecteren
        .then(function () {
            return fetch('/MyFamTreeCollab/Layout/Footer.html')            // Footer HTML ophalen
                .then(function (resp) { return resp.text(); })             // Tekst uitpakken
                .then(function (html) {
                    i18nModule.onComponentLoaded(                          // HTML injecteren + vertalen
                        html,
                        document.getElementById('footer-placeholder')
                    );
                });
        })

        // Stap 7: bezoek registreren (na alle UI-renders)
        .then(function () {
            SiteAnalytics.trackPage('standaardpagina');                    // Paginabezoek loggen
        })

        // Foutafhandeling voor de volledige keten
        .catch(function (err) {
            console.error('[standaardpagina] Initialisatiefout:', err);    // Fout loggen
        });
</script>

</body>
</html>
