<!-- ======================= stamboom/view.html v2.2.1 =======================
     Stamboomweergave: visualiseert relaties rondom een geselecteerde persoon

     Wijziging v2.2.0 (sessie 26):
     - i18n geïntegreerd: data-i18n attributen op alle statische teksten
     - i18next scripts + i18n.js toegevoegd aan <head>
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded()
     - Placeholder en broer/zus titel via i18nModule.t() in view.js
     - 2.2.1 Laadvolgorde en colorhelper.js scripts

     Wijziging v2.1.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("view") toegevoegd in fetch-scriptblok

     v2.0.0: facelift — welkomstblok, inline stijlen naar <style>
     v2.0.1: Login + Favicon / App-icoon
     Scripts: utils.js → schema.js → storage.js → relatieEngine.js → LiveSearch.js → view.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="view:page.title">Stamboom</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <!-- ======================= i18next bibliotheken ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/Tree.css">
    <link rel="stylesheet" href="../css/RelationColors.css">

    <style>
             /* ── Tijdelijk: ruimte voor sticky TopBar + Navbar ──
           Verwijderen zodra style.css v1.0.7 live is         */
        main {
            padding-top: 150px; /* 35px topbar + ~56px navbar + 9px marge */
        }
         
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 20px; }
        #searchPerson {
            width: 50%;
            padding: 9px 12px;
            font-size: 1rem;
            border: 1px solid #bbb;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #searchPerson:focus {
            outline: none;
            border-color: #1E90FF;
        }

        /* ======================= BOOM LAYOUT ======================= */
        .stamboom-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-top: 4px;
        }
        .bz-kolom-titel {
            font-size: 0.95rem;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #444;
            padding: 0 2px;
        }
    </style>
</head>
<body>

<!-- ======================= TopBar placeholder ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar placeholder ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="container">

        <!-- Welkomstblok — vertaald via data-i18n -->
        <div class="welkom-blok">
            <h1 data-i18n="view:welcome.heading">Welkom bij je stamboom View</h1>
            <p data-i18n="view:welcome.intro">
                Zoek een persoon op om de stamboom rondom hem of haar te bekijken.
                Klik op een node om die persoon als nieuw middelpunt te kiezen.
            </p>
        </div>

        <!-- Zoekbalk — placeholder via JS gezet na i18n init -->
        <div class="zoek-sectie">
            <input type="text" id="searchPerson"
                   data-i18n-placeholder="view:search.placeholder"
                   placeholder="Zoek op ID, naam of geboortedatum...">
        </div>

        <!-- Boom + Broer/Zus naast elkaar -->
        <div class="stamboom-wrapper">

            <!-- Linker container: hoofdpersoon, ouders, partner, kinderen -->
            <div id="treeContainer"></div>

            <!-- Rechter container: broers en zussen -->
            <div>
                <!-- Titel wordt via JS gezet na i18n init zodat taal correct is -->
                <p class="bz-kolom-titel" id="bzTitel">Broers &amp; zussen</p>
                <div id="BZBox"></div>
            </div>

        </div>

    </div>
</main>

<!-- ======================= Footer placeholder ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= Externe scripts ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/colorHelper.js"></script>  <!-- nieuw -->
<script src="../js/schema.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: na auth.js -->

<!-- ======================= Pagina-scripts (volgorde verplicht) ======================= -->
<script src="../js/storage.js"></script>
<script src="../js/relatieEngine.js"></script>
<script src="../js/LiveSearch.js"></script>
<script src="../js/view.js"></script>

<script>
// ======================= i18n initialisatie + component fetch =======================
i18nModule.init()
    .then(function () { return i18nModule.loadNamespace('view'); })
    .then(function () {

    // Paginatitel vertalen
    document.title = i18nModule.t('view:page.title');

    // Placeholder vertalen (data-i18n-placeholder)
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-placeholder');
        if (key) el.placeholder = i18nModule.t(key); // Vertaald placeholder
    });

    // Broer/zus kolomtitel vertalen — via JS zodat view.js de waarde kan lezen
    var bzTitel = document.getElementById('bzTitel');
    if (bzTitel) bzTitel.textContent = i18nModule.t('view:siblings.title');

    // Laad TopBar en activeer i18n + topbar.js
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });

    // Laad Navbar en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
        });

    // Laad Footer en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
        });

    // Pagina tracking
    SiteAnalytics.trackPage('view'); // Bezoek registreren in Supabase page_visits tabel

});
</script>

</body>
</html>
