<!-- ======================= stamboom/collab.html v2.2.0 =======================
     Collaboratie-pagina: berichtenboard per stamboom + persoon-ID

     Wijzigingen v2.2.0 (sessie 19):
     - Hoofd-zoekbalk verwijderd van paginaniveau (zit nu per stamboom-sectie)
     - CSS toegevoegd voor stamboom-secties: actief vs. inactief
     - CSS voor rol-badges per boom (owner/editor/viewer/admin)
     - CSS voor inactief-banner en lees-only melding
     - CloudSync toegevoegd aan laadvolgorde (voor owner eigen bomen)

     Wijzigingen v2.1.0 (sessie 19):
     - Status uitgebreid naar 4 waarden: nieuw / open / inbehandeling / gesloten
     - Statusicoontjes: 🆕 🔓 🔄 ✅
     - Stamboom-sectie header boven discussielijst

     Rollen: Owner (modereren + berichten), Editor (berichten + diff + status),
             Viewer (berichten plaatsen)
     Opslag: Supabase — tabel collab_messages (boom_id: UUID)

     Laadvolgorde (verplicht):
       1. supabase-js CDN
       2. utils.js
       3. auth.js
       4. TopBar HTML + topbar.js (via fetch)
       5. Navbar HTML (via fetch)
       6. Footer HTML (via fetch)
       7. schema.js
       8. storage.js
       9. cloudSync.js      ← nieuw in v2.2.0 (voor owner eigen bomen)
      10. shareModule.js
      11. accessGuard.js
      12. collab.js (altijd LAATSTE)
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samenwerken</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ======================= COLLAB PAGINA STIJLEN ======================= */

        .collab-wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        .collab-titel {
            font-size: 1.4rem;
            font-weight: bold;
            color: #222;
            margin: 0 0 4px 0;
        }

        .collab-subtitel {
            font-size: 0.9rem;
            color: #666;
            margin: 0 0 24px 0;
        }

        /* --- Geen toegang blok --- */
        .geen-toegang-blok {
            max-width: 520px;
            margin: 48px auto;
            text-align: center;
            padding: 40px 24px;
            background: #f8f8f8;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .geen-toegang-blok .icoon { font-size: 2.5rem; margin-bottom: 12px; }
        .geen-toegang-blok h2 { font-size: 1.2rem; margin: 0 0 10px 0; color: #333; }
        .geen-toegang-blok p  { font-size: 0.9rem; color: #666; line-height: 1.6; margin: 0 0 20px 0; }

        .knop-primair {
            display: inline-block;
            padding: 10px 24px;
            background: #1E90FF;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .knop-primair:hover { background: #1278d4; }

        /* ======================= DISCUSSIE CONTAINER ======================= */
        #discussie-container {
            display: flex;
            flex-direction: column;
            gap: 28px;              /* Ruimte tussen stamboom-secties */
        }

        /* ======================= STAMBOOM SECTIE ======================= */
        /* Omhulsel voor één stamboom met al zijn discussies */
        .stamboom-sectie {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }

        /* Actieve stamboom: blauwe accentkleur aan de linkerkant */
        .stamboom-actief {
            border-color: #90caf9;
            border-left: 4px solid #1E90FF;    /* Blauwe accentlijn links */
            box-shadow: 0 2px 12px rgba(30,144,255,0.10);
        }

        /* Inactieve stamboom: iets grijzer, geen accentlijn */
        .stamboom-inactief {
            border-color: #e0e0e0;
            background: #fafafa;
            opacity: 0.92;          /* Lichte dimming voor inactieve bomen */
        }

        /* ======================= STAMBOOM SECTIE HEADER ======================= */
        .stamboom-sectie-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #f4f6f9;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .stamboom-actief .stamboom-sectie-header {
            background: #e8f4ff;    /* Lichtblauw voor actieve boom */
            border-bottom-color: #b8d9f5;
        }

        .stamboom-sectie-icoon { font-size: 1.1rem; flex-shrink: 0; }

        .stamboom-sectie-naam {
            font-size: 1.0rem;
            font-weight: bold;
            color: #1a1a2e;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stamboom-sectie-teller {
            font-size: 0.78rem;
            color: #999;
            background: #f0f2f5;
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* ======================= ROL BADGES PER BOOM ======================= */
        /* Toont de rol die de gebruiker heeft voor déze specifieke boom */
        .boom-rol-badge {
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .boom-rol-owner  { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .boom-rol-editor { background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }
        .boom-rol-viewer { background: #e8f5e9; color: #1b5e20; border: 1px solid #81c784; }
        .boom-rol-admin  { background: #fce4ec; color: #880e4f; border: 1px solid #f48fb1; }

        /* Actief-badge: groene badge voor de actieve stamboom */
        .boom-actief-badge {
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #d4edda;
            color: #155724;
            border: 1px solid #28a745;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* Inactief-hint: subtiele grijze tekst voor niet-actieve bomen */
        .boom-inactief-hint {
            font-size: 0.72rem;
            color: #aaa;
            font-style: italic;
            flex-shrink: 0;
        }

        /* ======================= LEDENLIJST PER STAMBOOM ======================= */
        /* Toont alle leden (owner + editors + viewers) onder de stamboom-header */
        .boom-leden-lijst {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #f9f9fb;
            border-bottom: 1px solid #e8ecf2;
            font-size: 0.82rem;
        }
        .boom-leden-label {
            color: #888;
            font-weight: bold;
            margin-right: 2px;
        }
        .boom-leden-laden { color: #bbb; font-style: italic; font-size: 0.8rem; }
        .boom-leden-leeg  { color: #bbb; font-style: italic; font-size: 0.8rem; }

        /* Eén lid-item: naam + rol-badge naast elkaar */
        .boom-lid-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 2px 8px 2px 6px;
        }
        .boom-lid-naam { color: #333; font-weight: 500; }

        /* Rol-kleuren per lid */
        .boom-lid-rol { font-size: 0.68rem; font-weight: bold; }
        .boom-lid-rol-owner  { color: #856404; }
        .boom-lid-rol-editor { color: #0d47a1; }
        .boom-lid-rol-viewer { color: #1b5e20; }
        .boom-lid-rol-admin  { color: #880e4f; }

        /* ======================= INACTIEF BANNER ======================= */
        /* Uitlegbanner in inactieve stamboom-secties */
        .inactief-banner {
            background: #fffde7;
            border-bottom: 1px solid #fff176;
            padding: 8px 16px;
            font-size: 0.85rem;
            color: #795548;
        }
        .inactief-banner a {
            color: #1E90FF;
            text-decoration: underline;
        }

        /* ======================= LEES-ONLY MELDING IN DISCUSSIEBLOK ======================= */
        /* Vervangt het formulier in inactieve stambomen */
        .lees-only-melding {
            border-top: 1px solid #eee;
            padding: 10px 12px;
            font-size: 0.82rem;
            color: #aaa;
            font-style: italic;
            text-align: center;
        }

        /* ======================= PERSOON-ZOEKER ======================= */
        .zoek-sectie {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: #f9fbff;    /* Lichtblauwe achtergrond voor zoekbalk */
            border-bottom: 1px solid #e8ecf2;
            align-items: center;
            flex-wrap: wrap;
            position: relative;     /* Ankerpunt voor livesearch dropdown */
        }
        .zoek-sectie input[type="text"],
        .zoek-sectie .persoon-zoek-input {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            min-width: 200px;
        }
        .zoek-sectie input[type="text"]:focus,
        .zoek-sectie .persoon-zoek-input:focus {
            outline: none;
            border-color: #1E90FF;
            box-shadow: 0 0 0 2px rgba(30,144,255,0.15);
        }
        .zoek-label {
            font-size: 0.85rem;
            color: #555;
            width: 100%;
            margin-bottom: 4px;
        }

        /* ======================= DISCUSSIES INNER CONTAINER ======================= */
        .discussie-container-inner {
            display: flex;
            flex-direction: column;
            gap: 0;                 /* Discussieblokken naadloos aansluiten */
        }

        /* ======================= DISCUSSIE CLUSTERS ======================= */
        .discussie-blok {
            border-top: 1px solid #eee;
            background: #fff;
        }
        .discussie-blok:first-child { border-top: none; }

        .discussie-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #f9f9fb;
            cursor: pointer;
            user-select: none;
            border-top: 1px solid #eee;
        }
        .discussie-header:hover { background: #eaecf0; }
        .discussie-blok:first-child .discussie-header { border-top: none; }

        .discussie-persoon-naam { font-weight: bold; font-size: 0.95rem; color: #1a1a1a; }
        .discussie-persoon-id   { font-size: 0.75rem; color: #888; margin-left: 8px; font-family: monospace; }

        /* ======================= STATUS BADGES — 4 varianten ======================= */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: capitalize;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .status-nieuw         { background: #fff8e1; color: #7c5800; border: 1px solid #ffd54f; }
        .status-open          { background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }
        .status-inbehandeling { background: #fff3e0; color: #bf360c; border: 1px solid #ffb74d; }
        .status-gesloten      { background: #e8f5e9; color: #1b5e20; border: 1px solid #81c784; }

        .discussie-toggle-pijl {
            font-size: 0.8rem;
            color: #888;
            margin-left: 8px;
            transition: transform 0.2s;
        }
        .discussie-blok.ingeklapt .discussie-toggle-pijl { transform: rotate(-90deg); }

        .discussie-body { padding: 16px; }
        .discussie-blok.ingeklapt .discussie-body { display: none; }

        /* ======================= BERICHTEN ======================= */
        .bericht-lijst {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            max-height: 360px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .bericht-item {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.88rem;
            line-height: 1.5;
        }
        .bericht-item.eigen {
            background: #e8f4ff;
            border-color: #b8d9f5;
        }

        .bericht-meta {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .bericht-auteur { font-weight: bold; color: #444; font-size: 0.82rem; }

        .rol-label {
            font-size: 0.68rem;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 4px;
            font-weight: bold;
        }
        .rol-owner  { background: #ffeaa7; color: #6c4f00; }
        .rol-editor { background: #dfe6e9; color: #2d3436; }
        .rol-viewer { background: #e8f5e9; color: #1b5e20; }

        .bericht-status-icoon { font-size: 0.78rem; opacity: 0.75; margin-left: 2px; }
        .bericht-tekst { color: #222; word-break: break-word; }

        .bericht-verwijder {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 2px;
            line-height: 1;
            flex-shrink: 0;
        }
        .bericht-verwijder:hover { color: #e74c3c; }

        .diff-blok {
            margin-top: 8px;
            padding: 8px 10px;
            background: #fff8e1;
            border-left: 3px solid #f39c12;
            border-radius: 0 4px 4px 0;
            font-size: 0.82rem;
            color: #555;
        }
        .diff-blok strong { color: #e67e22; }

        .bericht-leeg {
            text-align: center;
            color: #bbb;
            font-size: 0.85rem;
            padding: 20px 0;
        }

        /* ======================= NIEUW BERICHT FORMULIER ======================= */
        .nieuw-bericht-form {
            border-top: 1px solid #eee;
            padding-top: 14px;
        }
        .nieuw-bericht-form textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.88rem;
            resize: vertical;
            min-height: 72px;
            font-family: inherit;
            line-height: 1.5;
            box-sizing: border-box;
        }
        .nieuw-bericht-form textarea:focus {
            outline: none;
            border-color: #1E90FF;
            box-shadow: 0 0 0 2px rgba(30,144,255,0.15);
        }

        .form-acties {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-select {
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.85rem;
            background: #fff;
            cursor: pointer;
        }

        .diff-invoer-wrapper { width: 100%; margin-top: 8px; display: none; }
        .diff-invoer-wrapper.zichtbaar { display: block; }
        .diff-invoer-wrapper textarea { min-height: 52px; background: #fff8e1; border-color: #f39c12; }
        .diff-invoer-wrapper label {
            font-size: 0.78rem; color: #e67e22; font-weight: bold; display: block; margin-bottom: 4px;
        }

        .knop-diff-toggle {
            padding: 7px 12px;
            background: #fff8e1;
            border: 1px solid #f39c12;
            color: #e67e22;
            border-radius: 5px;
            font-size: 0.82rem;
            cursor: pointer;
            font-weight: bold;
        }
        .knop-diff-toggle:hover { background: #ffeeba; }

        .knop-verzend {
            padding: 7px 18px;
            background: #1E90FF;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 0.88rem;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
        }
        .knop-verzend:hover { background: #1278d4; }
        .knop-verzend:disabled { background: #aaa; cursor: not-allowed; }

        /* ======================= LADEN / FOUT ======================= */
        .laad-indicator {
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            padding: 32px 0;
        }
        .fout-melding {
            background: #fdecea;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }

        /* ======================= MODAL ======================= */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.actief { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 10px;
            padding: 28px 24px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .modal-box h3 { margin: 0 0 16px 0; font-size: 1.05rem; color: #222; }
        .modal-box label { font-size: 0.85rem; color: #555; display: block; margin-bottom: 4px; }
        .modal-box input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            margin-bottom: 14px;
            box-sizing: border-box;
        }
        .modal-box input[type="text"]:focus { outline: none; border-color: #1E90FF; }
        .modal-acties { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
        .knop-annuleer {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.88rem;
            cursor: pointer;
        }
        .knop-annuleer:hover { background: #e0e0e0; }

        /* ======================= RESPONSIVE ======================= */
        @media (max-width: 600px) {
            .form-acties { flex-direction: column; align-items: stretch; }
            .knop-verzend { margin-left: 0; }
            .stamboom-sectie-naam { font-size: 0.92rem; }
        }
    </style>
</head>
<body>

<div id="topbar-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>

<div id="navbar-placeholder"></div>

<main>
    <div class="collab-wrapper">

        <h1 class="collab-titel">💬 Samenwerken</h1>
        <p class="collab-subtitel" id="actieve-boom-label">Stambomen worden geladen…</p>

        <!-- Foutmelding container -->
        <div id="fout-container" style="display:none;"></div>

        <!-- Geen-toegang blok -->
        <div class="geen-toegang-blok" id="geen-toegang-blok" style="display:none;">
            <div class="icoon">🔒</div>
            <h2>Geen toegang tot samenwerken</h2>
            <p>
                De samenwerkingsfunctie is beschikbaar voor Viewers, Editors en Owners
                die zijn uitgenodigd door de stamboom-eigenaar.
            </p>
            <a href="/MyFamTreeCollab/stamboom/storage.html" class="knop-primair">
                Ga naar Opslag
            </a>
        </div>

        <!-- Hoofd collab interface -->
        <div id="collab-interface" style="display:none;">

            <!-- Discussies container — gevuld door collab.js met één sectie per boom -->
            <div id="discussie-container">
                <div class="laad-indicator" id="laad-indicator">Stambomen en berichten laden…</div>
            </div>

        </div>

    </div>
</main>

<!-- Nieuwe discussie modal -->
<div class="modal-overlay" id="nieuwe-discussie-modal">
    <div class="modal-box">
        <h3>➕ Nieuwe discussie starten</h3>
        <label for="modal-persoon-id">Persoon-ID</label>
        <input type="text" id="modal-persoon-id" placeholder="bijv. P-0042">
        <label for="modal-persoon-naam">Naam</label>
        <input type="text" id="modal-persoon-naam" placeholder="bijv. Jan de Vries">
        <div class="modal-acties">
            <button class="knop-annuleer" id="modal-annuleer">Annuleren</button>
            <button class="knop-primair"  id="modal-bevestig">Discussie aanmaken</button>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script>
    /* Laad TopBar, Navbar en Footer via fetch */
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            var ph = document.getElementById('navbar-placeholder');
            if (ph) ph.innerHTML = data;
        });
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            var ph = document.getElementById('footer-placeholder');
            if (ph) ph.innerHTML = data;
        });
</script>

<!-- Verplichte laadvolgorde pagina-scripts -->
<script src="../js/schema.js"></script>          <!-- Veldnamen stamboom -->
<script src="../js/storage.js"></script>         <!-- StamboomStorage — voor livesearch -->
<script src="../js/cloudSync.js"></script>       <!-- CloudSync — eigen bomen voor owner (v2.2.0) -->
<script src="../js/shareModule.js"></script>     <!-- Rolcheck + gedeelde bomen -->
<script src="../js/accessGuard.js"></script>     <!-- Paginabeveiliging -->
<script src="../js/collab.js"></script>          <!-- Paginalogica — altijd LAATSTE -->

<script>
    /* Rolcheck: collab.html is toegankelijk voor viewer, editor en owner.
       AccessGuard wordt als extra laag gebruikt naast de interne rolcheck. */
    document.addEventListener('DOMContentLoaded', function () {
        window.AccessGuard.check(['viewer', 'editor']);    /* Owner altijd doorgelaten */
    });
</script>

</body>
</html>
