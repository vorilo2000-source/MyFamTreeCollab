<!-- ======================= home/reset.html v1.1.0 =======================
     Wachtwoord resetten — gebruiker komt hier via de resetlink in zijn mail
     Supabase logt de gebruiker automatisch in via de token in de URL

     Wijziging v1.1.0 (sessie 26):
     - i18n geïntegreerd: i18next scripts + i18n.js toegevoegd aan <head>
     - Alle statische teksten via data-i18n attributen
     - Dynamische teksten (feedback, knoppen) via i18nModule.t('auth:reset.*')
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded()

     v1.0.0: Nieuwe pagina — verwerkt wachtwoord-reset via Supabase token
     Scripts: supabase → utils.js → auth.js → reset.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Paginatitel wordt via JS gezet na i18n init -->
    <title data-i18n="auth:reset.pageTitle">MyFamTreeCollab - Wachtwoord instellen</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/favicon-192x192.png">

    <!-- ======================= i18next bibliotheken ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ======================= RESET BLOK ======================= */
        .reset-blok {
            max-width: 420px;
            margin: 60px auto;
            padding: 32px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }
        .reset-blok h1 {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #222;
        }
        .reset-blok .subtitel {
            font-size: 0.9rem;
            color: #555;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }

        /* ======================= VELDEN ======================= */
        .reset-veld { margin-bottom: 16px; }
        .reset-veld label {
            display: block;
            font-size: 0.88rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #333;
        }
        .reset-veld input {
            width: 100%;
            padding: 9px 11px;
            font-size: 0.95rem;
            border: 1px solid #bbb;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .reset-veld input:focus { outline: none; border-color: #2563eb; }

        /* ======================= KNOP ======================= */
        .knop-reset {
            width: 100%;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 4px;
        }
        .knop-reset:hover    { background: #1d4ed8; }
        .knop-reset:disabled { background: #93c5fd; cursor: default; }

        /* ======================= FEEDBACK ======================= */
        .reset-msg {
            margin-top: 14px;
            padding: 10px 13px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }
        .reset-msg.error   { background: #fee2e2; color: #991b1b; display: block; }
        .reset-msg.success { background: #dcfce7; color: #166534; display: block; }

        /* ======================= ONGELDIGE TOKEN ======================= */
        .reset-ongeldig {
            display: none;
            text-align: center;
            padding: 16px 0;
        }
        .reset-ongeldig p {
            font-size: 0.95rem;
            color: #555;
            margin: 0 0 16px 0;
        }
        .knop-home {
            display: inline-block;
            padding: 10px 24px;
            background: #1E90FF;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        .knop-home:hover { background: #1278d4; }
    </style>
</head>
<body>

<!-- ======================= TopBar placeholder ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar placeholder ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="reset-blok">

        <!-- Formulier voor nieuw wachtwoord — teksten via data-i18n -->
        <div id="reset-formulier">
            <h1 data-i18n="auth:reset.heading">Nieuw wachtwoord instellen</h1>
            <p class="subtitel" data-i18n="auth:reset.subtitle">Kies een nieuw wachtwoord van minimaal 6 tekens.</p>

            <div class="reset-veld">
                <!-- Label en placeholder worden via JS gezet na i18n init -->
                <label for="reset-pwd" data-i18n="auth:reset.labelPassword">Nieuw wachtwoord</label>
                <input type="password" id="reset-pwd"
                       data-i18n-placeholder="auth:reset.placeholderPassword"
                       placeholder="Minimaal 6 tekens"
                       autocomplete="new-password" />
            </div>
            <div class="reset-veld">
                <label for="reset-pwd2" data-i18n="auth:reset.labelPassword2">Wachtwoord herhalen</label>
                <input type="password" id="reset-pwd2"
                       data-i18n-placeholder="auth:reset.placeholderPassword2"
                       placeholder="Herhaal wachtwoord"
                       autocomplete="new-password" />
            </div>

            <!-- Knoptekst wordt via JS gezet na i18n init -->
            <button class="knop-reset" id="btn-reset" data-i18n="auth:reset.btn">Wachtwoord opslaan</button>
            <div class="reset-msg" id="reset-msg"></div>
        </div>

        <!-- Blok bij ongeldige of verlopen resetlink — tekst via data-i18n -->
        <div class="reset-ongeldig" id="reset-ongeldig">
            <p data-i18n="auth:reset.invalidLink">
                Deze resetlink is ongeldig of verlopen.
                Vraag een nieuwe link aan via de loginpagina.
            </p>
            <!-- Knoptekst via data-i18n -->
            <a href="/MyFamTreeCollab/" class="knop-home" data-i18n="auth:reset.backHome">
                Terug naar Home
            </a>
        </div>

    </div>
</main>

<!-- ======================= Footer placeholder ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= Externe scripts ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>

<script>
// ======================= i18n initialisatie + component fetch =======================
i18nModule.init()
    .then(function () { return i18nModule.loadNamespace('auth'); })
    .then(function () {

    // Paginatitel vertalen
    document.title = i18nModule.t('auth:reset.pageTitle');

    // Placeholder attributen vertalen (data-i18n-placeholder)
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-placeholder');
        if (key) el.placeholder = i18nModule.t(key); // Vertaald placeholder
    });

    // Laad TopBar en activeer i18n + topbar.js
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });

    // Laad Navbar en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
        });

    // Laad Footer en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
        });

}); // einde i18n.then()
</script>

<!-- Reset logica — altijd als laatste, na i18n init -->
<script src="../js/reset.js"></script>

</body>
</html>
