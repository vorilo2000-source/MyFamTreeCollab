<!-- ======================= account/index.html v1.0.0 =======================
     Account overzichtspagina — profiel, cloud stambomen, avatar, wachtwoord
     Standaard paginaformaat: TopBar + Navbar + Footer via fetch()
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Account — MyFamTreeCollab</title>

  <!-- ===== Favicon / App-icoon ===== -->
  <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/favicon-192x192.png">

  <!-- Global stylesheet -->
  <link rel="stylesheet" href="/MyFamTreeCollab/css/style.css" />

  <!-- Page-specific styles -->
  <style>

    /* ── Layout ─────────────────────────────────────────────── */
    .account-wrapper {
      max-width: 860px;                   /* comfortable reading width */
      margin: 2rem auto;                  /* center horizontally */
      padding: 0 1rem 4rem;              /* breathing room */
      display: flex;
      flex-direction: column;
      gap: 2rem;                          /* space between sections */
    }

    /* ── Section card ───────────────────────────────────────── */
    .account-card {
      background: var(--card-bg, #fff);   /* card background */
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .account-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 1.25rem;
      color: var(--heading, #1a202c);
      border-bottom: 2px solid var(--accent, #4f7942);
      padding-bottom: .5rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ── Profile card ───────────────────────────────────────── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1rem;
    }

    .profile-avatar-display {
      font-size: 3.5rem;                  /* large emoji avatar */
      line-height: 1;
      cursor: default;
      user-select: none;
    }

    .profile-meta {
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }

    .profile-meta strong {
      font-size: 1.25rem;
      color: var(--heading, #1a202c);
    }

    .profile-meta small {
      color: var(--muted, #718096);
      font-size: .85rem;
    }

    .profile-details {
      display: grid;
      grid-template-columns: 1fr 1fr;     /* two-column layout */
      gap: .6rem 1.5rem;
      margin-top: .5rem;
    }

    .profile-details .detail-row {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted, #718096);
    }

    .detail-value {
      font-size: .95rem;
      color: var(--text, #2d3748);
      font-weight: 500;
    }

    /* ── Tier badge ─────────────────────────────────────────── */
    .tier-badge {
      display: inline-block;
      padding: .2em .7em;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .badge-free       { background: #e2e8f0; color: #4a5568; }
    .badge-viewer     { background: #bee3f8; color: #2b6cb0; }
    .badge-supporter  { background: #c6f6d5; color: #276749; }
    .badge-personal   { background: #fefcbf; color: #975a16; }
    .badge-family     { background: #fed7e2; color: #97266d; }
    .badge-researcher { background: #e9d8fd; color: #553c9a; }
    .badge-admin      { background: #2d3748; color: #fff;    }

    /* ── Cloud tree list ────────────────────────────────────── */
    .tree-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1rem;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 8px;
      margin-bottom: .6rem;
      background: var(--row-bg, #f7fafc);
      transition: border-color .2s;
    }

    .tree-item--active {
      border-color: var(--accent, #4f7942); /* highlight active tree */
      background: #f0fff4;
    }

    .tree-item__info {
      display: flex;
      flex-direction: column;
      gap: .15rem;
    }

    .tree-item__name {
      font-weight: 600;
      color: var(--heading, #1a202c);
      font-size: .95rem;
    }

    .tree-item__date {
      font-size: .78rem;
      color: var(--muted, #718096);
    }

    .tree-item__actions {
      display: flex;
      gap: .5rem;
    }

    .active-badge {
      display: inline-block;
      margin-left: .4rem;
      padding: .1em .5em;
      background: var(--accent, #4f7942);
      color: #fff;
      border-radius: 10px;
      font-size: .7rem;
      font-weight: 700;
      vertical-align: middle;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-load {
      padding: .35rem .85rem;
      background: var(--accent, #4f7942);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      transition: opacity .15s;
    }

    .btn-load:hover { opacity: .85; }

    .btn-delete {
      padding: .35rem .85rem;
      background: #fff;
      color: #e53e3e;
      border: 1px solid #e53e3e;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      transition: background .15s;
    }

    .btn-delete:hover { background: #fff5f5; }

    .btn-upgrade {
      display: inline-block;
      margin-top: .75rem;
      padding: .5rem 1.25rem;
      background: var(--accent, #4f7942);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: .9rem;
      transition: opacity .15s;
    }

    .btn-upgrade:hover { opacity: .85; }

    /* ── Upgrade / empty / error notices ────────────────────── */
    .upgrade-notice {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted, #718096);
    }

    .upgrade-icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }

    .loading-text, .empty-text { color: var(--muted, #718096); font-style: italic; }
    .error-text   { color: #e53e3e; }

    /* ── Local summary ──────────────────────────────────────── */
    .local-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .local-stat {
      background: var(--row-bg, #f7fafc);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 8px;
      padding: .75rem 1.25rem;
      font-size: .9rem;
      color: var(--text, #2d3748);
      flex: 1 1 200px;
    }

    /* ── Avatar grid ────────────────────────────────────────── */
    #avatar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }

    .avatar-btn {
      font-size: 1.75rem;
      background: var(--row-bg, #f7fafc);
      border: 2px solid var(--border, #e2e8f0);
      border-radius: 10px;
      width: 56px;
      height: 56px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }

    .avatar-btn:hover   { border-color: var(--accent, #4f7942); transform: scale(1.08); }
    .avatar-btn--active { border-color: var(--accent, #4f7942); background: #f0fff4; }

    /* ── Password form ──────────────────────────────────────── */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text, #2d3748);
      margin-bottom: .35rem;
    }

    .form-group input[type="password"] {
      width: 100%;
      max-width: 380px;
      padding: .55rem .85rem;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text, #2d3748);
      background: var(--input-bg, #fff);
      outline: none;
      transition: border-color .15s;
      box-sizing: border-box;
    }

    .form-group input[type="password"]:focus {
      border-color: var(--accent, #4f7942);
    }

    .btn-save-password {
      padding: .5rem 1.25rem;
      background: var(--accent, #4f7942);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn-save-password:hover { opacity: .85; }

    .form-status {
      margin-top: .6rem;
      font-size: .88rem;
      color: var(--muted, #718096);
      min-height: 1.2em;              /* reserve space to prevent layout shift */
    }

    .form-status--success { color: #276749; }
    .form-status--error   { color: #e53e3e; }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: .75rem 1.25rem;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .3s, transform .3s;
      z-index: 9999;
      pointer-events: none;
    }

    .toast--success { background: #276749; }
    .toast--error   { background: #c53030; }
    .toast--visible { opacity: 1; transform: translateY(0); }

    /* ── Cloud access status ────────────────────────────────── */
    #cloud-access-status {
      font-size: .85rem;
      margin-top: .5rem;
      color: var(--muted, #718096);
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .profile-details    { grid-template-columns: 1fr; }
      .tree-item          { flex-direction: column; align-items: flex-start; gap: .5rem; }
      .tree-item__actions { width: 100%; justify-content: flex-end; }
    }

  </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
  <div class="account-wrapper">

    <!-- Page title -->
    <h1 style="margin:0; font-size:1.6rem; color:var(--heading,#1a202c);">
      👤 Mijn Account
    </h1>

    <!-- ── 1. Profiel ──────────────────────────────────────────────────── -->
    <section class="account-card" aria-labelledby="section-profile">
      <h2 id="section-profile">🪪 Profiel</h2>

      <div class="profile-header">
        <span class="profile-avatar-display" id="profile-avatar">👤</span>    <!-- gevuld door account.js -->
        <div class="profile-meta">
          <strong id="profile-username">Laden...</strong>
          <small id="profile-email"></small>
        </div>
      </div>

      <div class="profile-details">
        <div class="detail-row">
          <span class="detail-label">Abonnement</span>
          <span class="detail-value">
            <span class="tier-badge badge-free" id="profile-tier">Gratis</span>
          </span>
          <span id="profile-tier-until"
                style="display:none; font-size:.8rem; color:var(--muted,#718096); margin-top:.2rem;"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Lid sinds</span>
          <span class="detail-value" id="profile-since">—</span>
        </div>
      </div>

      <div id="cloud-access-status"></div>
    </section>

    <!-- ── 2. Cloud stambomen ───────────────────────────────────────────── -->
    <section class="account-card" aria-labelledby="section-cloud">
      <h2 id="section-cloud">☁️ Cloud stambomen</h2>
      <div id="cloud-trees-list">
        <p class="loading-text">Laden...</p>
      </div>
    </section>

    <!-- ── 3. Lokale data ───────────────────────────────────────────────── -->
    <section class="account-card" aria-labelledby="section-local">
      <h2 id="section-local">💾 Lokale data</h2>
      <div class="local-summary">
        <div class="local-stat" id="local-count">Laden...</div>
        <div class="local-stat" id="local-active">—</div>
      </div>
    </section>

    <!-- ── 4. Avatar kiezen ─────────────────────────────────────────────── -->
    <section class="account-card" aria-labelledby="section-avatar">
      <h2 id="section-avatar">🎭 Avatar kiezen</h2>
      <p style="font-size:.88rem; color:var(--muted,#718096); margin:0 0 1rem;">
        Klik op een avatar om hem op te slaan.
      </p>
      <div id="avatar-grid" role="group" aria-label="Avatar keuze"></div>
    </section>

    <!-- ── 5. Wachtwoord wijzigen ───────────────────────────────────────── -->
    <section class="account-card" aria-labelledby="section-password">
      <h2 id="section-password">🔒 Wachtwoord wijzigen</h2>

      <form id="password-form" novalidate>
        <div class="form-group">
          <label for="new-password">Nieuw wachtwoord</label>
          <input type="password" id="new-password"
                 placeholder="Minimaal 8 tekens"
                 autocomplete="new-password" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Wachtwoord bevestigen</label>
          <input type="password" id="confirm-password"
                 placeholder="Herhaal wachtwoord"
                 autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn-save-password">Opslaan</button>
        <p class="form-status" id="password-status" aria-live="polite"></p>
      </form>
    </section>

  </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — volgorde is verplicht:
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. schema.js           — vereist door storage.js
     4. storage.js          — vereist door account.js
     5. auth.js             — vereist door topbar.js + account.js
     6. cloudSync.js        — vereist door account.js
     7. TopBar fetch        — laadt TopBar HTML, daarna topbar.js
     8. Navbar + Footer     — onafhankelijk, mag parallel
     9. account.js          — altijd als laatste
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/MyFamTreeCollab/js/utils.js"></script>
<script src="/MyFamTreeCollab/js/schema.js"></script>
<script src="/MyFamTreeCollab/js/storage.js"></script>
<script src="/MyFamTreeCollab/js/auth.js"></script>
<script src="/MyFamTreeCollab/js/cloudSync.js"></script>

<script>
    // Stap 1: TopBar HTML laden, daarna PAS topbar.js injecteren
    // Dit garandeert dat #top-auth in de DOM zit vóór topbar.js initialiseert
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;
            // #top-auth bestaat nu — veilig om topbar.js te laden
            var s = document.createElement('script');
            s.src = '/MyFamTreeCollab/js/topbar.js';
            document.body.appendChild(s);
        });

    // Stap 2: Navbar laden — geen auth-afhankelijkheid, mag parallel
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('navbar-placeholder').innerHTML = data;
        });

    // Stap 3: Footer laden
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

<!-- Pagina-specifiek: account.js altijd als laatste -->
<script src="/MyFamTreeCollab/account/account.js"></script>

</body>
</html>
