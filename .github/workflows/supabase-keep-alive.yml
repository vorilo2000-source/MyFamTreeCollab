# ==============================================================================
# File: .github/workflows/supabase-keep-alive.yml
# Version: 1.1.0
# Description: Weekly workflow to prevent Supabase project from being paused
#              due to inactivity. Sends a lightweight REST request to Supabase.
# ==============================================================================

name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          ENDPOINT="${SUPABASE_URL}/rest/v1/page_visits?select=id&limit=1"

          echo "Pinging: $ENDPOINT"

          RESPONSE=$(curl --silent --show-error \
            --write-out "%{http_code}" \
            --output /dev/null \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${ENDPOINT}")

          echo "Supabase response status: $RESPONSE"

          if [[ "$RESPONSE" -lt 200 || "$RESPONSE" -ge 300 ]]; then
            echo "ERROR: Unexpected response code $RESPONSE"
            exit 1
          fi

          echo "Supabase ping successful."
