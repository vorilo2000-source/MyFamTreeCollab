<!-- ======================= admin/projectlog.html v2.0.0 =======================
    Project Log Editor — admin only

    Wijzigingen v1.0.0 (sessie 37):
     - Initiële versie
     - Laadt PROJECT_LOG.md via 📂 knop
     - Sessies als uitklapbare kaarten
     - Zoeken op sessietitel of inhoud
     - Log bewaard in localStorage (pl_log)
     - Zelfde look & feel als backlog.html en analytics.html
     - Toegangsbeveiliging via AdminGuard.protect('admin')

    Wijzigingen v1.1.0 (sessie 40):
     - Fix: localStorage key bl_log → pl_log (pl_ prefix)
     - Fix: agendaStore.js toegevoegd aan script-laadvolgorde
     - Fix: tabel flush bij einde sessie-body
     - Fix: ## Bijgewerkt / blockquote / --- overgeslagen in rawLines

    Wijzigingen v2.0.0 (sessie 40):
     - Viewer uitgebreid naar volwaardige editor (zelfde patroon als backlog.html)
     - + Toevoegen knop: nieuwe sessie via modal
     - Sessies bewerken en verwijderen
     - 💾 Opslaan in localStorage (pl_items)
     - 📝 MD exporteren als PROJECT_LOG.md
     - AgendaStore.sync() na elke _save() zodat sessiedatums in agenda.html zichtbaar zijn
     - Sessievelden: nummer, titel, datum, versie, uitgevoerd, niet uitgevoerd, notities

    Afhankelijkheden:
     - ../js/utils.js · ../js/auth.js
     - /MyFamTreeCollab/js/adminGuard.js
     - /MyFamTreeCollab/js/siteAnalytics.js
     - ../js/agendaStore.js
     - ../js/topbar.js (via fetch)
    ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Log — Admin</title>
  <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── CSS variabelen: zelfde palet als backlog.html ── */
    :root {
      --bg-main:     #565656;
      --bg-card:     #3a3a3a;
      --bg-card-alt: #444444;
      --accent:      #00d4aa;
      --accent-dim:  rgba(0,212,170,0.15);
      --text-primary:#f0f0f0;
      --text-muted:  #aaa;
      --border:      rgba(255,255,255,0.08);
      --font-mono:   'IBM Plex Mono', monospace;
      --font-sans:   'IBM Plex Sans', sans-serif;
      --radius:      8px;
      --shadow:      0 4px 20px rgba(0,0,0,0.35);
      --color-danger:#f08080;
    }
    /* ── Toegangsblokken ── */
    #accessDenied { display:none; text-align:center; padding:4rem 2rem; color:var(--text-primary); font-family:var(--font-sans); }
    #page-content  { display:none; }
    /* ── Main layout ── */
    main { background:var(--bg-main); min-height:100vh; padding:150px 20px 64px; font-family:var(--font-sans); color:var(--text-primary); }
    .dash-wrap { max-width:900px; margin:0 auto; }
    /* ── Animatie ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    /* ── Header ── */
    .log-header { margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1.25rem; }
    .log-title { font-family:var(--font-mono); font-size:1.5rem; font-weight:600; color:var(--accent); margin:0 0 6px; }
    .log-meta { font-family:var(--font-mono); font-size:0.78rem; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap; }
    .log-meta b { color:var(--accent); }
    /* ── Acties ── */
    .log-actions { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center; }
    /* ── Knoppen ── */
    .btn { font-family:var(--font-mono); font-size:0.8rem; display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border:1px solid rgba(255,255,255,0.2); border-radius:var(--radius); background:var(--bg-card); color:var(--text-primary); cursor:pointer; transition:background .2s; text-decoration:none; }
    .btn:hover { background:var(--bg-card-alt); }
    .btn-accent { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
    .btn-accent:hover { background:rgba(0,212,170,0.28); }
    .btn-ghost { border-color:transparent; background:transparent; color:var(--text-muted); }
    .btn-ghost:hover { background:rgba(255,255,255,0.06); }
    .btn-danger { background:rgba(240,128,128,0.15); color:var(--color-danger); border-color:var(--color-danger); }
    .btn-danger:hover { background:rgba(240,128,128,0.28); }
    /* ── Zoekbalk ── */
    .search-bar { width:100%; font-family:var(--font-mono); font-size:0.82rem; padding:8px 14px; border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius); background:#2a2a2a; color:var(--text-primary); outline:none; margin-bottom:1.25rem; box-sizing:border-box; }
    .search-bar:focus { border-color:var(--accent); }
    /* ── Lege staat ── */
    .log-empty { text-align:center; padding:4rem 2rem; border:1px solid var(--border); border-radius:var(--radius); font-family:var(--font-mono); font-size:0.85rem; color:var(--text-muted); animation:fadeUp .3s ease; }
    /* ── Sessiekaart ── */
    .log-session { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; animation:fadeUp .3s ease; box-shadow:var(--shadow); position:relative; }
    .log-session-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; cursor:pointer; user-select:none; transition:background .15s; gap:12px; }
    .log-session-header:hover { background:var(--bg-card-alt); }
    .log-session-header::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); border-radius:var(--radius) 0 0 var(--radius); }
    .log-session-left { display:flex; flex-direction:column; gap:3px; flex:1; }
    .log-session-title { font-family:var(--font-mono); font-size:0.88rem; font-weight:600; color:var(--accent); }
    .log-session-date { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted); }
    .log-session-actions { display:flex; gap:4px; flex-shrink:0; }
    .log-session-toggle { font-size:0.75rem; color:var(--text-muted); transition:transform .2s; flex-shrink:0; }
    .log-session.open .log-session-toggle { transform:rotate(180deg); }
    .log-session-body { display:none; padding:0 18px 18px; border-top:1px solid var(--border); }
    .log-session.open .log-session-body { display:block; }
    /* ── Markdown content ── */
    .log-md { padding-top:12px; }
    .log-md h3 { font-family:var(--font-mono); font-size:0.82rem; color:var(--accent); margin:16px 0 6px; text-transform:uppercase; letter-spacing:0.5px; }
    .log-md p { font-family:var(--font-sans); font-size:0.82rem; color:var(--text-muted); line-height:1.7; margin:4px 0 8px; }
    .log-md ul { padding-left:18px; margin:4px 0 12px; }
    .log-md li { font-family:var(--font-sans); font-size:0.82rem; color:var(--text-muted); line-height:1.7; margin-bottom:2px; }
    .log-md code { font-family:var(--font-mono); font-size:0.75rem; background:rgba(0,212,170,0.1); color:var(--accent); padding:1px 6px; border-radius:4px; }
    .log-md strong { color:var(--text-primary); font-weight:600; }
    .log-md table { width:100%; border-collapse:separate; border-spacing:0; margin:10px 0 16px; font-family:var(--font-mono); font-size:0.72rem; border-radius:var(--radius); overflow:hidden; }
    .log-md thead th { background:#1a7a4a; color:#fff; padding:8px 12px; text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:1px; border-bottom:2px solid #0f5c35; }
    .log-md tbody td { padding:7px 12px; background:#c8c8c8; color:#1a1a1a; border-bottom:1px solid #aaa; }
    .log-md tbody tr:last-child td { border-bottom:none; }
    .log-md tbody tr:hover td { background:#d8d8d8; }
    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center; z-index:100; padding:16px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; width:100%; max-width:620px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); animation:fadeUp .25s ease; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; border-bottom:1px solid var(--border); padding-bottom:12px; }
    .modal-header h2 { font-family:var(--font-mono); font-size:1rem; font-weight:600; color:var(--accent); margin:0; }
    .modal-body { display:flex; flex-direction:column; gap:12px; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem; border-top:1px solid var(--border); padding-top:12px; }
    /* ── Formulierelementen ── */
    .form-label { font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); display:block; margin-bottom:4px; }
    .form-input { font-family:var(--font-mono); font-size:0.82rem; width:100%; padding:7px 10px; border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius); background:#2a2a2a; color:var(--text-primary); outline:none; box-sizing:border-box; }
    .form-input:focus { border-color:var(--accent); }
    textarea.form-input { resize:vertical; font-family:var(--font-sans); font-size:0.82rem; line-height:1.6; }
    .form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:500px){ .form-grid2{ grid-template-columns:1fr; } }
    /* ── Toegang geweigerd ── */
    .access-denied { background:var(--bg-card); border:1px solid var(--color-danger); border-radius:var(--radius); padding:32px; text-align:center; max-width:480px; margin:60px auto; }
    .access-denied h2 { font-size:1.2rem; color:var(--color-danger); margin-bottom:10px; font-family:var(--font-sans); }
    .access-denied p { font-size:0.9rem; color:var(--text-muted); line-height:1.6; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <div id="topbar-placeholder"></div>
  <div id="navbar-placeholder"></div>

  <div id="accessDenied">
    <div class="access-denied">
      <h2>Geen toegang</h2>
      <p>Deze pagina is alleen toegankelijk voor administrators.<br>Log in met een admin-account om verder te gaan.</p>
    </div>
  </div>

  <div id="page-content">
    <main>
      <div class="dash-wrap">

        <!-- Header -->
        <div class="log-header">
          <div class="log-title">&#x1F4D6; Project Log</div>
          <div class="log-meta" id="log-meta"></div>
        </div>

        <!-- Acties: zelfde patroon als backlog.html -->
        <div class="log-actions">
          <label class="btn" style="cursor:pointer">
            &#x1F4C2; Laden
            <input type="file" id="input-log-file" accept=".md" style="display:none"/>
          </label>
          <button class="btn" id="btn-save">&#x1F4BE; Opslaan</button>
          <button class="btn" id="btn-export-md">&#x1F4DD; MD exporteren</button>
          <button class="btn btn-accent" id="btn-add">+ Toevoegen</button>
          <!-- Link naar centrale agenda: sessiedatums zichtbaar via AgendaStore.sync() -->
          <a class="btn" href="/MyFamTreeCollab/admin/agenda.html" style="text-decoration:none">&#x1F4C5; Naar agenda</a>
          <span style="flex:1"></span>
          <button class="btn btn-danger" id="btn-clear-log" title="Wist de opgeslagen log uit localStorage">&#x1F5D1; Log wissen</button>
        </div>

        <!-- Uitklap/inklap knoppen -->
        <div style="display:flex;gap:8px;margin-bottom:1rem;">
          <button class="btn btn-ghost" id="btn-expand-all">&#x25BC; Alles uitklappen</button>
          <button class="btn btn-ghost" id="btn-collapse-all">&#x25B2; Alles inklappen</button>
        </div>

        <!-- Zoeken -->
        <input type="search" class="search-bar" id="input-search" placeholder="Zoeken in sessietitels en inhoud&hellip;"/>

        <!-- Sessiekaarten -->
        <div id="log-content">
          <div class="log-empty">Laad een PROJECT_LOG.md bestand of voeg een sessie toe.</div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal: sessie toevoegen / bewerken -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Sessie toevoegen</h2>
        <button class="btn btn-ghost" id="btn-modal-close" style="font-size:18px;padding:4px 8px">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid2">
          <div>
            <label class="form-label">Sessienummer</label>
            <input class="form-input" type="number" id="f-nr" placeholder="40"/>
          </div>
          <div>
            <label class="form-label">Datum</label>
            <input class="form-input" type="date" id="f-date"/>
          </div>
        </div>
        <div>
          <label class="form-label">Titel *</label>
          <input class="form-input" type="text" id="f-title" placeholder="Korte beschrijving van de sessie"/>
        </div>
        <div>
          <label class="form-label">Versie(s)</label>
          <input class="form-input" type="text" id="f-version" placeholder="backlog.html v5.3.2, CLAUDE.md v1.0.0"/>
        </div>
        <div>
          <label class="form-label">Uitgevoerd <span style="opacity:.5;font-size:0.68rem">(één item per regel)</span></label>
          <textarea class="form-input" id="f-done" rows="5" placeholder="- Item 1&#10;- Item 2"></textarea>
        </div>
        <div>
          <label class="form-label">Niet uitgevoerd <span style="opacity:.5;font-size:0.68rem">(één item per regel)</span></label>
          <textarea class="form-input" id="f-notdone" rows="3" placeholder="- Item 1&#10;- Item 2"></textarea>
        </div>
        <div>
          <label class="form-label">Notities / extra secties</label>
          <textarea class="form-input" id="f-notes" rows="4" placeholder="Vrije markdown inhoud&hellip;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-modal-cancel">Annuleren</button>
        <button class="btn btn-accent" id="btn-modal-save">Toevoegen</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <!-- Scripts: verplichte volgorde -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="/MyFamTreeCollab/js/adminGuard.js"></script>
  <script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>
  <!-- agendaStore voor de module laden zodat AgendaStore.sync() beschikbaar is -->
  <script src="../js/agendaStore.js"></script>

  <script>
  // Layout laden: topbar -> admin-check -> Log.init()
  fetch('/MyFamTreeCollab/Layout/TopBar.html').then(r=>r.text()).then(html=>{
    document.getElementById('topbar-placeholder').innerHTML=html; // topbar injecteren
    const s=document.createElement('script'); s.src='../js/topbar.js'; // topbar.js dynamisch laden
    s.onload=()=>AdminGuard.protect('admin').then(ok=>{ if(ok) Log.init(); }); // alleen admins
    document.body.appendChild(s);
  });
  fetch('/MyFamTreeCollab/Layout/Navbar.html').then(r=>r.text()).then(html=>{ document.getElementById('navbar-placeholder').innerHTML=html; }); // navbar injecteren
  fetch('/MyFamTreeCollab/Layout/Footer.html').then(r=>r.text()).then(html=>{ document.getElementById('footer-placeholder').innerHTML=html; }); // footer injecteren

  // ================================================================
  // PROJECT LOG MODULE v2.0.0 - vanilla JS
  // Patroon: zelfde structuur als backlog.html (Backlog module)
  // ================================================================
  const Log = (() => {
    const $=id=>document.getElementById(id); // DOM helper: element ophalen op ID
    let sessions=[]; // array van alle sessie-objecten
    let search='';   // actieve zoekterm
    let editIdx=null; // index van sessie in bewerking (null = nieuwe sessie)

    // Initialisatie: event listeners koppelen en opgeslagen data laden
    function init() {
      _bindEvents(); // alle event listeners registreren
      const saved=localStorage.getItem('pl_items'); // probeer opgeslagen sessies te laden
      if(saved) { sessions=JSON.parse(saved); _renderAll(); } // parse JSON en render
      else {
        const legacy=localStorage.getItem('pl_log'); // fallback: oude viewer-cache
        if(legacy) _parseMD(legacy); // converteer oude MD-tekst naar sessie-objecten
      }
    }

    // Event bindings: koppel alle knoppen en inputs aan handlers
    function _bindEvents() {
      $('input-log-file').addEventListener('change', _loadFile); // MD bestand laden via file picker
      $('input-search').addEventListener('input', e=>{ search=e.target.value; _renderSessions(); }); // live zoeken bij typen
      $('btn-expand-all').addEventListener('click', ()=>{ document.querySelectorAll('.log-session').forEach(s=>s.classList.add('open')); }); // alle kaarten uitklappen
      $('btn-collapse-all').addEventListener('click', ()=>{ document.querySelectorAll('.log-session').forEach(s=>s.classList.remove('open')); }); // alle kaarten inklappen
      $('btn-save').addEventListener('click', _save); // handmatig opslaan in localStorage
      $('btn-export-md').addEventListener('click', _exportMD); // download als PROJECT_LOG.md
      $('btn-add').addEventListener('click', ()=>_openModal()); // open lege modal voor nieuwe sessie
      $('btn-modal-close').addEventListener('click', _closeModal); // sluit modal via X knop
      $('btn-modal-cancel').addEventListener('click', _closeModal); // sluit modal via Annuleren
      $('btn-modal-save').addEventListener('click', _saveSession); // sla sessie op vanuit modal
      $('modal').addEventListener('click', e=>{ if(e.target===$('modal'))_closeModal(); }); // klik buiten modal sluit hem
      $('btn-clear-log').addEventListener('click', ()=>{ // wis alle sessies na bevestiging
        if(!confirm('Alle sessies wissen?\nDit kan niet ongedaan worden gemaakt.')) return;
        localStorage.removeItem('pl_items'); // verwijder sessie-data uit localStorage
        localStorage.removeItem('pl_log');   // verwijder ook oude viewer-cache
        sessions=[]; search=''; $('input-search').value=''; // reset state
        _renderAll(); // render lege staat
        _agSync();    // ag_cache leegmaken via AgendaStore
      });
    }

    // Bestand laden: leest gekozen MD bestand en vervangt huidige sessies
    function _loadFile(e) {
      const file=e.target.files[0]; if(!file) return; // geen bestand geselecteerd
      if(!confirm('Huidige sessies vervangen door '+file.name+'?')) { e.target.value=''; return; } // bevestiging vragen
      const reader=new FileReader(); // FileReader voor tekst-inhoud
      reader.onload=ev=>{ _parseMD(ev.target.result); e.target.value=''; }; // parse geladen MD tekst
      reader.readAsText(file); // start lezen als tekst
    }

    // MD parser: converteert PROJECT_LOG.md tekst naar sessie-objecten array
    function _parseMD(text) {
      const lines=text.split('\n'); // splits volledige tekst in regels
      sessions=[]; // reset bestaande sessies
      let cur=null; // huidige sessie in opbouw

      for(const line of lines) {
        if(line.startsWith('## ')&&line.toLowerCase().includes('sessie')) { // sessie-header detecteren
          if(cur) sessions.push(cur); // vorige sessie opslaan voor we nieuwe starten
          const raw=line.replace(/^##\s*/,'').trim(); // verwijder ## prefix en witruimte
          const dash=raw.indexOf('\u2014'); // zoek em-dash scheidingsteken
          const nr=raw.match(/\d+/)?.[0]||''; // extraheer sessienummer via regex
          const title=dash>-1?raw.slice(dash+1).trim():raw; // titel na dash, of volledige tekst
          cur={ nr, title, date:'', version:'', done:'', notdone:'', notes:'', _section:'' }; // nieuw sessie-object
          continue;
        }
        if(!cur) continue; // geen actieve sessie, sla regel over
        if(line.startsWith('**Datum:**')) { cur.date=line.replace('**Datum:**','').trim(); continue; } // datum extraheren
        if(line.startsWith('**Versie:**')) { cur.version=line.replace('**Versie:**','').trim(); continue; } // versie extraheren
        if(line.startsWith('## Bijgewerkt:')) continue; // log-metadata overslaan
        if(line.startsWith('> '))             continue; // blockquote overslaan
        if(line.startsWith('---'))            continue; // horizontale lijn overslaan
        if(line.startsWith('### Uitgevoerd'))      { cur._section='done';    continue; } // sectie wisselen naar uitgevoerd
        if(line.startsWith('### Niet uitgevoerd')) { cur._section='notdone'; continue; } // sectie wisselen naar niet uitgevoerd
        if(line.startsWith('### '))                { cur._section='notes';   continue; } // overige ### naar notities
        if(cur._section==='done')    cur.done    +=(cur.done   ?'\n':'')+line; // regel toevoegen aan uitgevoerd
        else if(cur._section==='notdone') cur.notdone+=(cur.notdone?'\n':'')+line; // regel toevoegen aan niet uitgevoerd
        else if(cur._section==='notes')   cur.notes  +=(cur.notes  ?'\n':'')+line; // regel toevoegen aan notities
      }
      if(cur) sessions.push(cur); // laatste sessie toevoegen na einde loop
      _save(); // opslaan in localStorage
      _renderAll(); // renderen na laden
    }

    // AgendaStore sync: roept AgendaStore.sync() aan als de module beschikbaar is
    function _agSync() {
      if(typeof AgendaStore !== 'undefined') {
        localStorage.setItem('pl_items', JSON.stringify(sessions)); // zorg dat ag_cache actuele pl_items leest
        AgendaStore.sync(); // herberekent ag_cache zodat sessiedatums in agenda.html zichtbaar zijn
      }
    }

    // Opslaan: persist sessies in localStorage en sync agenda
    function _save() {
      localStorage.setItem('pl_items', JSON.stringify(sessions)); // sessies als JSON opslaan
      _agSync(); // agenda bijwerken na elke save
      _renderMeta(); // meta-balk bijwerken met actuele tellingen
    }

    // MD export: genereert PROJECT_LOG.md en triggert download
    function _exportMD() {
      let md='# MyFamTreeCollab \u2014 Project Log\n'; // document-header met projectnaam
      md+='## Bijgewerkt: '+new Date().toLocaleDateString('nl-BE')+'\n\n'; // huidige datum als bijgewerkt-datum
      md+='> Chronologisch overzicht van alle sessies en wijzigingen.\n\n---\n\n'; // intro blockquote

      for(const s of sessions) { // itereer over alle sessies
        md+='## Sessie '+s.nr+' \u2014 '+s.title+'\n\n'; // sessie-header met nummer en titel
        if(s.date)    md+='**Datum:** '+s.date+'\n'; // datum indien aanwezig
        if(s.version) md+='**Versie:** '+s.version+'\n'; // versie indien aanwezig
        md+='\n'; // lege regel na metadata
        if(s.done&&s.done.trim()) { // uitgevoerd sectie alleen als er inhoud is
          md+='### Uitgevoerd\n'; // sectie-header
          md+=s.done.trim().split('\n').map(l=>l.startsWith('-')?l:'- '+l).join('\n')+'\n\n'; // zorg voor - prefix op elke regel
        }
        if(s.notdone&&s.notdone.trim()) { // niet uitgevoerd sectie alleen als er inhoud is
          md+='### Niet uitgevoerd\n'; // sectie-header
          md+=s.notdone.trim().split('\n').map(l=>l.startsWith('-')?l:'- '+l).join('\n')+'\n\n'; // zorg voor - prefix
        }
        if(s.notes&&s.notes.trim()) { // notities alleen als er inhoud is
          md+=s.notes.trim()+'\n\n'; // vrije markdown inhoud ongewijzigd
        }
        md+='---\n\n'; // sessie-scheiding
      }

      const blob=new Blob([md],{type:'text/markdown'}); // blob aanmaken voor download
      const a=document.createElement('a'); // tijdelijke anchor element
      a.href=URL.createObjectURL(blob); // object URL toewijzen
      a.download='PROJECT_LOG.md'; // bestandsnaam voor download
      a.click(); // download triggeren
    }

    // Render alles: meta-balk en sessiekaarten
    function _renderAll() { _renderMeta(); _renderSessions(); }

    // Meta-balk: toont aantal sessies en datum van meest recente sessie
    function _renderMeta() {
      $('log-meta').innerHTML=
        '<span>\u{1F4CB} <b>'+sessions.length+'</b> sessies</span>'+ // totaal aantal sessies
        (sessions.length?'<span>\u{1F4C5} Laatste: <b>'+(sessions[0].date||'\u2014')+'</b></span>':''); // datum eerste (nieuwste) sessie
    }

    // Sessies renderen met zoekfilter
    function _renderSessions() {
      const q=search.toLowerCase().trim(); // zoekterm in lowercase voor case-insensitive vergelijking
      const filtered=sessions.map((s,i)=>({s,i})).filter(({s})=>{ // filter met originele index behouden
        if(!q) return true; // geen zoekterm: alles tonen
        return (s.nr+s.title+s.done+s.notdone+s.notes).toLowerCase().includes(q); // zoek in alle tekstvelden
      });

      if(!sessions.length) { // geen sessies aanwezig
        $('log-content').innerHTML='<div class="log-empty">Laad een PROJECT_LOG.md bestand of voeg een sessie toe.</div>';
        return;
      }
      if(!filtered.length) { // zoekterm levert geen resultaten
        $('log-content').innerHTML='<div class="log-empty">Geen sessies gevonden voor &ldquo;'+_esc(q)+'&rdquo;</div>';
        return;
      }

      $('log-content').innerHTML=filtered.map(function(item){ // map over gefilterde sessies
        var s=item.s, i=item.i; // destructureer sessie en index
        return '<div class="log-session" id="log-s-'+i+'">'
          +'<div class="log-session-header" data-idx="'+i+'">'
          +'<div class="log-session-left">'
          +'<div class="log-session-title">Sessie '+_esc(s.nr)+' \u2014 '+_esc(s.title)+'</div>'
          +(s.date?'<div class="log-session-date">\u{1F4C5} '+_esc(s.date)+(s.version?' \u00B7 '+_esc(s.version):'')+' </div>':'')
          +'</div>'
          +'<div class="log-session-actions">'
          +'<button class="btn btn-ghost" data-edit="'+i+'" style="padding:2px 6px;font-size:11px" title="Bewerken">\u270F\uFE0F</button>'
          +'<button class="btn btn-ghost" data-delete="'+i+'" style="padding:2px 6px;font-size:11px" title="Verwijderen">\u{1F5D1}</button>'
          +'</div>'
          +'<span class="log-session-toggle">\u25BC</span>'
          +'</div>'
          +'<div class="log-session-body"><div class="log-md">'+_renderBody(s)+'</div></div>'
          +'</div>';
      }).join(''); // alle kaarten samenvoegen

      $('log-content').querySelectorAll('.log-session-header').forEach(function(el){ // toggle handlers
        el.addEventListener('click', function(e){
          if(e.target.dataset.edit||e.target.dataset.delete) return; // edit/delete knoppen niet togglen
          document.getElementById('log-s-'+el.dataset.idx).classList.toggle('open'); // uit/inklappen
        });
      });

      $('log-content').querySelectorAll('[data-edit]').forEach(function(btn){ // bewerken handlers
        btn.addEventListener('click', function(){ _openModal(parseInt(btn.dataset.edit)); }); // open modal met sessie data
      });

      $('log-content').querySelectorAll('[data-delete]').forEach(function(btn){ // verwijderen handlers
        btn.addEventListener('click', function(){ _deleteSession(parseInt(btn.dataset.delete)); }); // verwijder sessie
      });

      var first=$('log-content').querySelector('.log-session'); // eerste kaart selecteren
      if(first) first.classList.add('open'); // eerste sessie standaard uitklappen
    }

    // Sessie-body: genereert HTML voor inhoud van een sessiekaart
    function _renderBody(s) {
      var html='';
      if(s.done&&s.done.trim()) { // uitgevoerd sectie
        html+='<h3>Uitgevoerd</h3><ul>';
        s.done.trim().split('\n').filter(function(l){ return l.trim(); }).forEach(function(l){ // lege regels overslaan
          html+='<li>'+_inline(l.replace(/^[-*]\s*/,''))+'</li>'; // list-prefix strippen
        });
        html+='</ul>';
      }
      if(s.notdone&&s.notdone.trim()) { // niet uitgevoerd sectie
        html+='<h3>Niet uitgevoerd</h3><ul>';
        s.notdone.trim().split('\n').filter(function(l){ return l.trim(); }).forEach(function(l){
          html+='<li>'+_inline(l.replace(/^[-*]\s*/,''))+'</li>';
        });
        html+='</ul>';
      }
      if(s.notes&&s.notes.trim()) { // notities via MD parser
        html+=_mdToHtml(s.notes);
      }
      return html||'<p style="color:var(--text-muted);font-size:0.8rem">Geen inhoud.</p>'; // lege staat
    }

    // Modal openen: vult velden in voor bewerken, of lege velden voor nieuw
    function _openModal(idx) {
      editIdx=(idx!==undefined)?idx:null; // bewerkings-index opslaan
      $('modal-title').textContent    = editIdx!==null?'Sessie bewerken':'Sessie toevoegen'; // modal-titel aanpassen
      $('btn-modal-save').textContent = editIdx!==null?'Opslaan':'Toevoegen'; // knop-label aanpassen

      if(editIdx!==null) { // bestaande sessie bewerken: velden invullen
        var s=sessions[editIdx]; // sessie-data ophalen
        $('f-nr').value      = s.nr      ||''; // sessienummer invullen
        $('f-title').value   = s.title   ||''; // titel invullen
        $('f-date').value    = _toInputDate(s.date); // datum converteren naar input formaat
        $('f-version').value = s.version ||''; // versie invullen
        $('f-done').value    = s.done    ||''; // uitgevoerd invullen
        $('f-notdone').value = s.notdone ||''; // niet uitgevoerd invullen
        $('f-notes').value   = s.notes   ||''; // notities invullen
      } else { // nieuwe sessie: automatisch volgend nummer berekenen
        var maxNr=sessions.reduce(function(m,s){ return Math.max(m,parseInt(s.nr)||0); },0); // hoogste bestaande nummer
        $('f-nr').value      = maxNr+1; // automatisch volgend sessienummer
        $('f-title').value   = ''; // lege titel
        $('f-date').value    = new Date().toISOString().slice(0,10); // vandaag als standaard datum
        $('f-version').value = ''; // lege versie
        $('f-done').value    = ''; // leeg uitgevoerd
        $('f-notdone').value = ''; // leeg niet uitgevoerd
        $('f-notes').value   = ''; // lege notities
      }
      $('modal').classList.add('open'); // modal zichtbaar maken
      $('f-title').focus(); // focus op titelveld voor directe invoer
    }

    // Modal sluiten: verberg modal en reset bewerkings-index
    function _closeModal() { $('modal').classList.remove('open'); editIdx=null; }

    // Sessie opslaan vanuit modal: valideer en sla op
    function _saveSession() {
      var title=$('f-title').value.trim(); if(!title){ $('f-title').focus(); return; } // titel is verplicht
      var session={ // sessie-object samenstellen uit formuliervelden
        nr:      $('f-nr').value.trim(), // sessienummer
        title:   title, // titel (al getrimd)
        date:    _fromInputDate($('f-date').value), // datum converteren naar weergave-formaat
        version: $('f-version').value.trim(), // versie(s)
        done:    $('f-done').value.trim(), // uitgevoerd items
        notdone: $('f-notdone').value.trim(), // niet uitgevoerd items
        notes:   $('f-notes').value.trim() // notities
      };
      if(editIdx!==null) sessions[editIdx]=session; // bestaande sessie overschrijven
      else sessions.unshift(session); // nieuwe sessie bovenaan toevoegen (nieuwste eerst)
      _save();       // persisteren in localStorage
      _closeModal(); // modal sluiten
      _renderAll();  // herrenderen met nieuwe data
    }

    // Sessie verwijderen na bevestiging
    function _deleteSession(idx) {
      if(!confirm('Sessie "'+sessions[idx].title+'" verwijderen?')) return; // bevestiging vragen
      sessions.splice(idx,1); // sessie uit array verwijderen
      _save();      // persisteren
      _renderAll(); // herrenderen
    }

    // Datum naar input formaat: DD-MM-YYYY of YYYY-MM-DD -> YYYY-MM-DD
    function _toInputDate(d) {
      if(!d) return ''; // lege string teruggeven als geen datum
      if(d.includes('-')&&d.length===10) { // controleer op datum-formaat
        var p=d.split('-'); // splits op koppelteken
        if(p[0].length===4) return d; // al YYYY-MM-DD formaat
        return p[2]+'-'+p[1]+'-'+p[0]; // DD-MM-YYYY omdraaien naar YYYY-MM-DD
      }
      return d; // ongewijzigd teruggeven als formaat onbekend
    }

    // Datum van input formaat: YYYY-MM-DD -> DD-MM-YYYY voor weergave
    function _fromInputDate(d) {
      if(!d) return ''; // lege string teruggeven als geen datum
      var p=d.split('-'); // splits op koppelteken
      return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:d; // omdraaien naar DD-MM-YYYY of ongewijzigd
    }

    // MD naar HTML converter: voor notities-veld met tabellen, lijsten, koppen
    function _mdToHtml(text) {
      var lines=text.split('\n'); // splits op regels
      var html='', inList=false, inTable=false, tableRows=[]; // staat-variabelen

      function flushTable(){ // tabel naar HTML omzetten en resetten
        if(!tableRows.length){inTable=false;return;} // niets te flushen
        html+='<table><thead><tr>'+tableRows[0].map(function(c){return '<th>'+_inline(c)+'</th>';}).join('')+'</tr></thead><tbody>'; // header rij
        tableRows.slice(2).forEach(function(row){ html+='<tr>'+row.map(function(c){return '<td>'+_inline(c)+'</td>';}).join('')+'</tr>'; }); // data rijen, sla scheidingslijn over
        html+='</tbody></table>';
        tableRows=[]; inTable=false; // tabel-staat resetten
      }

      for(var i=0;i<lines.length;i++){ // itereer over alle regels
        var line=lines[i]; // huidige regel
        if(line.startsWith('|')){ // tabelrij detecteren
          if(inList){html+='</ul>';inList=false;} // open lijst sluiten
          inTable=true; // tabel-modus activeren
          tableRows.push(line.split('|').map(function(c){return c.trim();}).filter(function(_,j,a){return j>0&&j<a.length-1;})); // cells extraheren
          continue;
        }
        if(inTable) flushTable(); // tabel sluiten als niet-tabelrij volgt
        if(!line.trim()){ if(inList){html+='</ul>';inList=false;} continue; } // lege regel: lijst sluiten
        if(line.startsWith('### ')){ if(inList){html+='</ul>';inList=false;} html+='<h3>'+_inline(line.slice(4))+'</h3>'; continue; } // h3 koptekst
        if(line.match(/^[-*]\s/)){ // lijstitem detecteren
          if(!inList){html+='<ul>';inList=true;} // lijst openen als nog niet open
          html+='<li>'+_inline(line.replace(/^[-*]\s/,''))+'</li>'; // list-prefix strippen
          continue;
        }
        if(inList){html+='</ul>';inList=false;} // lijst sluiten voor niet-lijstregel
        if(line.startsWith('## ')||line.startsWith('---')||line.startsWith('> ')) continue; // meta-regels overslaan
        if(line.trim()) html+='<p>'+_inline(line)+'</p>'; // paragraaf
      }
      if(inList) html+='</ul>';  // open lijst sluiten na einde tekst
      if(inTable) flushTable();  // open tabel sluiten na einde tekst
      return html;
    }

    // Inline markdown: **bold** en `code` naar HTML
    function _inline(t) {
      return _esc(t)
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') // **bold** naar <strong>
        .replace(/`([^`]+)`/g,'<code>$1</code>');         // `code` naar <code>
    }

    // HTML escapen: voorkomt XSS via gebruikersinvoer
    function _esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    return { init:init }; // publieke interface: alleen init() blootstellen
  })();
  </script>
</body>
