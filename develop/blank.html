<!-- ======================= develop/blank.html v0.4.0 =======================
     Wijziging v0.4.0 (sessie 33):
     - AdminGuard.protect('developer') toegevoegd — niet-admins zien foutscherm
     - adminGuard.js toegevoegd aan laadvolgorde (na auth.js, voor i18next)
     - #accessDenied blok toegevoegd (standaard display:none)
     - #page-content wrapper toegevoegd rond pagina-inhoud
     - topbar.js geladen via loadScript() zodat guard pas daarna loopt
     Wijziging v0.3.0 (sessie 27):
     - i18n toegevoegd, namespace 'blank', data-i18n attributen
     Wijziging v0.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd, trackPage toegevoegd
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank</title>

    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ======================= TOEGANG GEWEIGERD ======================= */
        .access-denied {
            background: #4a4a4a;
            border: 1px solid #f08080;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            max-width: 480px;
            margin: 60px auto;
        }
        .access-denied h2 { font-size: 1.2rem; color: #f08080; margin-bottom: 10px; }
        .access-denied p  { font-size: 0.9rem; color: #c0c0c0; line-height: 1.6; }

        /* ======================= BINNENKORT BLOK ======================= */
        .binnenkort-blok { max-width: 520px; margin: 0 auto; text-align: center; padding: 48px 24px; }
        .binnenkort-blok .icoon { font-size: 3rem; margin-bottom: 16px; }
        .binnenkort-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 12px 0; color: #222; }
        .binnenkort-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0 0 24px 0; }
        .knop-home { display: inline-block; padding: 10px 24px; background: #1E90FF; color: #fff; text-decoration: none; border-radius: 5px; font-size: 0.95rem; font-weight: bold; }
        .knop-home:hover { background: #1278d4; }

        /* ─── Verberg tot auth-check klaar ─── */
        #accessDenied { display: none; }
        #page-content  { display: none; }
    </style>
</head>
<body>

<div id="topbar-placeholder"></div>
<div id="navbar-placeholder"></div>

<main>
    <!-- Toegang geweigerd scherm -->
    <div id="accessDenied" class="access-denied">
      <h2>Geen toegang</h2>
      <p>Deze pagina is alleen toegankelijk voor developers.<br>
         Log in met een admin-account om verder te gaan.</p>
    </div>

    <!-- Pagina inhoud — zichtbaar na geslaagde check -->
    <div id="page-content">
        <div class="binnenkort-blok">
            <div class="icoon">📄</div>
            <h1 data-i18n="blank:titel">Blank</h1>
            <p data-i18n="blank:beschrijving">Dit is een lege ontwikkelpagina.</p>
            <a href="/MyFamTreeCollab/" class="knop-home"
               data-i18n="blank:knopHome">Terug naar Home</a>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — verplichte laadvolgorde (sessie 33):
     1. Supabase SDK
     2. utils.js
     3. auth.js
     4. adminGuard.js    — toegangsbeveiliging, na auth.js
     5. siteAnalytics.js
     6. i18next CDN + plugins
     7. i18n.js
     8. Pagina init      — init() → loadNamespace → TopBar → loadScript(topbar.js)
                           → AdminGuard.protect() → Navbar → Footer → trackPage
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/adminGuard.js"></script>                     <!-- Toegangsbeveiliging -->
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>

<script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
<script src="/MyFamTreeCollab/js/i18n.js"></script>

<script>
    // loadScript — laadt extern JS als Promise, wacht op volledige uitvoering
    function loadScript(src) {
        return new Promise(function(resolve, reject) {
            var s = document.createElement('script');  // nieuw script element
            s.src = src;                               // bronpad instellen
            s.onload  = resolve;                       // resolve na laden
            s.onerror = reject;                        // reject bij fout
            document.body.appendChild(s);              // toevoegen aan DOM
        });
    }

    i18nModule.init()
        .then(function () {
            return i18nModule.loadNamespace('blank');                      // blank.json laden
        })
        .then(function () {
            document.title = i18nModule.t('blank:paginaTitel');           // paginatitel via i18n
            return fetch('/MyFamTreeCollab/Layout/TopBar.html')
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder')); // TopBar injecteren
                });
        })
        .then(function () {
            return loadScript('/MyFamTreeCollab/js/topbar.js');            // topbar.js laden als Promise
        })
        .then(function () {
            return AdminGuard.protect('developer');                        // developer-check via guard
        })
        .then(function (granted) {
            if (!granted) return;                                          // stop als geen toegang
            return fetch('/MyFamTreeCollab/Layout/Navbar.html')
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder')); // Navbar injecteren
                });
        })
        .then(function () {
            return fetch('/MyFamTreeCollab/Layout/Footer.html')
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder')); // Footer injecteren
                });
        })
        .then(function () {
            SiteAnalytics.trackPage('blank');                             // bezoek registreren
        });
</script>

</body>
</html>
