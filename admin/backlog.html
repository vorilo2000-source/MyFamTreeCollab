<!-- ======================= admin/backlog.html v5.1.0 =======================
    Backlog Manager — admin only

    Wijzigingen v5.1.0 (sessie 35):
     - Projectnaam niet meer overschreven bij herladen als localStorage al data heeft
     - MD-parser schrijft naam/versie alleen bij eerste laden (geen localStorage)
     - Knop 'Data wissen' toegevoegd — wist localStorage en herlaadt pagina
     - Status 'Review' toegevoegd
     - Types 'Decision' en 'Description' toegevoegd

    Wijzigingen v5.0.0:
     - MD export tabelkolommen: id | tags | taak | description | ai | type | assigned | priority | status
     - Auto ID: [1e letter fase][1e letter type]-[eerstvolgende vrije 3-cijferig nummer]
     - ID bewerkbaar: inline klik in tabel + veld in modal
     - Lege velden exporteren leeg (V), alleen ID-generatie gebruikt X

    Afhankelijkheden:
     - ../js/utils.js · ../js/auth.js
     - /MyFamTreeCollab/js/adminGuard.js
     - /MyFamTreeCollab/js/siteAnalytics.js
     - ../js/topbar.js (via fetch)
     - ../data/BACKLOG.md of ../data/backlog.csv (bij eerste laden)
    ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Backlog — Admin</title>
  <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main:     #565656;
      --bg-card:     #3a3a3a;
      --bg-card-alt: #444444;
      --accent:      #00d4aa;
      --accent-dim:  rgba(0,212,170,0.15);
      --text-primary:#f0f0f0;
      --text-muted:  #aaa;
      --border:      rgba(255,255,255,0.08);
      --font-mono:   'IBM Plex Mono', monospace;
      --font-sans:   'IBM Plex Sans', sans-serif;
      --radius:      8px;
      --shadow:      0 4px 20px rgba(0,0,0,0.35);
      --color-danger:#f08080;
    }
    #accessDenied { display:none; text-align:center; padding:4rem 2rem; color:var(--text-primary); font-family:var(--font-sans); }
    #page-content  { display:none; }
    main { background:var(--bg-main); min-height:100vh; padding:150px 20px 64px; font-family:var(--font-sans); color:var(--text-primary); }
    .dash-wrap { max-width:100%; margin:0; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* Project header */
    .proj-header { margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1.25rem; }
    .proj-name { font-family:var(--font-mono); font-size:1.5rem; font-weight:600; color:var(--accent); margin:0 0 6px; display:flex; align-items:center; gap:12px; }
    .proj-edit-btn { font-family:var(--font-mono); font-size:0.75rem; background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent); border-radius:var(--radius); padding:3px 10px; cursor:pointer; transition:background .2s; }
    .proj-edit-btn:hover { background:rgba(0,212,170,0.28); }
    .proj-meta { font-family:var(--font-mono); font-size:0.78rem; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap; }
    .proj-meta b { color:var(--accent); }
    .projinfo-dd { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:1.25rem; animation:fadeUp .3s ease; }
    .projinfo-dd.open { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    @media(max-width:600px){ .projinfo-dd.open{ grid-template-columns:1fr; } }

    /* Acties */
    .bl-actions { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.5rem; align-items:center; }

    /* Knoppen */
    .btn { font-family:var(--font-mono); font-size:0.8rem; display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border:1px solid rgba(255,255,255,0.2); border-radius:var(--radius); background:var(--bg-card); color:var(--text-primary); cursor:pointer; transition:background .2s; }
    .btn:hover { background:var(--bg-card-alt); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-accent { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
    .btn-accent:hover { background:rgba(0,212,170,0.28); }
    .btn-ghost { border-color:transparent; background:transparent; color:var(--text-muted); }
    .btn-ghost:hover { background:rgba(255,255,255,0.06); }
    .btn-danger { background:rgba(240,128,128,0.15); color:var(--color-danger); border-color:var(--color-danger); }
    .btn-danger:hover { background:rgba(240,128,128,0.28); }
    .btn-ai-ready { border-color:var(--accent)!important; color:var(--accent)!important; }

    /* API key dropdown */
    .apikey-wrap { position:relative; }
    .apikey-dd { display:none; position:absolute; left:0; top:38px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; width:300px; z-index:60; box-shadow:var(--shadow); }
    .apikey-dd.open { display:block; animation:fadeUp .2s ease; }
    .apikey-dd p { font-size:11px; color:var(--text-muted); line-height:1.5; margin-top:6px; }

    /* Form */
    .form-label { font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); display:block; margin-bottom:4px; }
    .form-input { font-family:var(--font-mono); font-size:0.82rem; width:100%; padding:7px 10px; border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius); background:#2a2a2a; color:var(--text-primary); outline:none; box-sizing:border-box; }
    .form-input:focus { border-color:var(--accent); }
    select.form-input { cursor:pointer; }
    textarea.form-input { resize:vertical; }

    /* Statistieken */
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:1.75rem; }
    .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 20px 16px; box-shadow:var(--shadow); position:relative; overflow:hidden; animation:fadeUp .4s ease both; }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent); }
    .stat-label { font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px; }
    .stat-value { font-family:var(--font-mono); font-size:2rem; font-weight:600; color:var(--text-primary); line-height:1; }
    .progress-bar { height:4px; background:rgba(255,255,255,0.1); border-radius:99px; overflow:hidden; margin-top:8px; }
    .progress-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .4s; }

    /* Fases */
    .phases-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:1.25rem; display:flex; flex-direction:column; gap:10px; }
    .phases-bar-top { display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; }
    .phases-label { font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); white-space:nowrap; }
    .phase-pills-wrap { display:flex; flex-wrap:wrap; gap:6px; }
    .phase-pill { font-family:var(--font-mono); font-size:0.75rem; padding:4px 12px; border-radius:20px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:var(--text-muted); cursor:pointer; transition:all .15s; position:relative; white-space:nowrap; }
    .phase-pill:hover { border-color:var(--accent); color:var(--accent); }
    .phase-pill.active { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
    .phase-pill[data-tip]:hover::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 8px); left:0; background:#1a1a18; color:#fff; font-size:11px; padding:4px 10px; border-radius:6px; white-space:nowrap; pointer-events:none; z-index:99; border:1px solid var(--border); max-width:260px; overflow:hidden; text-overflow:ellipsis; }
    .phase-pill[data-tip]:hover::before { content:''; position:absolute; bottom:calc(100% + 3px); left:16px; border:4px solid transparent; border-top-color:#1a1a18; pointer-events:none; z-index:99; }
    .phase-input-wrap { display:none; flex-wrap:wrap; gap:6px; align-items:center; padding-top:8px; border-top:1px solid var(--border); }
    .phase-input-wrap.open { display:flex; }
    .phase-input-wrap input { flex:1; min-width:120px; max-width:200px; }

    /* Filters */
    .filter-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:1.5rem; display:flex; flex-direction:column; gap:12px; animation:fadeUp .35s ease; }
    .filter-row { display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; }
    .filter-row-label { font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); min-width:80px; padding-top:5px; white-space:nowrap; }
    .pills-wrap { display:flex; gap:6px; flex-wrap:wrap; }
    .filter-pill { font-family:var(--font-mono); font-size:0.72rem; padding:3px 10px; border-radius:20px; border:1px solid rgba(255,255,255,0.15); background:transparent; color:var(--text-muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
    .filter-pill:hover { border-color:var(--accent); color:var(--accent); }
    .filter-pill.active { background:var(--accent-dim); color:var(--accent); border-color:var(--accent); }
    .view-toggle { display:flex; border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius); overflow:hidden; }
    .view-toggle button { font-family:var(--font-mono); font-size:0.75rem; padding:5px 14px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; transition:background .15s; }
    .view-toggle button.active { background:var(--accent-dim); color:var(--accent); }

    /* Lege staat */
    .empty { text-align:center; padding:4rem 2rem; border:1px solid var(--border); border-radius:var(--radius); }
    .empty .empty-icon { font-size:32px; margin-bottom:12px; }
    .empty p { font-size:0.85rem; color:var(--text-muted); margin-bottom:20px; font-family:var(--font-mono); }

    /* Board: vaste hoogte container met beide scrollbalken zichtbaar */
    .board-scroll {
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 320px); /* Beschikbare hoogte onder filters */
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-main);
      /* Altijd scrollbalken tonen zodat ze zichtbaar zijn als indicator */
      scrollbar-width: thin;
      scrollbar-color: rgba(0,212,170,0.4) rgba(255,255,255,0.05);
    }
    .board-scroll::-webkit-scrollbar { width:8px; height:8px; }
    .board-scroll::-webkit-scrollbar-track { background:rgba(255,255,255,0.04); border-radius:4px; }
    .board-scroll::-webkit-scrollbar-thumb { background:rgba(0,212,170,0.4); border-radius:4px; }
    .board-scroll::-webkit-scrollbar-thumb:hover { background:rgba(0,212,170,0.7); }
    .board-scroll::-webkit-scrollbar-corner { background:rgba(255,255,255,0.04); }

    /* Board: horizontale flex van kolommen */
    .board { display:flex; gap:0; min-width:max-content; align-items:flex-start; }

    /* Elke kolom: vaste breedte, padding */
    .board-col { width:260px; flex-shrink:0; padding:0 12px; border-right:1px solid var(--border); }
    .board-col:last-child { border-right:none; }

    /* Sticky kolomtitel binnen de scrollcontainer */
    .board-col-title {
      font-family:var(--font-mono); font-size:0.72rem; text-transform:uppercase;
      letter-spacing:1px; color:var(--text-muted);
      display:flex; align-items:center; gap:6px;
      position:sticky; top:0; z-index:2;
      background:var(--bg-main);
      padding:12px 0 8px;
      border-bottom:1px solid var(--border);
      margin-bottom:10px;
    }
    .board-col-items { display:flex; flex-direction:column; gap:8px; padding-bottom:16px; }
    .board-empty { font-family:var(--font-mono); font-size:0.75rem; color:rgba(255,255,255,0.15); padding:6px 0; }

    /* Kaart */
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow); animation:fadeUp .3s ease; }
    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
    .card-id { font-family:var(--font-mono); font-size:10px; color:var(--accent); opacity:.8; cursor:pointer; border-bottom:1px dashed rgba(0,212,170,0.3); }
    .card-id:hover { opacity:1; }
    .card-actions { display:flex; gap:2px; }
    .card-title { font-weight:600; font-size:0.85rem; margin-bottom:4px; line-height:1.4; color:var(--text-primary); }
    .card-desc { font-size:0.75rem; color:var(--text-muted); margin-bottom:6px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-footer { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .card-tags { margin-top:6px; display:flex; gap:4px; flex-wrap:wrap; }
    .id-edit-input { font-family:var(--font-mono); font-size:10px; background:#2a2a2a; border:1px solid var(--accent); border-radius:4px; color:var(--accent); padding:1px 6px; width:90px; outline:none; }

    /* Badges & tags */
    .badge { display:inline-flex; align-items:center; gap:4px; font-family:var(--font-mono); font-size:0.68rem; font-weight:600; padding:2px 8px; border-radius:10px; }
    .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
    .tag { font-family:var(--font-mono); font-size:0.65rem; padding:1px 7px; border-radius:4px; background:rgba(255,255,255,0.08); color:var(--text-muted); }
    .assignee-txt { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted); }

    /* Tabel */
    .list-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:auto; max-height:680px; box-shadow:var(--shadow); animation:fadeUp .35s ease; }
    .list-table { width:100%; border-collapse:separate; border-spacing:0; font-family:var(--font-mono); font-size:0.78rem; }
    .list-table thead th { position:sticky; top:0; z-index:1; background:#1a7a4a; text-align:left; color:#fff; padding:10px 12px; border-bottom:2px solid #0f5c35; font-weight:600; text-transform:uppercase; letter-spacing:1px; font-size:0.68rem; white-space:nowrap; }
    .list-table tbody td { padding:8px 12px; color:#1a1a1a; background:#c8c8c8; border-bottom:1px solid #aaa; vertical-align:middle; }
    .list-table tbody tr:last-child td { border-bottom:none; }
    .list-table tbody tr:hover td { background:#d8d8d8; }
    .tbl-id { font-family:var(--font-mono); font-size:0.72rem; color:#1a5c8a; cursor:pointer; border-bottom:1px dashed #1a5c8a; white-space:nowrap; }
    .tbl-id:hover { color:#0d3d5e; }
    .tbl-id-input { font-family:var(--font-mono); font-size:0.72rem; background:#fff; border:1px solid #1a7a4a; border-radius:4px; padding:2px 6px; width:90px; outline:none; }

    /* Prioriteit */
    .p-critical{background:rgba(240,128,128,0.2);color:#f08080;border:1px solid #f08080;}
    .p-high    {background:rgba(249,115,22,0.2); color:#fb923c;border:1px solid #fb923c;}
    .p-medium  {background:rgba(234,179,8,0.2);  color:#fbbf24;border:1px solid #fbbf24;}
    .p-low     {background:rgba(34,197,94,0.2);  color:#4ade80;border:1px solid #4ade80;}
    .p-critical-tbl{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .p-high-tbl    {background:#fff7ed;color:#9a3412;border:1px solid #fdba74;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .p-medium-tbl  {background:#fefce8;color:#854d0e;border:1px solid #fde047;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .p-low-tbl     {background:#f0fdf4;color:#166534;border:1px solid #86efac;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .dot-critical{background:#f08080} .dot-high{background:#fb923c}
    .dot-medium  {background:#fbbf24} .dot-low {background:#4ade80}

    /* Status */
    .s-open      {background:rgba(96,165,250,0.2); color:#60a5fa;border:1px solid #60a5fa;}
    .s-inprogress{background:rgba(167,139,250,0.2);color:#a78bfa;border:1px solid #a78bfa;}
    .s-review    {background:rgba(251,191,36,0.2); color:#fbbf24;border:1px solid #fbbf24;}
    .s-done      {background:rgba(0,212,170,0.2);  color:var(--accent);border:1px solid var(--accent);}
    .s-cancelled {background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid rgba(255,255,255,0.15);}
    .s-future    {background:rgba(244,114,182,0.2);color:#f472b6;border:1px solid #f472b6;}
    .s-open-tbl      {background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .s-inprogress-tbl{background:#faf5ff;color:#6d28d9;border:1px solid #c4b5fd;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .s-review-tbl    {background:#fefce8;color:#854d0e;border:1px solid #fde047;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .s-done-tbl      {background:#f0fdf4;color:#15803d;border:1px solid #86efac;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .s-cancelled-tbl {background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}
    .s-future-tbl    {background:#fdf4ff;color:#7e22ce; border:1px solid #e9d5ff;border-radius:10px;padding:2px 8px;font-size:0.68rem;font-weight:600;display:inline-block;}

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center; z-index:100; padding:16px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; width:100%; max-width:580px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); animation:fadeUp .25s ease; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; border-bottom:1px solid var(--border); padding-bottom:12px; }
    .modal-header h2 { font-family:var(--font-mono); font-size:1rem; font-weight:600; color:var(--accent); margin:0; }
    .modal-body { display:flex; flex-direction:column; gap:12px; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:1.5rem; border-top:1px solid var(--border); padding-top:12px; }
    .form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:500px){ .form-grid2{ grid-template-columns:1fr; } }
    .id-preview { font-family:var(--font-mono); font-size:0.72rem; color:var(--accent); opacity:.7; margin-top:4px; }
    .ai-section { border-top:1px solid var(--border); padding-top:12px; }
    .ai-warning { font-family:var(--font-mono); font-size:0.72rem; color:#fb923c; margin-left:8px; }
    .ai-box { margin-top:10px; font-family:var(--font-mono); font-size:0.75rem; background:#2a2a2a; border-radius:var(--radius); padding:10px 14px; white-space:pre-wrap; line-height:1.6; color:var(--text-muted); border:1px solid var(--border); }

    /* ── Tabs ── */
    .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:1.5rem; }
    .tab-btn { font-family:var(--font-mono); font-size:0.82rem; padding:10px 24px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
    .tab-btn:hover { color:var(--text-primary); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── Project Log ── */
    .log-actions { display:flex; gap:8px; margin-bottom:1.5rem; align-items:center; }
    .log-empty { text-align:center; padding:4rem 2rem; border:1px solid var(--border); border-radius:var(--radius); font-family:var(--font-mono); font-size:0.85rem; color:var(--text-muted); }
    .log-session { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; animation:fadeUp .3s ease; }
    .log-session-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; cursor:pointer; user-select:none; transition:background .15s; }
    .log-session-header:hover { background:var(--bg-card-alt); }
    .log-session-title { font-family:var(--font-mono); font-size:0.88rem; font-weight:600; color:var(--accent); }
    .log-session-date { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted); }
    .log-session-toggle { font-size:0.75rem; color:var(--text-muted); transition:transform .2s; }
    .log-session.open .log-session-toggle { transform:rotate(180deg); }
    .log-session-body { display:none; padding:0 18px 16px; border-top:1px solid var(--border); }
    .log-session.open .log-session-body { display:block; }
    /* Markdown content stijlen binnen log */
    .log-md h3 { font-family:var(--font-mono); font-size:0.82rem; color:var(--accent); margin:14px 0 6px; }
    .log-md p,.log-md li { font-family:var(--font-sans); font-size:0.82rem; color:var(--text-muted); line-height:1.7; }
    .log-md ul { padding-left:18px; margin:4px 0 10px; }
    .log-md code { font-family:var(--font-mono); font-size:0.75rem; background:rgba(0,212,170,0.1); color:var(--accent); padding:1px 5px; border-radius:4px; }
    .log-md table { width:100%; border-collapse:collapse; margin:10px 0; font-family:var(--font-mono); font-size:0.72rem; }
    .log-md thead th { background:#1a7a4a; color:#fff; padding:6px 10px; text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:1px; }
    .log-md tbody td { padding:6px 10px; background:#c8c8c8; color:#1a1a1a; border-bottom:1px solid #aaa; }
    .log-md tbody tr:last-child td { border-bottom:none; }
    .log-meta { font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted); margin-bottom:1.5rem; }
    .access-denied { background:var(--bg-card); border:1px solid var(--color-danger); border-radius:var(--radius); padding:32px; text-align:center; max-width:480px; margin:60px auto; }
    .access-denied h2 { font-size:1.2rem; color:var(--color-danger); margin-bottom:10px; font-family:var(--font-sans); }
    .access-denied p { font-size:0.9rem; color:var(--text-muted); line-height:1.6; }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <div id="topbar-placeholder"></div>
  <div id="navbar-placeholder"></div>

  <div id="accessDenied">
    <div class="access-denied">
      <h2>Geen toegang</h2>
      <p>Deze pagina is alleen toegankelijk voor administrators.<br>Log in met een admin-account om verder te gaan.</p>
    </div>
  </div>

  <div id="page-content">
    <main>
      <div class="dash-wrap">

        <!-- Project header -->
        <div class="proj-header">
          <div class="proj-name">
            <span id="proj-name-txt">Project</span>
            <button class="proj-edit-btn" id="btn-edit-proj">✏️ bewerken</button>
          </div>
          <div class="projinfo-dd" id="projinfo-dd">
            <div><label class="form-label">Projectnaam</label><input class="form-input" type="text" id="pi-name" placeholder="MyFamTreeCollab"/></div>
            <div><label class="form-label">Versie</label><input class="form-input" type="text" id="pi-version" placeholder="v1.0.0"/></div>
            <div><label class="form-label">Datum</label><input class="form-input" type="date" id="pi-date"/></div>
            <div style="grid-column:1/-1;display:flex;gap:8px;justify-content:flex-end">
              <button class="btn" id="btn-proj-cancel">Annuleren</button>
              <button class="btn btn-accent" id="btn-proj-save">Opslaan</button>
            </div>
          </div>
          <div class="proj-meta" id="proj-meta"></div>
        </div>

        <!-- Acties -->
        <div class="bl-actions">
          <div class="apikey-wrap">
            <button class="btn" id="btn-apikey">🔑 <span id="apikey-label">API key instellen</span></button>
            <div class="apikey-dd" id="apikey-dd">
              <label class="form-label">Anthropic API key</label>
              <input class="form-input" type="password" id="input-apikey" placeholder="sk-ant-…"/>
              <p>Sleutel wordt opgeslagen in localStorage en alleen naar de Anthropic API gestuurd.</p>
            </div>
          </div>
          <button class="btn" id="btn-export-csv">💾 CSV opslaan</button>
          <button class="btn" id="btn-export-md">📝 MD exporteren</button>
          <label class="btn" style="cursor:pointer">📂 Laden (CSV/MD)<input type="file" id="input-file" accept=".csv,.md" style="display:none"/></label>
          <button class="btn btn-accent" id="btn-add">+ Toevoegen</button>
          <!-- Scheidingslijn voor destructieve actie -->
          <span style="flex:1"></span>
          <button class="btn btn-danger" id="btn-clear-db" title="Wist alle backlog data uit localStorage">🗑 Data wissen</button>
        </div>

        <!-- Statistieken -->
        <div class="stat-grid" id="stat-grid"></div>

        <!-- Fases -->
        <div class="phases-bar">
          <div class="phases-bar-top">
            <span class="phases-label">Fases</span>
            <button class="phase-pill" id="btn-new-phase">+ Nieuwe fase</button>
          </div>
          <div class="phase-pills-wrap" id="phase-pills"></div>
          <div class="phase-input-wrap" id="phase-input-wrap">
            <input class="form-input" type="text" id="input-new-phase" placeholder="Naam fase" style="padding:3px 8px;font-size:12px"/>
            <input class="form-input" type="text" id="input-new-phase-desc" placeholder="Beschrijving (tooltip)" style="padding:3px 8px;font-size:12px"/>
            <button class="btn btn-accent" id="btn-add-phase" style="padding:4px 10px">+</button>
            <button class="btn btn-ghost" id="btn-cancel-phase" style="padding:4px 8px">✕</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-section">
          <div class="filter-row">
            <span class="filter-row-label">Zoeken</span>
            <input type="search" class="form-input" id="input-search" placeholder="Titel, omschrijving, ID, toegewezen…" style="flex:1;min-width:200px"/>
            <div class="view-toggle">
              <button id="btn-view-board" class="active">Board</button>
              <button id="btn-view-list">Lijst</button>
            </div>
            <button class="btn btn-ghost" id="btn-clear-filters" style="font-size:0.72rem;padding:4px 12px">✕ Wissen</button>
          </div>
          <div class="filter-row"><span class="filter-row-label">Status</span><div class="pills-wrap" id="filter-status-pills"></div></div>
          <div class="filter-row"><span class="filter-row-label">Prioriteit</span><div class="pills-wrap" id="filter-priority-pills"></div></div>
          <div class="filter-row"><span class="filter-row-label">Type</span><div class="pills-wrap" id="filter-type-pills"></div></div>
          <div class="filter-row"><span class="filter-row-label">Tags</span><div class="pills-wrap" id="filter-tag-pills"></div></div>
        </div>

        <!-- Inhoud -->
        <div id="bl-content"></div>

      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Item toevoegen</h2>
        <button class="btn btn-ghost" id="btn-modal-close" style="font-size:18px;padding:4px 8px">✕</button>
      </div>
      <div class="modal-body">
        <div>
          <label class="form-label">ID <span style="opacity:.5;font-size:0.68rem">(automatisch · aanpasbaar)</span></label>
          <input class="form-input" type="text" id="f-id" placeholder="Wordt automatisch gegenereerd"/>
          <div class="id-preview" id="id-preview"></div>
        </div>
        <div><label class="form-label">Titel *</label><input class="form-input" type="text" id="f-title" placeholder="Korte, beschrijvende titel"/></div>
        <div class="form-grid2">
          <div><label class="form-label">Fase</label><select class="form-input" id="f-phase"></select></div>
          <div><label class="form-label">Type</label>
            <select class="form-input" id="f-type">
              <option>Feature</option><option>Bug</option><option>Improvement</option>
              <option>Security</option><option>Tech Debt</option><option>Decision</option>
              <option>Description</option><option>Other</option>
            </select>
          </div>
          <div><label class="form-label">Prioriteit</label>
            <select class="form-input" id="f-priority">
              <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option>
            </select>
          </div>
          <div><label class="form-label">Status</label>
            <select class="form-input" id="f-status">
              <option selected>Open</option><option>In Progress</option><option>Review</option>
              <option>Done</option><option>Cancelled</option><option>Future</option>
            </select>
          </div>
        </div>
        <div><label class="form-label">Toegewezen aan</label><input class="form-input" type="text" id="f-assignee" placeholder="Naam of @handle"/></div>
        <div><label class="form-label">Tags</label><input class="form-input" type="text" id="f-tags" placeholder="tag1, tag2, tag3"/></div>
        <div><label class="form-label">Omschrijving</label><textarea class="form-input" id="f-description" rows="3" placeholder="Wat moet er gedaan worden? Waarom?"></textarea></div>
        <div><label class="form-label">AI suggestie <span style="opacity:.5;font-size:0.68rem">(opgeslagen bij item)</span></label><textarea class="form-input" id="f-ai" rows="2" placeholder="Wordt gevuld via ✦ AI suggestie knop, of handmatig…"></textarea></div>
        <div class="ai-section">
          <button class="btn" id="btn-ai">✦ AI suggestie ophalen</button>
          <span class="ai-warning" id="ai-warning" style="display:none">Stel eerst je API key in</span>
          <div class="ai-box" id="ai-box" style="display:none"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="btn-modal-cancel">Annuleren</button>
        <button class="btn btn-accent" id="btn-modal-save">Toevoegen</button>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="/MyFamTreeCollab/js/adminGuard.js"></script>
  <script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>

  <script>
  fetch('/MyFamTreeCollab/Layout/TopBar.html').then(r=>r.text()).then(html=>{
    document.getElementById('topbar-placeholder').innerHTML=html;
    const s=document.createElement('script'); s.src='../js/topbar.js';
    s.onload=()=>          AdminGuard.protect('admin').then(ok=>{ if(ok) Backlog.init(); });
    document.body.appendChild(s);
  });
  fetch('/MyFamTreeCollab/Layout/Navbar.html').then(r=>r.text()).then(html=>{ document.getElementById('navbar-placeholder').innerHTML=html; });
  fetch('/MyFamTreeCollab/Layout/Footer.html').then(r=>r.text()).then(html=>{ document.getElementById('footer-placeholder').innerHTML=html; });

  const Backlog = (() => {
    let items=[], phases=[], phaseDescs={};
    let view='board', search='', fPhase='All';
    let fStatus=new Set(), fPriority=new Set(), fType=new Set(), fTags=new Set();
    let editId=null, apiKey='';
    let projName='', projVersion='', projDate='';

    const STATUSES   = ['Open','In Progress','Review','Done','Cancelled','Future'];
    const PRIORITIES = ['Critical','High','Medium','Low'];
    const TYPES      = ['Feature','Bug','Improvement','Security','Tech Debt','Decision','Description','Other'];
    const S_ICON = {'Open':'📋','In Progress':'🔄','Review':'🔍','Done':'✅','Cancelled':'❌','Future':'🔮'};
    const S_CSS  = {'Open':'s-open','In Progress':'s-inprogress','Review':'s-review','Done':'s-done','Cancelled':'s-cancelled','Future':'s-future'};
    const S_TBL  = {'Open':'s-open-tbl','In Progress':'s-inprogress-tbl','Review':'s-review-tbl','Done':'s-done-tbl','Cancelled':'s-cancelled-tbl','Future':'s-future-tbl'};
    const P_CSS  = {'Critical':'p-critical','High':'p-high','Medium':'p-medium','Low':'p-low'};
    const P_TBL  = {'Critical':'p-critical-tbl','High':'p-high-tbl','Medium':'p-medium-tbl','Low':'p-low-tbl'};
    const D_CSS  = {'Critical':'dot-critical','High':'dot-high','Medium':'dot-medium','Low':'dot-low'};

    const $  = id => document.getElementById(id);
    const X  = v  => v&&v.trim() ? v.trim() : 'X'; // Alleen voor ID-generatie
    const V  = v  => v&&v.trim() ? v.trim() : '';   // Voor weergave en export

    // ── Initialisatie ──
    function init() {
      apiKey = localStorage.getItem('bl_apikey') || '';
      _updateApiKeyUI();

      const savedItems = localStorage.getItem('bl_items');
      if (savedItems) {
        // localStorage aanwezig: gebruik opgeslagen data
        items      = JSON.parse(savedItems);
        phases     = JSON.parse(localStorage.getItem('bl_phases')     || '[]');
        phaseDescs = JSON.parse(localStorage.getItem('bl_phasedescs') || '{}');
        _loadProjInfo();
      }
      // Geen automatisch laden via fetch — gebruiker laadt zelf het juiste bestand via 📂 knop
      _bindEvents();
      render();
    }

function _genId(phase, type) {
      const fl = (phase||'X')[0].toUpperCase();
      const tl = (type ||'X')[0].toUpperCase();
      const prefix = fl + tl + '-';
      const used = new Set(items.filter(i=>i.id&&i.id.startsWith(prefix)).map(i=>parseInt(i.id.slice(prefix.length))||0));
      let n = 1; while(used.has(n)) n++;
      return prefix + String(n).padStart(3,'0');
    }

    function _bindEvents() {
      $('btn-add').addEventListener('click', ()=>openModal());
      $('btn-export-csv').addEventListener('click', exportCSV);
      $('btn-export-md').addEventListener('click', exportMD);
      $('input-file').addEventListener('change', importFile);
      $('btn-clear-filters').addEventListener('click', clearFilters);

      // Data wissen: wist alle bl_* sleutels en herlaadt pagina
      $('btn-clear-db').addEventListener('click', () => {
        if (!confirm('Alle backlog data wissen uit localStorage?\nDit kan niet ongedaan worden gemaakt.')) return;
        // Verwijder alle sleutels die met 'bl_' beginnen
        Object.keys(localStorage)
          .filter(k => k.startsWith('bl_'))
          .forEach(k => localStorage.removeItem(k));
        location.reload();
      });

      $('btn-edit-proj').addEventListener('click', ()=>{
        $('pi-name').value=projName; $('pi-version').value=projVersion; $('pi-date').value=projDate;
        $('projinfo-dd').classList.toggle('open');
      });
      $('btn-proj-save').addEventListener('click', ()=>{
        projName=$('pi-name').value.trim(); projVersion=$('pi-version').value.trim(); projDate=$('pi-date').value;
        _saveProjInfo(); $('projinfo-dd').classList.remove('open'); _renderMeta();
      });
      $('btn-proj-cancel').addEventListener('click', ()=>$('projinfo-dd').classList.remove('open'));

      $('btn-apikey').addEventListener('click', ()=>$('apikey-dd').classList.toggle('open'));
      $('input-apikey').value = apiKey;
      $('input-apikey').addEventListener('change', e=>{ apiKey=e.target.value.trim(); localStorage.setItem('bl_apikey',apiKey); _updateApiKeyUI(); });
      document.addEventListener('click', e=>{ if(!$('btn-apikey').contains(e.target)&&!$('apikey-dd').contains(e.target)) $('apikey-dd').classList.remove('open'); });

      $('btn-new-phase').addEventListener('click', ()=>{ $('phase-input-wrap').classList.add('open'); $('btn-new-phase').style.display='none'; $('input-new-phase').focus(); });
      $('btn-cancel-phase').addEventListener('click', _cancelPhaseInput);
      $('btn-add-phase').addEventListener('click', _addPhase);
      $('input-new-phase').addEventListener('keydown', e=>{ if(e.key==='Enter')_addPhase(); if(e.key==='Escape')_cancelPhaseInput(); });

      $('f-phase').addEventListener('change', _updateAutoId);
      $('f-type').addEventListener('change',  _updateAutoId);

      $('input-search').addEventListener('input', e=>{ search=e.target.value; render(); });
      $('btn-view-board').addEventListener('click', ()=>{ view='board'; _updateViewToggle(); render(); });
      $('btn-view-list').addEventListener('click',  ()=>{ view='list';  _updateViewToggle(); render(); });

      $('btn-modal-close').addEventListener('click',  closeModal);
      $('btn-modal-cancel').addEventListener('click', closeModal);
      $('btn-modal-save').addEventListener('click',   saveItem);
      $('modal').addEventListener('click', e=>{ if(e.target===$('modal')) closeModal(); });
      $('btn-ai').addEventListener('click', _getAiSuggestion);
    }

    function _updateAutoId() {
      if (editId) return;
      const id = _genId($('f-phase').value, $('f-type').value);
      if (!$('f-id').dataset.manual) $('f-id').value = id;
      $('id-preview').textContent = `→ ${id}`;
    }

    function render(){ _renderMeta(); _renderStats(); _renderPhasePills(); _renderFilterPills(); _renderContent(); _updatePhasesInModal(); }

    function _renderMeta(){
      const t=items.length, done=items.filter(i=>i.status==='Done').length, pct=t?Math.round(done/t*100):0;
      $('proj-name-txt').textContent = projName || 'Project';
      $('proj-meta').innerHTML =
        `${projVersion ? `<span>📦 <b>${projVersion}</b></span>` : ''}` +
        `${projDate    ? `<span>📅 <b>${_fmtDate(projDate)}</b></span>` : ''}` +
        `<span>📋 <b>${t}</b> items</span><span>✅ <b>${pct}%</b> afgerond</span>`;
    }

    function _fmtDate(d){ if(!d)return''; const p=d.split('-'); return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:d; }

    function _renderStats(){
      const t=items.length, done=items.filter(i=>i.status==='Done').length, pct=t?Math.round(done/t*100):0;
      $('stat-grid').innerHTML=`
        <div class="stat-card"><div class="stat-label">Totaal</div><div class="stat-value">${t}</div></div>
        <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value">${items.filter(i=>i.status==='Open').length}</div></div>
        <div class="stat-card"><div class="stat-label">In uitvoering</div><div class="stat-value">${items.filter(i=>i.status==='In Progress').length}</div></div>
        <div class="stat-card"><div class="stat-label">Gedaan</div><div class="stat-value">${done}</div></div>
        <div class="stat-card"><div class="stat-label">Voortgang</div><div class="stat-value">${pct}%</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
    }

    function _renderPhasePills(){
      $('phase-pills').innerHTML = phases.map(ph=>{
        const desc = phaseDescs[ph]||'';
        return `<span class="phase-pill ${fPhase===ph?'active':''}" data-phase="${ph}" ${desc?`data-tip="${desc}"`:''}>${ph} <span data-remove="${ph}" style="margin-left:5px;opacity:.4;cursor:pointer">×</span></span>`;
      }).join('');
      $('phase-pills').querySelectorAll('.phase-pill').forEach(el=>{
        el.addEventListener('click', e=>{ if(e.target.dataset.remove){_removePhase(e.target.dataset.remove);return;} fPhase=fPhase===el.dataset.phase?'All':el.dataset.phase; render(); });
      });
    }

    function _renderFilterPills(){
      const allTags=[...new Set(items.flatMap(i=>(i.tags||'').split(',').map(t=>t.trim()).filter(Boolean)))].sort();
      _buildPills('filter-status-pills',   STATUSES,   fStatus,   S_ICON);
      _buildPills('filter-priority-pills', PRIORITIES, fPriority, {});
      _buildPills('filter-type-pills',     TYPES,      fType,     {});
      _buildPills('filter-tag-pills',      allTags,    fTags,     {});
    }

    function _buildPills(cid, opts, activeSet, icons){
      const el=$(cid);
      el.innerHTML=opts.map(o=>`<button class="filter-pill ${activeSet.has(o)?'active':''}" data-val="${o}">${icons[o]?icons[o]+' ':''}${o}</button>`).join('');
      el.querySelectorAll('.filter-pill').forEach(btn=>{
        btn.addEventListener('click', ()=>{ const v=btn.dataset.val; activeSet.has(v)?activeSet.delete(v):activeSet.add(v); render(); });
      });
    }

    function clearFilters(){ search='';fPhase='All';fStatus.clear();fPriority.clear();fType.clear();fTags.clear();$('input-search').value='';render(); }

    function _filtered(){
      const q=search.toLowerCase();
      return items.filter(i=>{
        const mq  = !q||i.title.toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)||i.id.toLowerCase().includes(q)||(i.assignee||'').toLowerCase().includes(q);
        const ms  = !fStatus.size   || fStatus.has(i.status);
        const mp  = !fPriority.size || fPriority.has(i.priority);
        const mt  = !fType.size     || fType.has(i.type);
        const mph = fPhase==='All'  || i.phase===fPhase;
        const it  = (i.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
        const mta = !fTags.size     || [...fTags].some(t=>it.includes(t));
        return mq&&ms&&mp&&mt&&mph&&mta;
      });
    }

    function _renderContent(){
      const filtered=_filtered();
      if(!items.length){
        $('bl-content').innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>Nog geen items. Laad een CSV/MD bestand of voeg je eerste item toe.</p><button class="btn btn-accent" id="btn-add-empty">+ Eerste item toevoegen</button></div>`;
        $('btn-add-empty').addEventListener('click', ()=>openModal()); return;
      }
      $('bl-content').innerHTML = view==='board' ? _boardHTML(filtered) : _listHTML(filtered);
      $('bl-content').querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openModal(b.dataset.edit)));
      $('bl-content').querySelectorAll('[data-delete]').forEach(b=>b.addEventListener('click', ()=>_deleteItem(b.dataset.delete)));
      $('bl-content').querySelectorAll('.tbl-id,.card-id').forEach(el=>el.addEventListener('click', ()=>_inlineEditId(el)));
    }

    function _boardHTML(filtered){
      // Toon alleen statussen die actief gefilterd zijn; als geen filter actief: alle statussen
      const visibleStatuses = fStatus.size > 0 ? STATUSES.filter(s=>fStatus.has(s)) : STATUSES;
      return `<div class="board-scroll"><div class="board">${visibleStatuses.map(s=>{
        const col=filtered.filter(i=>i.status===s);
        return `<div class="board-col">
          <div class="board-col-title">${S_ICON[s]} ${s.toUpperCase()} <span style="opacity:.4">(${col.length})</span></div>
          <div class="board-col-items">${col.length?col.map(_cardHTML).join(''):'<div class="board-empty">—</div>'}</div>
        </div>`;
      }).join('')}</div></div>`;
    }

    function _cardHTML(i){
      const tags=(i.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
      return `<div class="card">
        <div class="card-header">
          <span class="card-id" data-id="${i.id}" title="Klik om ID te bewerken">${i.id}</span>
          <div class="card-actions">
            <button class="btn btn-ghost" data-edit="${i.id}" style="padding:2px 6px;font-size:11px">✏️</button>
            <button class="btn btn-ghost" data-delete="${i.id}" style="padding:2px 6px;font-size:11px">🗑</button>
          </div>
        </div>
        <div class="card-title">${i.title}</div>
        ${i.description?`<div class="card-desc">${i.description}</div>`:''}
        <div class="card-footer">
          <span class="badge ${P_CSS[i.priority]||'p-medium'}"><span class="dot ${D_CSS[i.priority]||'dot-medium'}"></span>${i.priority}</span>
          <span class="badge ${S_CSS[i.status]||'s-open'}">${S_ICON[i.status]||''} ${i.status}</span>
          ${i.phase?`<span class="badge s-cancelled" style="font-size:0.65rem">${i.phase}</span>`:''}
          ${i.assignee?`<span class="assignee-txt">👤 ${i.assignee}</span>`:''}
        </div>
        ${tags.length?`<div class="card-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      </div>`;
    }

    function _listHTML(filtered){
      if(!filtered.length) return `<p style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.82rem;padding:1rem 0;text-align:center">Geen items gevonden.</p>`;
      return `<div class="list-wrap"><table class="list-table">
        <thead><tr><th>ID</th><th>Tags</th><th>Taak</th><th>Omschrijving</th><th>AI suggestie</th><th>Type</th><th>Toegewezen</th><th>Prioriteit</th><th>Status</th><th></th></tr></thead>
        <tbody>${filtered.map(i=>{
          const tags=(i.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
          return `<tr>
            <td><span class="tbl-id" data-id="${i.id}" title="Klik om ID te bewerken">${i.id}</span></td>
            <td>${tags.map(t=>`<span class="tag" style="background:#e5e7eb;color:#374151">${t}</span>`).join(' ')||''}</td>
            <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.title||''}</td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#555">${i.description||''}</td>
            <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#555;font-size:0.72rem">${i.ai||''}</td>
            <td>${i.type||''}</td>
            <td>${i.assignee||''}</td>
            <td><span class="${P_TBL[i.priority]||'p-medium-tbl'}">${i.priority||''}</span></td>
            <td><span class="${S_TBL[i.status]||'s-open-tbl'}">${S_ICON[i.status]||''} ${i.status||''}</span></td>
            <td style="white-space:nowrap">
              <button class="btn btn-ghost" data-edit="${i.id}" style="padding:2px 6px">✏️</button>
              <button class="btn btn-ghost" data-delete="${i.id}" style="padding:2px 6px">🗑</button>
            </td></tr>`;
        }).join('')}</tbody></table></div>`;
    }

    function _inlineEditId(el){
      const oldId=el.dataset.id;
      const input=document.createElement('input');
      input.className='tbl-id-input id-edit-input';
      input.value=oldId;
      el.replaceWith(input); input.focus(); input.select();
      const commit=()=>{
        const newId=input.value.trim();
        if(newId&&newId!==oldId){
          if(items.find(i=>i.id===newId)){ alert('ID "'+newId+'" bestaat al.'); input.focus(); return; }
          items=items.map(i=>i.id===oldId?{...i,id:newId}:i); _save();
        }
        render();
      };
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e=>{ if(e.key==='Enter')commit(); if(e.key==='Escape')render(); });
    }

    function openModal(id){
      editId=id||null;
      $('modal-title').textContent    = id ? 'Item bewerken' : 'Item toevoegen';
      $('btn-modal-save').textContent = id ? 'Opslaan' : 'Toevoegen';
      $('ai-box').style.display='none'; $('ai-box').textContent='';
      $('ai-warning').style.display = apiKey ? 'none' : 'inline';
      $('f-id').dataset.manual='';
      _updatePhasesInModal();
      if(id){
        const item=items.find(i=>i.id===id); if(!item)return;
        $('f-id').value=item.id; $('f-id').dataset.manual='1';
        $('id-preview').textContent='';
        $('f-title').value=item.title||''; $('f-phase').value=item.phase||'';
        $('f-type').value=item.type||'Feature'; $('f-priority').value=item.priority||'Medium';
        $('f-status').value=item.status||'Open'; $('f-assignee').value=item.assignee||'';
        $('f-tags').value=item.tags||''; $('f-description').value=item.description||'';
        $('f-ai').value=item.ai||'';
      } else {
        ['f-title','f-assignee','f-tags','f-description','f-ai'].forEach(fid=>$(fid).value='');
        $('f-type').value='Feature'; $('f-priority').value='Medium'; $('f-status').value='Open'; $('f-phase').value='';
        _updateAutoId();
      }
      $('f-id').addEventListener('input', ()=>{ $('f-id').dataset.manual='1'; });
      $('modal').classList.add('open'); $('f-title').focus();
    }

    function closeModal(){ $('modal').classList.remove('open'); editId=null; }

    function saveItem(){
      const title=$('f-title').value.trim(); if(!title){$('f-title').focus();return;}
      const id=$('f-id').value.trim()||_genId($('f-phase').value,$('f-type').value);
      if(!editId&&items.find(i=>i.id===id)){ alert('ID "'+id+'" bestaat al. Pas het aan.'); $('f-id').focus(); return; }
      const item={id,title,phase:$('f-phase').value,type:$('f-type').value,priority:$('f-priority').value,status:$('f-status').value,assignee:$('f-assignee').value.trim(),tags:$('f-tags').value.trim(),description:$('f-description').value.trim(),ai:$('f-ai').value.trim()};
      if(editId) items=items.map(i=>i.id===editId?item:i); else items.push(item);
      _save(); closeModal(); render();
    }

    function _deleteItem(id){ if(!confirm('Dit item verwijderen?'))return; items=items.filter(i=>i.id!==id); _save(); render(); }

    function _addPhase(){
      const v=$('input-new-phase').value.trim(), d=$('input-new-phase-desc').value.trim();
      if(v&&!phases.includes(v)){ phases.push(v); if(d)phaseDescs[v]=d; _save(); }
      _cancelPhaseInput(); render();
    }
    function _removePhase(ph){ phases=phases.filter(p=>p!==ph); if(fPhase===ph)fPhase='All'; _save(); render(); }
    function _cancelPhaseInput(){ $('input-new-phase').value=''; $('input-new-phase-desc').value=''; $('phase-input-wrap').classList.remove('open'); $('btn-new-phase').style.display=''; }
    function _updatePhasesInModal(){ $('f-phase').innerHTML=`<option value="">— geen —</option>`+phases.map(p=>`<option value="${p}">${p}</option>`).join(''); }
    function _updateViewToggle(){ $('btn-view-board').classList.toggle('active',view==='board'); $('btn-view-list').classList.toggle('active',view==='list'); }
    function _saveProjInfo(){ localStorage.setItem('bl_proj',JSON.stringify({projName,projVersion,projDate})); }
    function _loadProjInfo(){ const p=JSON.parse(localStorage.getItem('bl_proj')||'{}'); projName=p.projName||''; projVersion=p.projVersion||''; projDate=p.projDate||''; }
    function _updateApiKeyUI(){ $('apikey-label').textContent=apiKey?'AI gereed':'API key instellen'; $('btn-apikey').classList.toggle('btn-ai-ready',!!apiKey); }
    function _save(){ localStorage.setItem('bl_items',JSON.stringify(items)); localStorage.setItem('bl_phases',JSON.stringify(phases)); localStorage.setItem('bl_phasedescs',JSON.stringify(phaseDescs)); }

    function importFile(e){
      const file=e.target.files[0]; if(!file)return;
      if(!confirm('Huidige data vervangen door '+file.name+'?\nProjectnaam en versie worden ook uit het bestand gelezen.')){ e.target.value='';return; }
      const reader=new FileReader();
      reader.onload=ev=>{
        // Bij handmatig laden WEL naam/versie overnemen uit bestand
        if(file.name.endsWith('.md')) _parseMD(ev.target.result,true);
        else _parseCSV(ev.target.result);
        e.target.value='';
        alert(items.length+' items geladen uit '+file.name);
        render();
      };
      reader.readAsText(file);
    }

    function _parseCSV(text){
      const rows=text.trim().split('\n'), headers=rows[0].split(',').map(h=>h.trim());
      items=rows.slice(1).map(row=>{
        const vals=[]; let cur='',inQ=false;
        for(const ch of row){ if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else{cur+=ch;} }
        vals.push(cur.trim());
        const obj={}; headers.forEach((h,i)=>obj[h]=vals[i]||''); return obj;
      }).filter(i=>i.id);
      const seen=new Set(); phases=items.map(i=>i.phase).filter(p=>p&&!seen.has(p)&&seen.add(p)); _save();
    }

    // forceNameUpdate=true bij handmatig laden, false (default) bij automatisch eerste laden via init
    function _parseMD(text, forceNameUpdate=false){
      items=[]; phases=[]; phaseDescs={};
      let parsedName='', parsedVersion='';
      const lines=text.split('\n'); let curPhase='',curDesc='';

      for(const line of lines){
        if(line.startsWith('# ')){
          const raw=line.replace(/^#\s*/,'').trim();
          const dash=raw.indexOf('—');
          parsedName = dash>-1 ? raw.slice(dash+1).trim() : raw.replace(/^BACKLOG\.md/i,'').trim();
          continue;
        }
        if(line.startsWith('> Versie:')){
          const m=line.match(/Versie:\s*([^\s·]+)/);
          if(m&&m[1]&&m[1]!=='—') parsedVersion=m[1];
          continue;
        }
        if(line.startsWith('###')){ const raw=line.replace(/^###\s*/,'').trim(); const d=raw.indexOf('—'); curPhase=d>-1?raw.slice(0,d).trim():raw; curDesc=d>-1?raw.slice(d+1).trim():''; if(curPhase&&!phases.includes(curPhase))phases.push(curPhase); if(curDesc)phaseDescs[curPhase]=curDesc; continue; }
        if(line.startsWith('##')&&!line.startsWith('###')){ const raw=line.replace(/^##\s*/,'').trim().replace(/[✅🔄📋🔮].*/,'').trim(); const d=raw.indexOf('—'); curPhase=d>-1?raw.slice(0,d).trim():raw; curDesc=d>-1?raw.slice(d+1).trim():''; if(curPhase&&!phases.includes(curPhase))phases.push(curPhase); if(curDesc)phaseDescs[curPhase]=curDesc; continue; }
        if(line.startsWith('|')&&!line.includes('---')){
          const cells=line.split('|').map(c=>c.trim()).filter((_,i,a)=>i>0&&i<a.length-1);
          if(!cells.length||cells[0]==='ID'||cells[0]==='Taak')continue;
          let id='',prio='Medium',title='',status='Open',tags='',type='Feature',desc='',ai='',assignee='';
          if(cells.length>=9){ id=cells[0];tags=cells[1];title=cells[2];desc=cells[3];ai=cells[4];type=cells[5]||'Feature';assignee=cells[6];prio=_mapPrio(cells[7]);status=_mapStatus(cells[8]); }
          else if(cells.length>=4&&['🔴','🟡','🟢'].some(e=>cells[1].includes(e))){ id=cells[0];prio=_mapPrio(cells[1]);title=cells[2];status=_mapStatus(cells[3]);tags=cells[4]||''; }
          else if(cells.length>=3){ id=cells[0];title=cells[1];status=_mapStatus(cells[2]); }
          if(id&&title)items.push({id,phase:curPhase,title,description:desc,ai,type,priority:prio,status,assignee,tags});
        }
      }

      // Naam alleen schrijven bij eerste laden (init) of bij handmatig laden
      if(parsedName)  projName    = parsedName;
      if(parsedVersion) projVersion = parsedVersion;
      _saveProjInfo();
      _save();
    }

    function _mapStatus(s){ if(!s)return'Open'; if(s.includes('✅')||s.toLowerCase().includes('gedaan'))return'Done'; if(s.includes('🔄')||s.toLowerCase().includes('uitvoering'))return'In Progress'; if(s.toLowerCase().includes('review'))return'Review'; if(s.includes('❌')||s.toLowerCase().includes('geannuleerd'))return'Cancelled'; if(s.includes('🔮')||s.toLowerCase().includes('toekomst'))return'Future'; return'Open'; }
    function _mapPrio(s){ if(!s)return'Medium'; if(s.includes('🔴'))return'High'; if(s.includes('🟡'))return'Medium'; if(s.includes('🟢'))return'Low'; if(s.toLowerCase().includes('critical'))return'Critical'; return'Medium'; }

    function exportCSV(){
      const cols=['id','phase','tags','title','description','ai','type','assignee','priority','status'];
      const rows=[cols.join(','),...items.map(i=>cols.map(c=>'"'+V(i[c]).replace(/"/g,'""')+'"').join(','))];
      const name=(V(projName)||'backlog').replace(/\s+/g,'-')+(V(projVersion)?'-'+V(projVersion):'')+'.csv';
      _download(name,rows.join('\n'),'text/csv');
    }

    function exportMD(){
      let md=`# BACKLOG.md — ${V(projName)||'Project'}\n## Bijgewerkt: ${_fmtDate(projDate)||new Date().toLocaleDateString('nl-BE')}\n\n`;
      md+=`> Versie: ${V(projVersion)||'—'} · ${items.length} items\n\n`;
      const byPhase={};
      items.forEach(i=>{ const ph=i.phase||'Overig'; (byPhase[ph]=byPhase[ph]||[]).push(i); });
      for(const ph of [...phases,...Object.keys(byPhase).filter(p=>!phases.includes(p))]){
        if(!byPhase[ph])continue;
        const desc=phaseDescs[ph]?` — ${phaseDescs[ph]}`:'';
        md+=`## ${ph}${desc}\n\n`;
        md+=`| ID | Tags | Taak | Omschrijving | AI suggestie | Type | Toegewezen | Prioriteit | Status |\n`;
        md+=`|----|------|------|--------------|-------------|------|------------|-----------|--------|\n`;
        byPhase[ph].forEach(i=>{
          const pIcon={'Critical':'🔴','High':'🔴','Medium':'🟡','Low':'🟢'}[i.priority]||'🟡';
          md+=`| ${V(i.id)} | ${V(i.tags)} | ${V(i.title)} | ${V(i.description)} | ${V(i.ai)} | ${V(i.type)} | ${V(i.assignee)} | ${pIcon} ${V(i.priority)} | ${S_ICON[i.status]||'📋'} ${V(i.status)} |\n`;
        });
        md+='\n';
      }
      const name=(V(projName)||'BACKLOG').replace(/\s+/g,'-')+(V(projVersion)?'-'+V(projVersion):'')+'.md';
      _download(name,md,'text/markdown');
    }

    function _download(filename,content,type){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=filename; a.click(); }

    async function _getAiSuggestion(){
      const title=$('f-title').value.trim(); if(!title||!apiKey)return;
      $('btn-ai').textContent='…bezig'; $('btn-ai').disabled=true; $('ai-box').style.display='none';
      try{
        const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:`Je bent een product manager assistent. Geef voor dit backlog item:\n1) Aanbevolen prioriteit (Critical/High/Medium/Low) met 1-zin reden\n2) 2-3 concrete acceptatiecriteria\n3) Relevante tags\n\nTitel: ${title}\nOmschrijving: ${$('f-description').value||'(geen)'}\nType: ${$('f-type').value}\n\nFormaat:\nPRIORITEIT: [niveau] — [reden]\nACCEPTATIECRITERIA:\n- …\nTAGS: …`}]})});
        const data=await res.json();
        const s=data.content?.[0]?.text||'Geen suggestie ontvangen.';
        $('ai-box').textContent=s; $('ai-box').style.display='block'; $('f-ai').value=s;
      }catch(e){ $('ai-box').textContent='Fout: '+e.message; $('ai-box').style.display='block'; }
      $('btn-ai').textContent='✦ AI suggestie ophalen'; $('btn-ai').disabled=false;
    }

    return { init };
  })();

  // ================================================================
  // PROJECT LOG MODULE — parseert PROJECT_LOG.md naar uitklapbare sessiekaarten
  // ================================================================
  const ProjectLog = (() => {
    const $=id=>document.getElementById(id);

    function init() {
      // Tab wisselen
      $('tab-btn-backlog').addEventListener('click', ()=>_switchTab('backlog'));
      $('tab-btn-log').addEventListener('click',     ()=>_switchTab('log'));
      // Log bestand laden
      $('input-log-file').addEventListener('change', _loadFile);
      // Herstel log uit localStorage als aanwezig
      const saved=localStorage.getItem('bl_log');
      if(saved) _render(saved);
    }

    function _switchTab(name) {
      // Alle tabs en knoppen deactiveren
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      // Geselecteerde tab activeren
      $('tab-panel' in document ? 'tab-'+name : 'tab-'+name).classList.add('active');
      document.getElementById('tab-'+name).classList.add('active');
      $('tab-btn-'+name).classList.add('active');
    }

    function _loadFile(e) {
      const file=e.target.files[0]; if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        const text=ev.target.result;
        localStorage.setItem('bl_log', text);  // Bewaren voor volgende keer
        _render(text);
        e.target.value='';
      };
      reader.readAsText(file);
    }

    function _render(text) {
      const lines=text.split('\n');
      const sessions=[];
      let cur=null;

      for(const line of lines) {
        // Sessie-koptekst: ## Sessie X — Titel
        if(line.startsWith('## ') && line.toLowerCase().includes('sessie')) {
          if(cur) sessions.push(cur);
          cur={ title: line.replace(/^##\s*/,'').trim(), date:'', body:[] };
          continue;
        }
        if(!cur) continue;
        // Datum regel
        if(line.startsWith('**Datum:**')) {
          cur.date=line.replace('**Datum:**','').trim();
          continue;
        }
        cur.body.push(line);
      }
      if(cur) sessions.push(cur);

      // Meta info uit eerste regels
      const titleLine=lines.find(l=>l.startsWith('# '));
      const updatedLine=lines.find(l=>l.startsWith('## Bijgewerkt:'));
      const metaParts=[];
      if(titleLine) metaParts.push(titleLine.replace(/^#\s*/,'').trim());
      if(updatedLine) metaParts.push(updatedLine.replace(/^##\s*/,'').trim());
      $('log-meta').textContent=metaParts.join(' · ');

      if(!sessions.length) {
        $('log-content').innerHTML='<div class="log-empty">Geen sessies gevonden in dit bestand.</div>';
        return;
      }

      $('log-content').innerHTML=sessions.map((s,i)=>`
        <div class="log-session" id="log-s-${i}">
          <div class="log-session-header" data-idx="${i}">
            <div>
              <div class="log-session-title">${_esc(s.title)}</div>
              ${s.date?`<div class="log-session-date">📅 ${_esc(s.date)}</div>`:''}
            </div>
            <span class="log-session-toggle">▼</span>
          </div>
          <div class="log-session-body">
            <div class="log-md">${_mdToHtml(s.body.join('\n'))}</div>
          </div>
        </div>`).join('');

      // Toggle klikhandlers
      $('log-content').querySelectorAll('.log-session-header').forEach(el=>{
        el.addEventListener('click', ()=>{
          const session=document.getElementById('log-s-'+el.dataset.idx);
          session.classList.toggle('open');
        });
      });
    }

    // Eenvoudige MD → HTML converter voor log-inhoud
    function _mdToHtml(text) {
      const lines=text.split('\n');
      let html='', inList=false, inTable=false, tableRows=[];

      const flushTable=()=>{
        if(!tableRows.length){inTable=false;return;}
        html+=`<table><thead><tr>${tableRows[0].map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
        tableRows.slice(2).forEach(row=>{ html+=`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`; });
        html+=`</tbody></table>`;
        tableRows=[]; inTable=false;
      };

      for(const line of lines) {
        // Tabel
        if(line.startsWith('|')) {
          inTable=true;
          if(inList){html+='</ul>';inList=false;}
          tableRows.push(line.split('|').map(c=>c.trim()).filter((_,i,a)=>i>0&&i<a.length-1));
          continue;
        }
        if(inTable) flushTable();

        // Lege regel
        if(!line.trim()){
          if(inList){html+='</ul>';inList=false;}
          continue;
        }
        // ### koptekst
        if(line.startsWith('### ')) { html+=`<h3>${_inline(line.slice(4))}</h3>`; continue; }
        // Lijstitem
        if(line.startsWith('- ')) {
          if(!inList){html+='<ul>';inList=true;}
          html+=`<li>${_inline(line.slice(2))}</li>`;
          continue;
        }
        if(inList){html+='</ul>';inList=false;}
        // Horizontale lijn
        if(line.startsWith('---')){continue;}
        // Gewone paragraaf (geen ##, geen >)
        if(!line.startsWith('## ')&&!line.startsWith('> ')) {
          html+=`<p>${_inline(line)}</p>`;
        }
      }
      if(inList) html+='</ul>';
      if(inTable) flushTable();
      return html;
    }

    // Inline markdown: **bold**, `code`
    function _inline(t) {
      return _esc(t)
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/`([^`]+)`/g,'<code>$1</code>');
    }

    function _esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    return { init };
  })();
  </script>
</body>
