<!-- admin/accountbeheer.html — v2.0.0 — Admin accountbeheer pagina -->
<!-- Gebaseerd op standaardpagina.html — gebruikt style.css van de site -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountbeheer — MyFamTreeCollab</title>

    <!-- ===== Favicon / App-icoon ===== -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ─── Accountbeheer pagina stijlen ─── */
        .admin-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .admin-wrap h1 {
            font-size: 1.6rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 8px;
        }

        .admin-wrap .subtitel {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 28px;
        }

        /* ─── Statistieken ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #222;
        }

        /* ─── Toolbar ─── */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .toolbar select, .toolbar button {
            padding: 8px 14px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 0.9rem;
            background: #fff;
            cursor: pointer;
        }

        .toolbar button:hover { background: #e9ecef; }

        /* ─── Tabel ─── */
        .table-wrap {
            overflow-x: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        thead { background: #f1f3f5; }

        thead th {
            padding: 10px 14px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #666;
            border-bottom: 1px solid #dee2e6;
            white-space: nowrap;
        }

        tbody tr { border-bottom: 1px solid #f1f3f5; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8f9fa; }
        tbody td { padding: 10px 14px; vertical-align: middle; color: #333; }

        .col-email { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Tier badges */
        .tier-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tier-badge.viewer  { background: #d4edda; color: #155724; }
        .tier-badge.editor  { background: #cce5ff; color: #004085; }
        .tier-badge.owner   { background: #fff3cd; color: #856404; }
        .tier-badge.admin   { background: #f8d7da; color: #721c24; }

        /* Tier select */
        .tier-select {
            padding: 4px 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.85rem;
            background: #fff;
            cursor: pointer;
        }

        /* Actieknoppen */
        .row-actions { display: flex; gap: 6px; }

        .btn-action {
            padding: 4px 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.8rem;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-action:hover        { background: #e9ecef; }
        .btn-action.danger:hover { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }

        .loading-row td, .empty-row td {
            text-align: center;
            color: #888;
            padding: 40px;
        }

        /* ─── Toast ─── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #333;
            color: #fff;
            font-size: 0.88rem;
            padding: 10px 18px;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 999;
            max-width: 300px;
        }

        #toast.show  { opacity: 1; transform: translateY(0); }
        #toast.error { background: #dc3545; }

        /* ─── Modal ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal-box {
            background: #fff;
            border-radius: 8px;
            padding: 28px;
            width: 360px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        .modal-box h3 { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; color: #222; }
        .modal-box p  { font-size: 0.9rem; color: #555; margin-bottom: 20px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .btn-cancel {
            padding: 8px 18px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            background: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-confirm-delete {
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            background: #dc3545;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-confirm-delete:hover { background: #c82333; }

        /* ─── Timestamp ─── */
        #lastRefresh { font-size: 0.82rem; color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- ======================= source view enablement  ======================= -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
  <div class="admin-wrap">

    <h1>Accountbeheer</h1>
    <p id="lastRefresh" class="subtitel">Laden...</p>

    <!-- Statistieken -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Totaal</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Viewer</div>
        <div class="stat-value" id="statViewer">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Editor</div>
        <div class="stat-value" id="statEditor">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Owner</div>
        <div class="stat-value" id="statOwner">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Admin</div>
        <div class="stat-value" id="statAdmin">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Zoek op e-mail of gebruikersnaam…" />
      <select id="tierFilter">
        <option value="all">Alle tiers</option>
        <option value="viewer">Viewer</option>
        <option value="editor">Editor</option>
        <option value="owner">Owner</option>
        <option value="admin">Admin</option>
      </select>
      <button id="btnRefresh">↻ Vernieuwen</button>
    </div>

    <!-- Tabel -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>E-mail</th>
            <th>Huidige tier</th>
            <th>Tier wijzigen</th>
            <th>Aangemeld op</th>
            <th>Laatste login</th>
            <th>Acties</th>
          </tr>
        </thead>
        <tbody id="usersTbody">
          <tr class="loading-row"><td colspan="6">Laden…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- ─── Toast ─── -->
<div id="toast"></div>

<!-- ─── Modal ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>Gebruiker verwijderen</h3>
    <p>Weet je zeker dat je <strong id="modalName"></strong> wilt verwijderen? Dit kan niet ongedaan worden gemaakt.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Annuleren</button>
      <button class="btn-confirm-delete" id="btnConfirm">Verwijderen</button>
    </div>
  </div>
</div>

<!-- =============================================================
     SCRIPTS — verplichte volgorde
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/MyFamTreeCollab/js/utils.js"></script>
<script src="/MyFamTreeCollab/js/auth.js"></script>

<script>
    // TopBar laden → daarna topbar.js → daarna accountbeheer.js
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;
            var s = document.createElement('script');
            s.src = '/MyFamTreeCollab/js/topbar.js';
            s.onload = function() {
                var p = document.createElement('script');
                p.src = '/MyFamTreeCollab/js/accountbeheer.js';
                document.body.appendChild(p);
            };
            document.body.appendChild(s);
        });

    // Navbar laden
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('navbar-placeholder').innerHTML = data;
        });

    // Footer laden
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

</body>
</html>
