<!-- ======================= home/index.html v2.4.0 =======================
     Wijziging v2.4.0:
     - <main> wrapper toegevoegd rond alle <section> elementen
       zodat padding-top uit style.css de sticky header correct opvangt
     - Volledige inline commentaar toegevoegd op elke coderegel
     Wijziging v2.3.0: i18next namespace setup geïmplementeerd
     - Alle hardcoded teksten vervangen door data-i18n attributen
     - i18next + http-backend + browser-languagedetector geladen via CDN
     - js/i18n.js geladen als core i18n module
     - loadNamespace('home') aangeroepen na initialisatie
     - TopBar/Navbar/Footer vertalen via onComponentLoaded()
     - Language switcher geïntegreerd in TopBar
     v2.2.1: Demo knop toegevoegd naast "Start je stamboom"
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">                                                  <!-- Tekencodering instellen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive weergave -->
    <title>MyFamTreeCollab</title>

    <!-- ======================= FAVICON ======================= -->
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">                          <!-- Standaard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">         <!-- PNG favicon 32px -->
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">         <!-- iOS homescreen icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192x192.png">     <!-- Android homescreen icon -->

    <!-- ======================= GLOBALE CSS ======================= -->
    <link rel="stylesheet" href="css/style.css">                           <!-- Globale stijlen inclusief sticky header -->

    <!-- ======================= I18NEXT CDN — VOLGORDE KRITISCH =======================
         Regel voor elke pagina: deze 4 scripts altijd in <head>, vóór alle andere JS.
         Reden: i18nModule.init() moet klaar zijn vóór fetch van TopBar/Navbar/Footer,
         zodat buildLanguageSwitcher() de <select> vindt na injectie.
         ============================================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>                                              <!-- i18next core bibliotheek -->
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>                       <!-- HTTP back-end plugin — laadt JSON bestanden via fetch -->
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script><!-- Language detector — leest navigator / localStorage / cookie -->
    <script src="/MyFamTreeCollab/js/i18n.js"></script>                    <!-- Eigen i18n module -->

    <!-- ======================= PAGINA-SPECIFIEKE STIJLEN ======================= -->
    <style>

        /* ── Headings: verwijder standaard marges bovenaan ── */
        h1, h2, h3 {
            margin-top: 0;      /* Geen extra ruimte boven koppen */
            margin-bottom: 12px;/* Consistente ruimte onder koppen */
        }

        /* ── Hero: gecentreerde openingssectie ── */
        .hero {
            max-width: 900px;   /* Maximale breedte voor leesbaarheid */
            margin: 0 auto;     /* Horizontaal centreren */
            text-align: center; /* Tekst centreren */
            padding: 48px 24px; /* Lucht boven/onder en links/rechts */
        }

        .hero h1 {
            font-size: 2rem;    /* Grote hoofdtitel */
            margin-bottom: 12px;/* Ruimte onder de titel */
        }

        .hero p {
            color: #555;        /* Iets grijzere subtekst */
            margin-bottom: 20px;/* Ruimte onder paragraaf */
            line-height: 1.6;   /* Regelafstand voor leesbaarheid */
        }

        .hero-actions a {
            margin: 6px;        /* Ruimte tussen de actieknoppen */
        }

        /* ── Demo intro: kleine hint-tekst onder knoppen ── */
        .demo-intro {
            font-size: 0.88rem; /* Kleiner dan bodytekst */
            color: #888;        /* Lichtgrijs */
            margin-top: 12px;   /* Ruimte boven de tekst */
        }

        .demo-intro a {
            color: #1E90FF;         /* Blauwe linkkleur */
            text-decoration: underline; /* Underline voor herkenbaarheid */
        }

        /* ── Buttons ── */
        .btn-primary {
            background: #1E90FF;    /* Blauwe achtergrond */
            color: #fff;            /* Witte tekst */
            padding: 12px 26px;     /* Klikruimte */
            border-radius: 6px;     /* Afgeronde hoeken */
            text-decoration: none;  /* Geen underline */
            font-weight: bold;      /* Vetgedrukt */
        }

        .btn-primary:hover {
            background: #1278d4;    /* Donkerder blauw bij hover */
        }

        .btn-secondary {
            border: 1px solid #1E90FF; /* Blauwe rand */
            color: #1E90FF;            /* Blauwe tekst */
            padding: 12px 26px;        /* Klikruimte */
            border-radius: 6px;        /* Afgeronde hoeken */
            text-decoration: none;     /* Geen underline */
        }

        .btn-demo {
            border: 1px solid #28a745; /* Groene rand */
            color: #28a745;            /* Groene tekst */
            padding: 12px 26px;        /* Klikruimte */
            border-radius: 6px;        /* Afgeronde hoeken */
            text-decoration: none;     /* Geen underline */
            cursor: pointer;           /* Pointer cursor bij hover */
            background: transparent;   /* Transparante achtergrond */
            font-size: 1rem;           /* Zelfde grootte als bodytekst */
            font-weight: normal;       /* Niet vetgedrukt */
        }

        .btn-demo:hover {
            background: #e8f5e9;       /* Lichtgroene achtergrond bij hover */
        }

        /* ── Secties: gecentreerde inhoudsblokken ── */
        section {
            max-width: 900px;   /* Maximale breedte */
            margin: 0 auto;     /* Horizontaal centreren */
            padding: 28px 24px; /* Lucht boven/onder en links/rechts */
        }

        section h2 {
            margin-bottom: 10px;/* Ruimte onder sectiekoppen */
        }

        section p {
            margin-bottom: 12px;/* Ruimte onder paragrafen */
            line-height: 1.6;   /* Regelafstand */
        }

        /* ── Benefits: grid van voordelen-kaarten ── */
        .benefits {
            display: grid;              /* CSS grid layout */
            grid-template-columns: 1fr; /* Één kolom (mobiel-first) */
            gap: 16px;                  /* Ruimte tussen kaarten */
        }

        .benefit {
            border: 1px solid #ddd;     /* Lichte rand */
            padding: 16px;              /* Interne marge */
            border-radius: 6px;         /* Afgeronde hoeken */
            background: #fafafa;        /* Lichte achtergrond */
        }

        /* ── Steps: genummerde stappenlijst ── */
        .steps ol {
            padding-left: 20px; /* Inspringing voor nummers */
            line-height: 1.6;   /* Regelafstand */
        }

        /* ── CTA: gecentreerde call-to-action onderaan ── */
        .cta {
            text-align: center; /* Tekst en knop centreren */
        }

    </style>
</head>
<body>

    <!-- ======================= TOPBAR ======================= -->
    <div id="topbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= NAVBAR ======================= -->
    <div id="navbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= PAGINA-INHOUD ======================= -->
    <!-- <main> zorgt dat padding-top uit style.css de sticky header opvangt -->
    <main>

        <!-- ── HERO ── Openingssectie met titel, subtitel en actieknoppen ── -->
        <section class="hero">

            <h1 data-i18n="home:hero.title"></h1>                          <!-- Hoofdtitel via i18n -->
            <p  data-i18n="home:hero.subtitle"></p>                        <!-- Subtitel via i18n -->

            <!-- Actieknoppen: start, meer info, demo -->
            <div class="hero-actions">
                <a href="/MyFamTreeCollab/home/create.html"
                   class="btn-primary"
                   data-i18n="home:hero.ctaStart"></a>                     <!-- Primaire CTA -->

                <a href="/MyFamTreeCollab/home/about.html"
                   class="btn-secondary"
                   data-i18n="home:hero.ctaMore"></a>                      <!-- Secundaire CTA -->

                <button id="btnDemo"
                        class="btn-demo"
                        data-i18n="home:hero.ctaDemo"></button>            <!-- Demo knop -->
            </div>

            <!-- Demo uitlegblok -->
            <div class="benefit">
                <h3 data-i18n="home:demo.title"></h3>                      <!-- "🌳 Bekijk demo" -->
                <p  data-i18n="home:demo.description"></p>                 <!-- Uitleg demo stamboom -->
            </div>

        </section>

        <!-- ── WAAROM ── Probleemstelling en oplossing ── -->
        <section>
            <h2 data-i18n="home:why.title"></h2>                           <!-- Sectietitel -->
            <p  data-i18n="home:why.problem"></p>                          <!-- Probleemstelling -->
            <p  data-i18n="home:why.solution"></p>                         <!-- Oplossing -->
        </section>

        <!-- ── VOORDELEN ── Grid van drie benefit-kaarten ── -->
        <section class="benefits">

            <div class="benefit">
                <h3 data-i18n="home:why.privacy.title"></h3>               <!-- "🔐 Jij behoudt controle" -->
                <p  data-i18n="home:why.privacy.text"></p>                 <!-- Privacy uitleg -->
            </div>

            <div class="benefit">
                <h3 data-i18n="home:why.collab.title"></h3>                <!-- "🤝 Samen bouwen" -->
                <p  data-i18n="home:why.collab.text"></p>                  <!-- Samenwerken uitleg -->
            </div>

            <div class="benefit">
                <h3 data-i18n="home:why.easy.title"></h3>                  <!-- "⚡ Eenvoudig starten" -->
                <p  data-i18n="home:why.easy.text"></p>                    <!-- Eenvoud uitleg -->
            </div>

        </section>

        <!-- ── HOE HET WERKT ── Genummerde stappenlijst ── -->
        <section class="steps">
            <h2 data-i18n="home:howItWorks.title"></h2>                    <!-- Sectietitel -->
            <ol>
                <li data-i18n="home:howItWorks.step1"></li>                <!-- Stap 1 -->
                <li data-i18n="home:howItWorks.step2"></li>                <!-- Stap 2 -->
                <li data-i18n="home:howItWorks.step3"></li>                <!-- Stap 3 -->
            </ol>
        </section>

        <!-- ── VERHAAL ── Achtergrond van het project ── -->
        <section>
            <h2 data-i18n="home:story.title"></h2>                         <!-- Sectietitel -->
            <p  data-i18n="home:story.text"></p>                           <!-- Verhaaltekst -->
        </section>

        <!-- ── CTA ── Afsluitende call-to-action ── -->
        <section class="cta">
            <h2 data-i18n="home:cta.title"></h2>                           <!-- CTA titel -->
            <a href="/MyFamTreeCollab/home/create.html"
               class="btn-primary"
               data-i18n="home:cta.button"></a>                            <!-- CTA knop -->
        </section>

    </main>

    <!-- ======================= FOOTER ======================= -->
    <div id="footer-placeholder"></div>                                     <!-- Wordt gevuld via fetch + i18n -->

    <!-- ======================= EXTERNE SCRIPTS ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase SDK -->
    <script src="js/utils.js"></script>                                     <!-- Utilities -->
    <script src="js/schema.js"></script>                                    <!-- Schema definities -->
    <script src="js/storage.js"></script>                                   <!-- Lokale opslag module -->
    <script src="js/auth.js"></script>                                      <!-- Authenticatie module -->
    <script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>            <!-- Bezoektracking -->
    <script src="js/demo.js"></script>                                      <!-- Demo module -->

    <!-- ======================= INITIALISATIE ======================= -->
    <script>

        // ── i18n initialiseren ──
        // Moet als eerste — vóór de fetch calls — zodat vertalingen
        // klaar zijn op het moment dat componenten worden geïnjecteerd
        i18nModule.init().then(function() {

            i18nModule.loadNamespace('home');                               // Home namespace laden na common

            // ── TopBar laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/TopBar.html')                   // TopBar HTML ophalen
                .then(resp => resp.text())                                  // Response naar tekst converteren
                .then(function(html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('topbar-placeholder')
                    );
                    var s   = document.createElement('script');            // Script element aanmaken
                    s.src   = 'js/topbar.js';                              // Pad naar topbar.js
                    document.body.appendChild(s);                          // Aan DOM toevoegen om laden te starten
                });

            // ── Navbar laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/Navbar.html')                   // Navbar HTML ophalen
                .then(resp => resp.text())                                  // Response naar tekst converteren
                .then(function(html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('navbar-placeholder')
                    );
                });

            // ── Footer laden en injecteren ──
            fetch('/MyFamTreeCollab/Layout/Footer.html')                   // Footer HTML ophalen
                .then(resp => resp.text())                                  // Response naar tekst converteren
                .then(function(html) {
                    i18nModule.onComponentLoaded(                           // Injecteren + vertalingen toepassen
                        html,
                        document.getElementById('footer-placeholder')
                    );
                });

            SiteAnalytics.trackPage("home");                               // Paginabezoek registreren in Supabase

        });

        // ── Demo knop handler ──
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('btnDemo');                  // Demo knop ophalen
            if (!btn) return;                                              // Knop niet gevonden — stoppen

            btn.addEventListener('click', async function() {
                if (!window.DemoModule) {                                  // Controleer of DemoModule geladen is
                    alert(i18nModule.t('common.errors.loadFailed'));       // Vertaalde foutmelding tonen
                    return;
                }
                btn.textContent = i18nModule.t('common.loading.data');    // Knoptekst naar "Gegevens ophalen…"
                btn.disabled    = true;                                    // Knop uitschakelen tijdens laden
                await window.DemoModule.loadDemo(true);                    // Demo laden (force = true)
                window.location.href = '/MyFamTreeCollab/stamboom/manage.html'; // Navigeren naar beheer
            });
        });

    </script>

</body>
</html>
