<!-- ======================= develop/maintenance.html v0.3.0 =======================
     Wijziging v0.3.0 (sessie 27):
     - i18n toegevoegd: i18next CDN + i18n.js in laadvolgorde
     - Namespace 'maintenance' geladen via i18nModule.init() promise-keten
     - data-i18n attributen toegevoegd op alle zichtbare teksten
     - Countdown-tekst bijgewerkt via i18n na elke tik
     - Footer geladen via i18nModule.onComponentLoaded()
     - document.title via i18nModule.t()
     - trackPage gecorrigeerd: was "evenement", nu "maintenance"
     - Laadvolgorde: supabase → utils → auth → siteAnalytics → i18next CDN → i18n.js
     - Geen TopBar/Navbar — opzettelijk (maintenance pagina)

     Wijziging v0.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd, trackPage toegevoegd
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tijdelijk niet beschikbaar</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
<header>
    <h1 data-i18n="maintenance:header">Mijn Website</h1>                  <!-- i18n: header -->
</header>

<main style="text-align:center; padding:4rem;">
    <h2 data-i18n="maintenance:titel">Pagina tijdelijk niet bereikbaar</h2>          <!-- i18n: titel -->
    <p data-i18n="maintenance:tekst1">Deze pagina is momenteel in ontwikkeling of tijdelijk niet beschikbaar.</p>  <!-- i18n -->
    <p data-i18n="maintenance:tekst2">Onze excuses voor het ongemak.</p>             <!-- i18n -->
    <p id="countdown-tekst">                                               <!-- Countdown-tekst — gevuld door JS -->
        U wordt automatisch doorgestuurd naar de homepage in <span id="countdown">5</span> seconden...
    </p>
    <br>
    <a href="https://vorilo2000-source.github.io/MyFamTreeCollab/index.html"
       class="btn"
       data-i18n="maintenance:knopHome">Ga direct naar Home</a>           <!-- i18n: knoptekst -->
</main>

<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — verplichte laadvolgorde (sessie 27):
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     4. siteAnalytics.js    — bezoektracking, na auth.js
     5. i18next CDN + plugins — vereist door i18n.js
     6. i18n.js             — wraps i18next, exposeert window.i18nModule
     7. Pagina init         — init() → loadNamespace('maintenance') → footer → countdown
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <!-- Supabase SDK -->
<script src="../js/utils.js"></script>                                         <!-- Gedeelde hulpfuncties -->
<script src="../js/auth.js"></script>                                          <!-- Authenticatie module -->
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>                  <!-- Bezoektracking, na auth.js -->

<!-- i18next en plugins — volgorde is verplicht -->
<script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
<script src="/MyFamTreeCollab/js/i18n.js"></script>                           <!-- i18n module wrapper -->

<script>
    var REDIRECT_URL = 'https://vorilo2000-source.github.io/MyFamTreeCollab/index.html'; // redirect doel

    i18nModule.init()
        .then(function () {
            return i18nModule.loadNamespace('maintenance');                // laad maintenance.json voor actieve taal
        })
        .then(function () {
            document.title = i18nModule.t('maintenance:paginaTitel');     // paginatitel via i18n

            // Footer laden en vertalen — geen TopBar/Navbar op deze pagina
            return fetch('/MyFamTreeCollab/Layout/Footer.html')
                .then(function (resp) { return resp.text(); })
                .then(function (html) {
                    i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
                });
        })
        .then(function () {
            // ── Countdown ───────────────────────────────────────────────
            var seconden = 5;                                              // startwaarde countdown
            var countdownEl = document.getElementById('countdown');        // span met getal

            function updateCountdownTekst() {                             // vertaalde countdown-zin bijwerken
                var tekst = i18nModule.t('maintenance:countdown', { seconden: seconden });
                document.getElementById('countdown-tekst').textContent = tekst;
            }

            updateCountdownTekst();                                        // direct na init weergeven

            var interval = setInterval(function () {
                seconden--;                                                // één seconde aftrekken
                updateCountdownTekst();                                    // vertaalde tekst bijwerken
                if (seconden <= 0) {
                    clearInterval(interval);                               // stop de countdown
                    window.location.href = REDIRECT_URL;                  // redirect naar homepage
                }
            }, 1000);

            SiteAnalytics.trackPage('maintenance');                       // bezoek registreren
        });
</script>

</body>
</html>
