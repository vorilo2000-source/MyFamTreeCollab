<!-- ======================= home/import.html v2.3.0 =======================
     Wijziging v2.3.0 (sessie 25):
     - i18next geïntegreerd: laadvolgorde scripts in <head> toegevoegd
     - i18nModule.init() + loadNamespace('import') toegevoegd
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded() geladen
     - Alle tekst vervangen door data-i18n="import:*" attributen
     - Custom file input gebouwd: native input verborgen, eigen knop + span
       zodat "Kies bestand" en "Geen bestand geselecteerd" vertaalbaar zijn
     - <title> dynamisch gezet via i18nModule

     Wijziging v2.2.0 (sessie 25):
     - Eerste i18n refactor

     Wijziging v2.1.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("import") toegevoegd in fetch-scriptblok

     Wijziging v2.0.3 (F5-04):
     - AccessGuard toegevoegd: alleen owner mag importeren
     - shareModule.js + accessGuard.js toegevoegd aan laadvolgorde

     Scripts: supabase → utils.js → auth.js → siteAnalytics.js →
              i18n init → [TopBar fetch → topbar.js] → schema.js →
              storage.js → shareModule.js → accessGuard.js → import.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Zorgt voor correcte tekencodering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive gedrag -->
    <title>Import</title> <!-- Wordt overschreven door i18n na init -->

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css"> <!-- Globale styling -->

    <!-- ======================= i18next laadvolgorde (verplicht) ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script> <!-- Centrale i18n module -->

    <style>
        .welkom-blok { margin-bottom: 24px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        .import-sectie {
            border: 1px solid #ddd; border-radius: 6px; padding: 24px;
            margin-bottom: 20px; background: #fafafa; max-width: 560px;
        }
        .import-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 6px 0; color: #333; }
        .import-sectie .subtitel { font-size: 0.88rem; color: #888; margin: 0 0 18px 0; }
        .import-sectie p  { font-size: 0.9rem; color: #555; line-height: 1.6; margin: 0 0 16px 0; }

        /* ======================= CUSTOM FILE INPUT ======================= */
        /* Verbergt de native browser file input volledig */
        #importFile {
            display: none;
        }

        /* Wrapper voor de custom file input rij */
        .custom-file-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* Eigen "Kies bestand" knop — triggert de verborgen native input */
        .knop-kies-bestand {
            padding: 8px 16px;
            background: #6c757d;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .knop-kies-bestand:hover { background: #5a6268; }

        /* Tekst die de bestandsnaam of "Geen bestand geselecteerd" toont */
        #bestandsnaam {
            font-size: 0.9rem;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .knop-import {
            padding: 10px 24px; background: #1E90FF; color: #fff;
            border: none; border-radius: 5px; font-size: 0.95rem;
            font-weight: bold; cursor: pointer;
        }
        .knop-import:hover { background: #1278d4; }

        #importStatus { font-size: 0.9rem; margin-top: 12px; }

        .info-blok {
            max-width: 560px; background: #eef4fb;
            border-left: 4px solid #1E90FF; border-radius: 0 6px 6px 0;
            padding: 14px 18px; font-size: 0.88rem; color: #333; line-height: 1.7;
        }
        .info-blok strong { color: #004080; }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<main>
    <div class="container">

        <!-- Welkomstblok -->
        <div class="welkom-blok">
            <h1 data-i18n="import:welcome.heading"></h1>
            <p data-i18n="import:welcome.intro"></p>
        </div>

        <!-- Formulier sectie -->
        <div class="import-sectie">
            <h2 data-i18n="import:form.heading"></h2>
            <p class="subtitel" data-i18n="import:form.subtitle"></p>

            <!-- Native input verborgen — wordt getriggerd via knop hieronder -->
            <input type="file" id="importFile" accept=".csv,.txt">

            <!-- Custom file input: eigen knop + bestandsnaam span -->
            <div class="custom-file-wrapper">
                <!-- Knop triggert click op de verborgen native input -->
                <button type="button"
                        class="knop-kies-bestand"
                        id="kiesBestandBtn"
                        data-i18n="import:file.button">Kies bestand</button>
                <!-- Toont bestandsnaam na selectie, of "Geen bestand geselecteerd" -->
                <span id="bestandsnaam" data-i18n="import:file.noFile">Geen bestand geselecteerd</span>
            </div>

            <!-- Import knop -->
            <button id="importBtn" class="knop-import" data-i18n="import:form.button"></button>
            <p id="importStatus"></p>
        </div>

        <!-- Infoblok — elke regel apart vertaald -->
        <div class="info-blok">
            <strong data-i18n="import:info.heading"></strong><br>
            <span data-i18n="import:info.line1"></span><br>
            <span data-i18n="import:info.line2"></span><br>
            <span data-i18n="import:info.line3"></span><br>
            <span data-i18n="import:info.line4"></span>
        </div>

    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= SCRIPTS ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: na auth.js zodat tier beschikbaar is -->

<script>
    // ======================= i18n initialiseren =======================
    i18nModule.init().then(function () {

        // Laad de 'import' namespace voor deze pagina
        i18nModule.loadNamespace('import');

        // Stel paginatitel in via i18n key
        document.title = i18nModule.t('import:page.title');

        // ======================= TopBar laden =======================
        fetch('/MyFamTreeCollab/Layout/TopBar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
                var s = document.createElement('script');
                s.src = '../js/topbar.js';
                document.body.appendChild(s);
            });

        // ======================= Navbar laden =======================
        fetch('/MyFamTreeCollab/Layout/Navbar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
            });

        // ======================= Footer laden =======================
        fetch('/MyFamTreeCollab/Layout/Footer.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
            });
    });

    // Pagina tracking — buiten i18n init, blokkeert niets
    SiteAnalytics.trackPage("import"); // Bezoek registreren in Supabase page_visits tabel
</script>

<script src="../js/schema.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shareModule.js"></script>     <!-- Vereist door accessGuard.js -->
<script src="../js/accessGuard.js"></script>     <!-- Rolcheck: alleen owner -->
<script src="../js/import.js"></script>

<script>
    // ======================= Custom file input logica =======================
    document.addEventListener('DOMContentLoaded', function () {

        var kiesBtn     = document.getElementById('kiesBestandBtn'); // Eigen kies-knop
        var nativeInput = document.getElementById('importFile');      // Verborgen native input
        var naamSpan    = document.getElementById('bestandsnaam');    // Bestandsnaam display

        // Klik op eigen knop → triggert de verborgen native file picker
        kiesBtn.addEventListener('click', function () {
            nativeInput.click();
        });

        // Na bestandsselectie: toon bestandsnaam of "Geen bestand geselecteerd"
        nativeInput.addEventListener('change', function () {
            if (nativeInput.files.length > 0) {
                // Toon "Geselecteerd: bestandsnaam.csv"
                naamSpan.textContent = i18nModule.t('import:file.selected') + nativeInput.files[0].name;
                naamSpan.removeAttribute('data-i18n'); // Verwijder key zodat updateContent() dit niet overschrijft
            } else {
                // Reset naar "Geen bestand geselecteerd"
                naamSpan.textContent = i18nModule.t('import:file.noFile');
                naamSpan.setAttribute('data-i18n', 'import:file.noFile'); // Herstel key voor taalwissel
            }
        });

        // ======================= Rolcheck =======================
        window.AccessGuard.check([]); // Lege array: alleen owner wordt doorgelaten
    });
</script>

</body>
</html>
