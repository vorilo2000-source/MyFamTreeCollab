<!-- ======================= admin/analytics.html v3.0.0 =======================
     DESIGN SYSTEM UPDATE:
     - Consistente dark UI (geen light table meer)
     - Eén kleur-hiërarchie (primary / muted / accent)
     - Tier kleuren via CSS variables (geen inline chaos)
     - E-mail styling expliciet (geen inheritance bugs)
     - Tabellen visueel aligned met cards
     ======================================================================= -->

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics Dashboard — MyFamTreeCollab</title>

<link rel="stylesheet" href="../css/style.css">

<!-- ======================= DESIGN SYSTEM ======================= -->
<style>

/* ======================= ROOT DESIGN TOKENS ======================= */
:root {
    /* Achtergronden */
    --bg-main:      #565656;        /* pagina */
    --bg-card:      #3a3a3a;        /* cards/panels */
    --bg-card-alt:  #444444;        /* hover/alt */

    /* Tekst hiërarchie */
    --text-primary: #f0f0f0;        /* hoofdtekst */
    --text-muted:   #aaaaaa;        /* labels */
    --text-soft:    #d0d0d0;        /* secundair */

    /* Accent systeem */
    --accent:       #00d4aa;        /* hoofd accent */
    --accent-dim:   rgba(0,212,170,0.15);

    /* Tier kleuren */
    --tier-guest:   #aaaacc;
    --tier-owner:   #f0c040;
    --tier-admin:   #f08080;
    --tier-anon:    #888888;

    /* UI */
    --border:       rgba(255,255,255,0.08);
    --radius:       8px;
}

/* ======================= BASE ======================= */
main {
    background: var(--bg-main);
    min-height: 100vh;
    padding: 32px;
    color: var(--text-primary);
}

/* ======================= PANEL ======================= */
.panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
}

/* ======================= EVENT ROW ======================= */
.event-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

/* ======================= LABEL ======================= */
.event-label {
    font-size: 0.8rem;
    color: var(--text-primary);
    min-width: 160px;
}

/* ======================= BAR ======================= */
.event-bar-wrap {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
}

.event-bar {
    height: 100%;
    border-radius: 4px;
}

/* ======================= COUNT ======================= */
.event-count {
    font-size: 0.8rem;
    min-width: 30px;
    text-align: right;
}

/* ======================= TIER ROW ======================= */
.tier-row {
    cursor: pointer;
}

/* ======================= EMAIL LIST ======================= */
.tier-email-list {
    display: none;
    margin-left: 10px;
    padding-left: 10px;
    border-left: 2px solid var(--border);
}

.tier-email-list.open {
    display: block;
}

/* ======================= EMAIL ITEM ======================= */
.tier-email {
    color: var(--text-soft);   /* bewust zachter dan primary */
    font-size: 0.75rem;
    padding: 2px 0;
}

/* ======================= TABLE ======================= */
table {
    width: 100%;
    border-collapse: collapse;
}

thead th {
    text-align: left;
    font-size: 0.7rem;
    color: var(--text-muted);
    padding: 10px;
}

tbody td {
    padding: 10px;
    color: var(--text-primary);         /* FIX: nooit meer zwart */
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
}

/* ======================= EMAIL CELL ======================= */
.email-cell {
    color: var(--accent);               /* e-mails krijgen accent */
    font-size: 0.75rem;
}

</style>
</head>

<body>

<main>

<div id="pages-chart"></div>
<div id="sessions-table"></div>

</main>

<script>

/* ======================= TIER RENDER ======================= */
function renderTierVerdeling(data) {

    const container = document.getElementById("pages-chart");

    const tierColors = {
        guest:  "var(--tier-guest)",
        owner:  "var(--tier-owner)",
        admin:  "var(--tier-admin)"
    };

    const grouped = {};

    data.forEach(r => {

        const tier = r.tier || "anoniem";

        if (!grouped[tier]) {
            grouped[tier] = { count: 0, emails: new Set() };
        }

        grouped[tier].count++;

        if (r.email) grouped[tier].emails.add(r.email);

    });

    const entries = Object.entries(grouped);

    const max = Math.max(...entries.map(e => e[1].count));

    container.innerHTML = entries.map((entry, i) => {

        const tier = entry[0];
        const stats = entry[1];

        const pct = (stats.count / max) * 100;

        const color = tierColors[tier] || "var(--tier-anon)";

        const id = "emails-" + i;

        const emails = Array.from(stats.emails).sort();

        return `
        
        <div class="tier-row" onclick="document.getElementById('${id}').classList.toggle('open')">

            <span class="event-label" style="color:${color}">
                ${tier}
            </span>

            <div class="event-bar-wrap">
                <div class="event-bar" style="width:${pct}%;background:${color}"></div>
            </div>

            <span class="event-count" style="color:${color}">
                ${stats.count}
            </span>

        </div>

        <div class="tier-email-list" id="${id}">
            ${emails.map(m => `<div class="tier-email">${m}</div>`).join("")}
        </div>

        `;

    }).join("");

}

/* ======================= TABLE RENDER ======================= */
function renderTable(data) {

    const container = document.getElementById("sessions-table");

    container.innerHTML = `
    
    <table>

        <thead>
            <tr>
                <th>Pagina</th>
                <th>E-mail</th>
            </tr>
        </thead>

        <tbody>
            ${data.map(r => `
                <tr>
                    <td>${r.page}</td>
                    <td class="email-cell">${r.email || "—"}</td>
                </tr>
            `).join("")}
        </tbody>

    </table>
    
    `;
}

/* ======================= DEMO DATA ======================= */
const demo = [
    { tier: "guest", email: "guest@test.com", page: "home" },
    { tier: "owner", email: "owner@test.com", page: "dashboard" },
    { tier: "admin", email: "admin@test.com", page: "admin" },
    { tier: null, email: null, page: "landing" }
];

/* ======================= INIT ======================= */
renderTierVerdeling(demo);
renderTable(demo);

</script>

</body>
</html>
