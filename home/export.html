<!-- ======================= home/export.html v2.3.0 =======================
     Wijziging v2.3.0 (sessie 25):
     - i18next geïntegreerd: laadvolgorde scripts in <head> toegevoegd
     - i18nModule.init() + loadNamespace('export') toegevoegd
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded() geladen
     - Alle tekst vervangen door data-i18n="export:*" attributen
     - <title> dynamisch gezet via i18nModule

     Wijziging v2.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("export") toegevoegd in fetch-scriptblok

     Wijziging v2.1.3 (F5-04):
     - AccessGuard toegevoegd: alleen owner mag exporteren

     Scripts: supabase → utils.js → auth.js → siteAnalytics.js →
              i18n init → [TopBar fetch → topbar.js] → schema.js →
              storage.js → shareModule.js → accessGuard.js → export.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Zorgt voor correcte tekencodering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive gedrag -->
    <title>Export</title> <!-- Wordt overschreven door i18n na init -->

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css"> <!-- Globale styling -->

    <!-- ======================= i18next laadvolgorde (verplicht) ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script> <!-- Centrale i18n module -->

    <style>

    /* ── Tijdelijk: ruimte voor sticky TopBar + Navbar ──
           Verwijderen zodra style.css v1.0.7 live is         */
        main {
            padding-top: 150px; /* 35px topbar + ~56px navbar + 9px marge */
        }
         
        .export-sectie {
            border: 1px solid #ddd; border-radius: 6px; padding: 20px 24px;
            margin-bottom: 20px; background: #fafafa;
        }
        .export-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 10px 0; color: #333; }
        .export-sectie p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0 0 14px 0; }
        .export-sectie .opmerking { font-size: 0.85rem; color: #888; margin-top: 10px; }

        #exportCSVBtn, #exportJSONBtn {
            padding: 9px 18px; cursor: pointer; border: none;
            border-radius: 4px; font-size: 0.95rem; font-weight: bold;
        }
        #exportCSVBtn        { background: #5bc0de; color: #fff; }
        #exportCSVBtn:hover  { background: #31b0d5; }
        #exportJSONBtn       { background: #0275d8; color: #fff; }
        #exportJSONBtn:hover { background: #025aa5; }
        #exportStatus        { font-size: 0.9rem; margin-top: 8px; }

        .welkom-blok { margin-bottom: 24px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<main>
    <div class="container">

        <!-- Welkomstblok -->
        <div class="welkom-blok">
            <h1 data-i18n="export:welcome.heading"></h1>
            <p data-i18n="export:welcome.intro"></p>
        </div>

        <!-- CSV sectie -->
        <div class="export-sectie">
            <h2 data-i18n="export:csv.heading"></h2>
            <p data-i18n="export:csv.body"></p>
            <p><strong data-i18n="export:csv.chromeTip"></strong></p>
            <button id="exportCSVBtn" data-i18n="export:csv.button"></button>
            <p id="exportStatus"></p>
        </div>

        <!-- JSON sectie -->
        <div class="export-sectie">
            <h2 data-i18n="export:json.heading"></h2>
            <p data-i18n="export:json.body"></p>
            <button id="exportJSONBtn" data-i18n="export:json.button"></button>
            <p class="opmerking" data-i18n="export:json.note"></p>
        </div>

    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= SCRIPTS ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: na auth.js zodat tier beschikbaar is -->

<script>
    // ======================= i18n initialiseren =======================
    i18nModule.init().then(function () {

        // Laad de 'export' namespace voor deze pagina
        i18nModule.loadNamespace('export');

        // Stel paginatitel in via i18n key
        document.title = i18nModule.t('export:page.title');

        // ======================= TopBar laden =======================
        fetch('/MyFamTreeCollab/Layout/TopBar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
                var s = document.createElement('script');
                s.src = '../js/topbar.js';
                document.body.appendChild(s);
            });

        // ======================= Navbar laden =======================
        fetch('/MyFamTreeCollab/Layout/Navbar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
            });

        // ======================= Footer laden =======================
        fetch('/MyFamTreeCollab/Layout/Footer.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
            });
    });

    // Pagina tracking — buiten i18n init, blokkeert niets
    SiteAnalytics.trackPage("export"); // Bezoek registreren in Supabase page_visits tabel
</script>

<script src="../js/schema.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shareModule.js"></script>     <!-- Vereist door accessGuard.js -->
<script src="../js/accessGuard.js"></script>     <!-- Rolcheck: alleen owner -->
<script src="../js/export.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        // Rolcheck: export.html is alleen voor owner
        window.AccessGuard.check([]); // Lege array: alleen owner wordt doorgelaten

        var statusEl      = document.getElementById('exportStatus');   // Statusmelding element
        var exportCSVBtn  = document.getElementById('exportCSVBtn');   // CSV export knop
        var exportJSONBtn = document.getElementById('exportJSONBtn');  // JSON export knop

        exportCSVBtn.addEventListener('click', function () {
            window.ExportModule.exportCSV(statusEl); // Roept exportCSV aan in export.js
        });
        exportJSONBtn.addEventListener('click', function () {
            window.ExportModule.exportJSON(statusEl); // Roept exportJSON aan in export.js
        });
    });
</script>

</body>
</html>
