<!-- ======================= home/index.html v2.3.0 =======================
     v2.3.0: i18next namespace setup geïmplementeerd
     - Alle hardcoded teksten vervangen door data-i18n attributen
     - i18next + http-backend + browser-languagedetector geladen via CDN
     - js/i18n.js geladen als core i18n module
     - loadNamespace('home') aangeroepen na initialisatie
     - TopBar/Navbar/Footer vertalen via onComponentLoaded()
     - Language switcher geïntegreerd in TopBar
     v2.2.1: Demo knop toegevoegd naast "Start je stamboom"
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Tekencodering instellen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive weergave -->
    <title>MyFamTreeCollab</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192x192.png">

    <link rel="stylesheet" href="css/style.css"> <!-- Globale CSS -->

    <style>
        /* ======================= GLOBAL HEADINGS ======================= */
        h1, h2, h3 {
            margin-top: 0;
            margin-bottom: 12px;
        }

        /* ======================= HERO ======================= */
        .hero {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            padding: 48px 24px;
        }

        .hero h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .hero p {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .hero-actions a {
            margin: 6px;
        }

        /* ======================= DEMO TEKST ======================= */
        .demo-intro {
            font-size: 0.88rem;
            color: #888;
            margin-top: 12px;
        }

        .demo-intro a {
            color: #1E90FF;
            text-decoration: underline;
        }

        /* ======================= BUTTONS ======================= */
        .btn-primary {
            background: #1E90FF;
            color: #fff;
            padding: 12px 26px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #1278d4;
        }

        .btn-secondary {
            border: 1px solid #1E90FF;
            color: #1E90FF;
            padding: 12px 26px;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn-demo {
            border: 1px solid #28a745;
            color: #28a745;
            padding: 12px 26px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            background: transparent;
            font-size: 1rem;
            font-weight: normal;
        }

        .btn-demo:hover {
            background: #e8f5e9;
        }

        /* ======================= SECTIONS ======================= */
        section {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        section h2 {
            margin-bottom: 10px;
        }

        section p {
            margin-bottom: 12px;
            line-height: 1.6;
        }

        /* ======================= BENEFITS ======================= */
        .benefits {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .benefit {
            border: 1px solid #ddd;
            padding: 16px;
            border-radius: 6px;
            background: #fafafa;
        }

        /* ======================= STEPS ======================= */
        .steps ol {
            padding-left: 20px;
            line-height: 1.6;
        }

        /* ======================= CTA ======================= */
        .cta {
            text-align: center;
        }

        /* ======================= LANGUAGE SWITCHER ======================= */
        .lang-switcher-wrap {
            text-align: right;      /* Rechts uitlijnen */
            padding: 8px 24px;      /* Ruimte rondom */
        }

        #languageSwitcher {
            padding: 4px 8px;       /* Klikbare ruimte */
            border-radius: 4px;     /* Afgeronde hoeken */
            border: 1px solid #ccc; /* Lichte rand */
            font-size: 0.9rem;      /* Iets kleiner dan body */
            cursor: pointer;        /* Handcursor */
        }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div> <!-- Wordt gevuld via fetch -->

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div> <!-- Wordt gevuld via fetch -->

<!-- ======================= Language switcher ======================= -->
<!-- Staat buiten TopBar zodat hij altijd beschikbaar is,
     ook als TopBar nog niet geladen is -->
<div class="lang-switcher-wrap">
    <label for="languageSwitcher" data-i18n="common.language.label"></label> <!-- "Taal" / "Language" / "Idioma" -->
    <select id="languageSwitcher"></select> <!-- Wordt gevuld door buildLanguageSwitcher() in i18n.js -->
</div>

<!-- ======================= HERO ======================= -->
<section class="hero">

    <!-- Hoofdtitel — vertaald via home.hero.title -->
    <h1 data-i18n="home.hero.title"></h1>

    <!-- Subtitel — vertaald via home.hero.subtitle -->
    <p data-i18n="home.hero.subtitle"></p>

    <!-- Knoppen: start, lees meer, bekijk demo -->
    <div class="hero-actions">

        <!-- Primaire CTA — vertaald via home.hero.ctaStart -->
        <a href="/MyFamTreeCollab/home/create.html" class="btn-primary"
           data-i18n="home.hero.ctaStart"></a>

        <!-- Secundaire CTA — vertaald via home.hero.ctaMore -->
        <a href="/MyFamTreeCollab/home/about.html" class="btn-secondary"
           data-i18n="home.hero.ctaMore"></a>

        <!-- Demo knop — vertaald via home.hero.ctaDemo -->
        <button id="btnDemo" class="btn-demo"
                data-i18n="home.hero.ctaDemo"></button>

    </div>

    <!-- Demo uitlegblok — vertaald via home.demo.* -->
    <div class="benefit">
        <h3 data-i18n="home.demo.title"></h3>           <!-- "🌳 Bekijk demo" -->
        <p data-i18n="home.demo.description"></p>       <!-- Uitleg demo stamboom -->
    </div>

</section>

<!-- ======================= PROBLEEM / OPLOSSING ======================= -->
<section>

    <!-- Sectietitel — vertaald via home.why.title -->
    <h2 data-i18n="home.why.title"></h2>

    <!-- Probleemstelling — vertaald via home.why.problem -->
    <p data-i18n="home.why.problem"></p>

    <!-- Oplossing — vertaald via home.why.solution -->
    <p data-i18n="home.why.solution"></p>

</section>

<!-- ======================= BENEFITS ======================= -->
<section class="benefits">

    <!-- Benefit 1: privacy -->
    <div class="benefit">
        <h3 data-i18n="home.why.privacy.title"></h3>   <!-- "🔐 Jij behoudt controle" -->
        <p  data-i18n="home.why.privacy.text"></p>     <!-- Exporteer je data … -->
    </div>

    <!-- Benefit 2: samenwerken -->
    <div class="benefit">
        <h3 data-i18n="home.why.collab.title"></h3>    <!-- "🤝 Samen bouwen" -->
        <p  data-i18n="home.why.collab.text"></p>      <!-- Werk samen met familie … -->
    </div>

    <!-- Benefit 3: eenvoudig -->
    <div class="benefit">
        <h3 data-i18n="home.why.easy.title"></h3>      <!-- "⚡ Eenvoudig starten" -->
        <p  data-i18n="home.why.easy.text"></p>        <!-- Geen installatie … -->
    </div>

</section>

<!-- ======================= HOW IT WORKS ======================= -->
<section class="steps">

    <!-- Sectietitel — vertaald via home.howItWorks.title -->
    <h2 data-i18n="home.howItWorks.title"></h2>

    <ol>
        <li data-i18n="home.howItWorks.step1"></li>    <!-- Stap 1 -->
        <li data-i18n="home.howItWorks.step2"></li>    <!-- Stap 2 -->
        <li data-i18n="home.howItWorks.step3"></li>    <!-- Stap 3 -->
    </ol>

</section>

<!-- ======================= STORY ======================= -->
<section>

    <!-- Sectietitel — vertaald via home.story.title -->
    <h2 data-i18n="home.story.title"></h2>

    <!-- Verhaal — vertaald via home.story.text -->
    <p data-i18n="home.story.text"></p>

</section>

<!-- ======================= CTA ======================= -->
<section class="cta">

    <!-- CTA titel — vertaald via home.cta.title -->
    <h2 data-i18n="home.cta.title"></h2>

    <!-- CTA knop — vertaald via home.cta.button -->
    <a href="/MyFamTreeCollab/home/create.html" class="btn-primary"
       data-i18n="home.cta.button"></a>

</section>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div> <!-- Wordt gevuld via fetch -->

<!-- ======================= i18next CDN (volgorde belangrijk!) ======================= -->
<!-- 1. i18next core -->
<script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
<!-- 2. HTTP back-end plugin — laadt JSON bestanden via fetch -->
<script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
<!-- 3. Language detector — leest navigator / localStorage / cookie -->
<script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
<!-- 4. Onze eigen i18n module -->
<script src="/MyFamTreeCollab/js/i18n.js"></script>

<!-- ======================= Overige scripts ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase SDK -->
<script src="js/utils.js"></script>    <!-- Utilities -->
<script src="js/schema.js"></script>   <!-- Schema -->
<script src="js/storage.js"></script>  <!-- Opslag -->
<script src="js/auth.js"></script>     <!-- Auth -->
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking -->
<script src="js/demo.js"></script>     <!-- Demo module -->

<script>
    // ======================= i18n initialiseren =======================
    // Moet als eerste — voor de fetch calls — zodat vertalingen klaar
    // zijn op het moment dat de componenten worden geïnjecteerd
    i18nModule.init().then(function() {

        // Laad de home namespace na initialisatie van common
        i18nModule.loadNamespace('home');

        // ======================= TopBar laden =======================
        fetch('/MyFamTreeCollab/Layout/TopBar.html')       // TopBar HTML ophalen
            .then(resp => resp.text())                     // Response naar tekst
            .then(function(html) {
                // Injecteren + vertalen via onComponentLoaded()
                i18nModule.onComponentLoaded(
                    html,
                    document.getElementById('topbar-placeholder')
                );
                // TopBar.js dynamisch laden na injectie
                var s = document.createElement('script'); // Script element aanmaken
                s.src = 'js/topbar.js';                   // Pad naar topbar.js
                document.body.appendChild(s);             // Aan DOM toevoegen
            });

        // ======================= Navbar laden =======================
        fetch('/MyFamTreeCollab/Layout/Navbar.html')       // Navbar HTML ophalen
            .then(resp => resp.text())                     // Response naar tekst
            .then(function(html) {
                // Injecteren + vertalen via onComponentLoaded()
                i18nModule.onComponentLoaded(
                    html,
                    document.getElementById('navbar-placeholder')
                );
            });

        // ======================= Footer laden =======================
        fetch('/MyFamTreeCollab/Layout/Footer.html')       // Footer HTML ophalen
            .then(resp => resp.text())                     // Response naar tekst
            .then(function(html) {
                // Injecteren + vertalen via onComponentLoaded()
                i18nModule.onComponentLoaded(
                    html,
                    document.getElementById('footer-placeholder')
                );
            });

        // ======================= Pagina tracking =======================
        SiteAnalytics.trackPage("home"); // Bezoek registreren in Supabase

    });

    // ======================= Demo knop =======================
    document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('btnDemo'); // Demo knop ophalen
        if (!btn) return;                             // Knop niet gevonden — stoppen

        btn.addEventListener('click', async function() {
            if (!window.DemoModule) {                                      // DemoModule niet geladen
                alert(i18nModule.t('common.errors.loadFailed'));           // Vertaalde foutmelding
                return;
            }
            btn.textContent = i18nModule.t('common.loading.data');        // "Gegevens ophalen…"
            btn.disabled = true;                                           // Knop uitschakelen
            await window.DemoModule.loadDemo(true);                        // Demo laden (force = true)
            window.location.href = '/MyFamTreeCollab/stamboom/manage.html'; // Navigeren
        });
    });
</script>
</body>
</html>
