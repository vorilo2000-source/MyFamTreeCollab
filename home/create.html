<!-- ======================= home/create.html v2.2.0 =======================
     Wijziging v2.2.0 (sessie 25):
     - i18next geïntegreerd: laadvolgorde scripts in <head> toegevoegd
     - i18nModule.init() + loadNamespace('create') toegevoegd
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded() geladen
     - Alle tekst vervangen door data-i18n="create:*" attributen
     - Placeholders via data-i18n="[placeholder]create:*"
     - Select opties vertaald via data-i18n
     - <title> dynamisch gezet via i18nModule

     Wijziging v2.1.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("create") toegevoegd in fetch-scriptblok

     Wijziging v2.0.2 (F5-04):
     - AccessGuard toegevoegd: alleen owner mag nieuwe stamboom aanmaken

     Scripts laadvolgorde: supabase → utils.js → auth.js → siteAnalytics.js →
                           i18n init → [TopBar fetch → topbar.js] → schema.js →
                           idGenerator.js → storage.js → shareModule.js →
                           accessGuard.js → create.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Zorgt voor correcte tekencodering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive gedrag -->
    <title>Nieuwe Stamboom</title> <!-- Wordt overschreven door i18n na init -->

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css"> <!-- Globale styling -->

    <!-- ======================= i18next laadvolgorde (verplicht) ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script> <!-- Centrale i18n module -->

    <style>
        .welkom-blok { margin-bottom: 24px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        .formulier-sectie {
            border: 1px solid #ddd; border-radius: 6px; padding: 24px;
            margin-bottom: 20px; background: #fafafa; max-width: 560px;
        }
        .formulier-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 6px 0; color: #333; }
        .formulier-sectie .subtitel { font-size: 0.88rem; color: #888; margin: 0 0 20px 0; }

        .veld-rij { display: flex; gap: 12px; margin-bottom: 14px; }
        .veld { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .veld label { font-size: 0.88rem; font-weight: bold; color: #444; }
        .veld input, .veld select {
            padding: 7px 9px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 0.95rem; background: #fff; width: 100%; box-sizing: border-box;
        }
        .veld input:focus, .veld select:focus { outline: none; border-color: #1E90FF; }

        .knop-opslaan {
            padding: 10px 24px; background: #1E90FF; color: #fff;
            border: none; border-radius: 5px; font-size: 0.95rem;
            font-weight: bold; cursor: pointer; margin-top: 6px;
        }
        .knop-opslaan:hover { background: #1278d4; }

        .knop-bevestigen {
            padding: 10px 24px; background: #28a745; color: #fff;
            border: none; border-radius: 5px; font-size: 0.95rem;
            font-weight: bold; cursor: pointer; margin-top: 12px;
        }
        .knop-bevestigen:hover { background: #218838; }

        .preview-sectie {
            display: none; border: 1px solid #ddd; border-radius: 6px;
            padding: 20px 24px; margin-bottom: 20px; background: #fafafa; max-width: 560px;
        }
        .preview-sectie h2 { font-size: 1.1rem; font-weight: bold; margin: 0 0 12px 0; color: #333; }
        .preview-sectie pre {
            background: #f0f0f0; border-radius: 4px; padding: 12px;
            font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap;
        }

        .waarschuwing {
            display: none; max-width: 560px; margin-bottom: 16px;
            padding: 12px 16px; background: #fff3cd; color: #856404;
            border-radius: 5px; border: 1px solid #ffeeba; font-size: 0.9rem;
        }

        .manage-link { margin-bottom: 20px; max-width: 560px; }
        .manage-link p { font-size: 0.9rem; color: #555; margin: 0 0 10px 0; }
        .knop-manage {
            display: inline-block; padding: 10px 20px; background: #4CAF50;
            color: #fff; text-decoration: none; border-radius: 5px;
            font-size: 0.95rem; font-weight: bold;
        }
        .knop-manage:hover { background: #43a047; }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<main>
    <div class="container">

        <!-- Welkomstblok -->
        <div class="welkom-blok">
            <h1 data-i18n="create:welcome.heading"></h1>
            <p data-i18n="create:welcome.intro"></p>
        </div>

        <!-- Waarschuwingsblok — tekst wordt via create.js ingevuld -->
        <div id="warningMessage" class="waarschuwing"></div>

        <!-- Formulier sectie -->
        <div class="formulier-sectie">
            <h2 data-i18n="create:form.heading"></h2>
            <p class="subtitel" data-i18n="create:form.subtitle"></p>

            <form id="persoonForm">

                <!-- Rij 1: Doopnaam + Roepnaam -->
                <div class="veld-rij">
                    <div class="veld">
                        <label for="doopnaam" data-i18n="create:form.doopnaam"></label>
                        <input type="text" id="doopnaam" name="doopnaam"
                               data-i18n="[placeholder]create:form.doopnaamPH">
                    </div>
                    <div class="veld">
                        <label for="roepnaam">
                            <span data-i18n="create:form.roepnaam"></span>
                            <span style="color:#c00;"> *</span>
                        </label>
                        <input type="text" id="roepnaam" name="roepnaam"
                               data-i18n="[placeholder]create:form.roepnaamPH">
                    </div>
                </div>

                <!-- Rij 2: Prefix + Achternaam -->
                <div class="veld-rij">
                    <div class="veld">
                        <label for="prefix" data-i18n="create:form.prefix"></label>
                        <input type="text" id="prefix" name="prefix"
                               data-i18n="[placeholder]create:form.prefixPH">
                    </div>
                    <div class="veld">
                        <label for="achternaam">
                            <span data-i18n="create:form.achternaam"></span>
                            <span style="color:#c00;"> *</span>
                        </label>
                        <input type="text" id="achternaam" name="achternaam"
                               data-i18n="[placeholder]create:form.achternaamPH">
                    </div>
                </div>

                <!-- Rij 3: Geboortedatum + Geslacht -->
                <div class="veld-rij">
                    <div class="veld">
                        <label for="geboortedatum" data-i18n="create:form.geboortedatum"></label>
                        <input type="date" id="geboortedatum" name="geboortedatum">
                    </div>
                    <div class="veld">
                        <label for="geslacht" data-i18n="create:form.geslacht"></label>
                        <select id="geslacht" name="geslacht">
                            <!-- Opties vertaald via data-i18n -->
                            <option value="" data-i18n="create:form.geslachtPH"></option>
                            <option value="M" data-i18n="create:form.man"></option>
                            <option value="V" data-i18n="create:form.vrouw"></option>
                            <option value="X" data-i18n="create:form.anders"></option>
                        </select>
                    </div>
                </div>

                <!-- Opslaan knop -->
                <button type="submit" class="knop-opslaan"
                        data-i18n="create:form.opslaan"></button>
            </form>
        </div>

        <!-- Preview sectie — zichtbaar na submit -->
        <div id="personPreview" class="preview-sectie">
            <h2 data-i18n="create:preview.heading"></h2>
            <pre id="previewContent"></pre>
            <button id="confirmBtn" class="knop-bevestigen"
                    data-i18n="create:preview.confirm"></button>
        </div>

        <!-- Link naar Manage voor bestaande stambomen -->
        <div class="manage-link">
            <p data-i18n="create:manage.intro"></p>
            <a href="../stamboom/manage.html" class="knop-manage"
               data-i18n="create:manage.button"></a>
        </div>

    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= SCRIPTS ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: na auth.js zodat tier beschikbaar is -->

<script>
    // ======================= i18n initialiseren =======================
    i18nModule.init().then(function () {

        // Laad de 'create' namespace voor deze pagina
        i18nModule.loadNamespace('create');

        // Stel paginatitel in via i18n key
        document.title = i18nModule.t('create:page.title');

        // ======================= TopBar laden =======================
        fetch('/MyFamTreeCollab/Layout/TopBar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
                var s = document.createElement('script');
                s.src = '../js/topbar.js';
                document.body.appendChild(s);
            });

        // ======================= Navbar laden =======================
        fetch('/MyFamTreeCollab/Layout/Navbar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
            });

        // ======================= Footer laden =======================
        fetch('/MyFamTreeCollab/Layout/Footer.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
            });
    });

    // Pagina tracking — buiten i18n init, blokkeert niets
    SiteAnalytics.trackPage("create"); // Bezoek registreren in Supabase page_visits tabel
</script>

<script src="../js/schema.js"></script>
<script src="../js/idGenerator.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/shareModule.js"></script>     <!-- Vereist door accessGuard.js -->
<script src="../js/accessGuard.js"></script>     <!-- Rolcheck: alleen owner -->
<script src="../js/create.js"></script>

<script>
    /* Rolcheck: create.html is alleen voor owner.
       Viewer en Editor krijgen een foutblok te zien. */
    document.addEventListener('DOMContentLoaded', function () {
        window.AccessGuard.check([]); // Lege array: alleen owner wordt doorgelaten
    });
</script>

</body>
</html>
