<!-- ======================= home/about.html v2.3.0 =======================
     Wijziging v2.3.0 (sessie 25):
     - i18next geïntegreerd: laadvolgorde scripts in <head> toegevoegd
     - i18nModule.init() + loadNamespace('about') toegevoegd
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded() geladen
     - Alle tekst vervangen door data-i18n="about:*" attributen
     - <title> dynamisch gezet via i18nModule

     Wijziging v2.2.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("about") toegevoegd in fetch-scriptblok
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8"> <!-- Zorgt voor correcte tekencodering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive gedrag -->
    <title>Over</title> <!-- Wordt overschreven door i18n na init -->

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css"> <!-- Globale styling -->

    <!-- ======================= i18next laadvolgorde (verplicht) ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script> <!-- Centrale i18n module -->

    <style>

    /* ── Tijdelijk: ruimte voor sticky TopBar + Navbar ──
           Verwijderen zodra style.css v1.0.7 live is         */
        main {
            padding-top: 150px; /* 35px topbar + ~56px navbar + 9px marge */
        }
         
        /* ======================= ABOUT CONTENT ======================= */
        .about-container {
            max-width: 800px; /* Beperkt breedte voor leesbaarheid */
            margin: 0 auto; /* Centreert content */
            padding: 48px 24px; /* Binnenruimte */
            line-height: 1.7; /* Betere leesbaarheid */
        }

        .about-container h1 {
            font-size: 1.8rem; /* Titelgrootte */
            margin-bottom: 24px; /* Ruimte onder titel */
        }

        .about-container h2 {
            font-size: 1.2rem; /* Subtitels */
            margin-top: 32px; /* Ruimte boven secties */
            margin-bottom: 12px;
        }

        .about-container p {
            margin-bottom: 16px; /* Ruimte tussen paragrafen */
            color: #444; /* Iets zachtere tekstkleur */
        }

        .highlight {
            font-weight: bold; /* Benadrukking */
            color: #222;
        }

        .knop-home {
            display: inline-block;
            margin-top: 32px; /* Afstand boven knop */
            padding: 10px 24px;
            background: #1E90FF;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .knop-home:hover {
            background: #1278d4; /* Hover effect */
        }
    </style>
</head>
<body>

<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="about-container">

        <!-- Paginatitel -->
        <h1 data-i18n="about:hero.heading"></h1>

        <!-- Intro paragraaf -->
        <p data-i18n="about:hero.intro"></p>

        <!-- Sectie: Hoe het begon -->
        <h2 data-i18n="about:sections.origin.heading"></h2>
        <p data-i18n="about:sections.origin.p1"></p>
        <p><span class="highlight" data-i18n="about:sections.origin.p2"></span></p>

        <!-- Sectie: Waarom deze website -->
        <h2 data-i18n="about:sections.why.heading"></h2>
        <p data-i18n="about:sections.why.p1"></p>
        <p><span class="highlight" data-i18n="about:sections.why.p2"></span></p>

        <!-- Sectie: Hoe het werkt -->
        <h2 data-i18n="about:sections.how.heading"></h2>
        <p data-i18n="about:sections.how.p1"></p>
        <p data-i18n="about:sections.how.p2"></p>

        <!-- Sectie: Lokaal of samen -->
        <h2 data-i18n="about:sections.local.heading"></h2>
        <p data-i18n="about:sections.local.p1"></p>
        <p data-i18n="about:sections.local.p2"></p>

        <!-- Sectie: Toekomst -->
        <h2 data-i18n="about:sections.future.heading"></h2>
        <p data-i18n="about:sections.future.p1"></p>
        <p data-i18n="about:sections.future.p2"></p>

        <!-- Sectie: Waarom beginnen -->
        <h2 data-i18n="about:sections.why2.heading"></h2>
        <p data-i18n="about:sections.why2.p1"></p>
        <p><span class="highlight" data-i18n="about:sections.why2.p2"></span></p>

        <!-- Knop terug naar home -->
        <a href="/MyFamTreeCollab/" class="knop-home" data-i18n="about:buttons.backHome"></a>

    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= SCRIPTS ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase SDK -->
<script src="../js/utils.js"></script> <!-- Basis utilities -->
<script src="../js/auth.js"></script> <!-- Authenticatie -->
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: na auth.js zodat tier beschikbaar is -->

<script>
    // ======================= i18n initialiseren =======================
    i18nModule.init().then(function () {

        // Laad de 'about' namespace voor deze pagina
        i18nModule.loadNamespace('about');

        // Stel paginatitel in via i18n key
        document.title = i18nModule.t('about:page.title');

        // ======================= TopBar laden =======================
        fetch('/MyFamTreeCollab/Layout/TopBar.html')
            .then(r => r.text())
            .then(function (html) {
                // onComponentLoaded injecteert HTML én vertaalt data-i18n attributen erin
                i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
                // Laad topbar.js nadat TopBar HTML in DOM zit
                var s = document.createElement('script');
                s.src = '../js/topbar.js';
                document.body.appendChild(s);
            });

        // ======================= Navbar laden =======================
        fetch('/MyFamTreeCollab/Layout/Navbar.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
            });

        // ======================= Footer laden =======================
        fetch('/MyFamTreeCollab/Layout/Footer.html')
            .then(r => r.text())
            .then(function (html) {
                i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
            });
    });

    // Pagina tracking — buiten i18n init, blokkeert niets
    SiteAnalytics.trackPage("about"); // Bezoek registreren in Supabase page_visits tabel
</script>

</body>
</html>
