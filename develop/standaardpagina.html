<!-- ======================= Admin/standaardpagina.html v1.1.0 ======================= 
    consistente opmaak — Navbar + TopBar + 'komt binnenkort' blok, geen aparte header meer, 
    script.js verwijderd. Login + Favicon / App-icoon toegevoegd
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standaardpagina</title>
        
    <!-- ===== Favicon / App-icoon ===== -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/favicon-192x192.png">

    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* ======================= BINNENKORT BLOK ======================= */
        .binnenkort-blok {                                                 /* Centraal informatieblok */
            max-width: 520px;                                              /* Niet te breed */
            margin: 0 auto;                                                /* Horizontaal centreren */
            text-align: center;                                            /* Tekst centreren */
            padding: 48px 24px;                                            /* Ruimte rondom de inhoud */
        }
        .binnenkort-blok .icoon { font-size: 3rem; margin-bottom: 16px; } /* Groot icoon boven de tekst */
        .binnenkort-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 12px 0; color: #222; }
        .binnenkort-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0 0 24px 0; }
        .knop-home {                                                       /* Knop terug naar home */
            display: inline-block; padding: 10px 24px;
            background: #1E90FF; color: #fff; text-decoration: none;
            border-radius: 5px; font-size: 0.95rem; font-weight: bold;
        }
        .knop-home:hover { background: #1278d4; }
    </style>
</head>
<body>

<!-- ======================= source view enablement  ======================= -->
     <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
     <script>eruda.init();</script>
     
<!-- ======================= TopBar ======================= -->
<div id="topbar-placeholder"></div>
     
<!-- Scripts: Supabase + auth ALTIJD vóór topbar.js -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
     
<script>
fetch('/MyFamTreeCollab/Layout/TopBar.html')
    .then(resp => resp.text())
    .then(data => document.getElementById('topbar-placeholder').innerHTML = data);
</script>

<!-- ======================= Navbar ======================= -->
<div id="Navbar-placeholder"></div>
<script>
fetch('/MyFamTreeCollab/Layout/Navbar.html')
    .then(resp => resp.text())
    .then(data => {
        const placeholder = document.getElementById('Navbar-placeholder');
        if (placeholder) placeholder.innerHTML = data;
    });
</script>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="binnenkort-blok">
        <div class="icoon">🖼️</div>                                        <!-- Printer icoon passend bij afdrukfunctie -->
        <h1>Standaar Pagina</h1>
        <p>
            De standaard pagina is een weergave van een standaard pagina opmaak.<br>
        </p>
        <a href="/MyFamTreeCollab/" class="knop-home">Terug naar Home</a>
    </div>
</main>

<!-- ======================= Footer ======================= -->
<div id="footer-placeholder"></div>

<!-- =============================================================
     SCRIPTS — volgorde is verplicht:
     1. Supabase SDK        — vereist door auth.js
     2. utils.js            — vereist door alle andere modules
     3. auth.js             — vereist door topbar.js
     4. TopBar fetch        — laadt TopBar HTML, daarna topbar.js
     5. Navbar fetch        — onafhankelijk, mag parallel
     6. Pagina-scripts      — altijd als laatste
     ============================================================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>

<script>
    // Stap 1: TopBar HTML laden, daarna PAS topbar.js injecteren
    // Dit garandeert dat #top-auth in de DOM zit vóór topbar.js initialiseert
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('topbar-placeholder').innerHTML = data;
            // #top-auth bestaat nu — veilig om topbar.js te laden
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });

    // Stap 2: Navbar laden — geen auth-afhankelijkheid, mag parallel
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('navbar-placeholder').innerHTML = data;
        });

    // Stap 3: Footer laden
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(resp => resp.text())
        .then(function(data) {
            document.getElementById('footer-placeholder').innerHTML = data;
        });
</script>

<!-- Pagina-specifieke scripts: ... → ... → -->

</body>
</html>
