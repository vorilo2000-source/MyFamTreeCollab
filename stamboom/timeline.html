<!-- ======================= stamboom/timeline.html v2.4.1 =======================
     Tijdlijnpagina: visualiseert personen op een horizontale tijdas via HTML5 Canvas

     Wijziging v2.4.0 (sessie 26):
     - i18n geïntegreerd: data-i18n attributen op alle statische teksten
     - i18next scripts + i18n.js toegevoegd aan <head>
     - TopBar/Navbar/Footer via i18nModule.onComponentLoaded()
     - Placeholder, search placeholder via i18nModule.t() in timeline.js
     - 2.4.1 Laadvolgorde en colorhelper.js scripts

     Wijziging v2.3.0 (sessie 20):
     - siteAnalytics.js toegevoegd aan laadvolgorde (na auth.js)
     - SiteAnalytics.trackPage("timeline") toegevoegd in fetch-scriptblok

     Wijziging v2.2.0: sticky generatiekolom
     Wijziging v2.1.0: canvas-rendering, tooltip-overlay
     Scripts: utils.js → schema.js → storage.js → LiveSearch.js → relatieEngine.js → timeline.js
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="timeline:page.title">Tijdlijn</title>

    <!-- ======================= Favicon ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">

    <!-- ======================= i18next bibliotheken ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
    <script src="/MyFamTreeCollab/js/i18n.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/timeline.css">

    <style>

             /* ── Tijdelijk: ruimte voor sticky TopBar + Navbar ──
           Verwijderen zodra style.css v1.0.7 live is         */
        main {
            padding-top: 150px; /* 35px topbar + ~56px navbar + 9px marge */
        }
         
        /* ======================= WELKOMSTBLOK ======================= */
        .welkom-blok { margin-bottom: 20px; }
        .welkom-blok h1 { font-size: 1.4rem; font-weight: bold; margin: 0 0 8px 0; color: #222; }
        .welkom-blok p  { font-size: 0.95rem; color: #555; line-height: 1.6; margin: 0; }

        /* ======================= ZOEKBALK ======================= */
        .zoek-sectie { margin-bottom: 20px; }
        #sandboxSearch {
            width: 50%;
            padding: 9px 12px;
            font-size: 1rem;
            border: 1px solid #bbb;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #sandboxSearch:focus { outline: none; border-color: #1E90FF; }

        /* ======================= TIJDLIJN BUITENSTE WRAPPER ======================= */
        #timelineContainer {
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            overflow-x: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            min-height: 120px;
        }

        /* ======================= STICKY GENERATIEKOLOM ======================= */
        #tlStickyCol {
            position: sticky;
            left: 0;
            width: 155px;
            flex-shrink: 0;
            background: rgba(248,248,248,0.97);
            border-right: 1px solid #e0e0e0;
            z-index: 20;
            font-family: sans-serif;
            font-size: 10px;
            color: #666;
            overflow: hidden;
            pointer-events: none;
        }

        /* ======================= SCROLL GEBIED (canvas) ======================= */
        #tlScrollArea {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        /* ======================= CANVAS ======================= */
        #timelineCanvas { display: block; cursor: default; }

        /* ======================= PLACEHOLDER TEKST ======================= */
        #timelinePlaceholder {
            padding: 40px 20px;
            text-align: center;
            color: #999;
            font-size: 0.95rem;
        }

        /* ======================= TOOLTIP ======================= */
        #timelineTooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(30, 30, 30, 0.92);
            color: #fff;
            font-size: 0.82rem;
            line-height: 1.5;
            padding: 8px 12px;
            border-radius: 5px;
            white-space: pre-line;
            max-width: 240px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<!-- ======================= TopBar placeholder ======================= -->
<div id="topbar-placeholder"></div>

<!-- ======================= Navbar placeholder ======================= -->
<div id="navbar-placeholder"></div>

<!-- ======================= Hoofd content ======================= -->
<main>
    <div class="container">

        <!-- Welkomstblok — vertaald via data-i18n -->
        <div class="welkom-blok">
            <h1 data-i18n="timeline:welcome.heading">Welkom bij je stamboom Tijdlijn</h1>
            <p data-i18n="timeline:welcome.intro">
                Zoek een persoon op om de tijdlijn van zijn of haar familie te bekijken.
                Elke persoon wordt weergegeven als een horizontale balk van geboorte tot overlijden,
                gegroepeerd per generatie.
            </p>
        </div>

        <!-- Zoekbalk — placeholder via JS na i18n init -->
        <div class="zoek-sectie">
            <input type="text" id="sandboxSearch"
                   data-i18n-placeholder="timeline:search.placeholder"
                   placeholder="Zoek op naam, ID of geboortedatum...">
        </div>

        <!-- Tijdlijn container -->
        <div id="timelineContainer">

            <!-- Sticky generatiekolom: timeline.js vult deze via updateGenLabels() -->
            <div id="tlStickyCol"></div>

            <!-- Scrollgebied: bevat canvas en tooltip -->
            <div id="tlScrollArea">

                <!-- Placeholder — tekst via JS gezet na i18n init -->
                <div id="timelinePlaceholder"></div>

                <!-- Canvas: timeline.js tekent hier de balkjes en tijdas -->
                <canvas id="timelineCanvas" style="display: none;"></canvas>

                <!-- Tooltip: wordt door timeline.js gepositioneerd op hover -->
                <div id="timelineTooltip"></div>

            </div>
        </div>

    </div>
</main>

<!-- ======================= Footer placeholder ======================= -->
<div id="footer-placeholder"></div>

<!-- ======================= Externe scripts ======================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/utils.js"></script>
<script src="../js/colorHelper.js"></script>  <!-- nieuw -->
<script src="../js/schema.js"></script>
<script src="../js/auth.js"></script>
<script src="/MyFamTreeCollab/js/siteAnalytics.js"></script> <!-- Bezoektracking: na auth.js -->

<!-- ======================= Pagina-scripts (volgorde verplicht) ======================= -->
<script src="../js/storage.js"></script>
<script src="../js/LiveSearch.js"></script>
<script src="../js/relatieEngine.js"></script>
<script src="../js/timeline.js"></script>

<script>
// ======================= i18n initialisatie + component fetch =======================
i18nModule.init()
    .then(function () { return i18nModule.loadNamespace('timeline'); })
    .then(function () {

    // Paginatitel vertalen
    document.title = i18nModule.t('timeline:page.title');

    // Placeholder vertalen (data-i18n-placeholder)
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-placeholder');
        if (key) el.placeholder = i18nModule.t(key); // Vertaald placeholder
    });

    // Standaard placeholder-tekst instellen — timeline.js overschrijft dit bij selectie
    var ph = document.getElementById('timelinePlaceholder');
    if (ph) ph.textContent = i18nModule.t('timeline:placeholder.default');

    // Laad TopBar en activeer i18n + topbar.js
    fetch('/MyFamTreeCollab/Layout/TopBar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('topbar-placeholder'));
            var s = document.createElement('script');
            s.src = '../js/topbar.js';
            document.body.appendChild(s);
        });

    // Laad Navbar en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Navbar.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('navbar-placeholder'));
        });

    // Laad Footer en activeer i18n
    fetch('/MyFamTreeCollab/Layout/Footer.html')
        .then(function (r) { return r.text(); })
        .then(function (html) {
            i18nModule.onComponentLoaded(html, document.getElementById('footer-placeholder'));
        });

    // Pagina tracking
    SiteAnalytics.trackPage('timeline'); // Bezoek registreren in Supabase page_visits tabel

});
</script>

</body>
</html>
