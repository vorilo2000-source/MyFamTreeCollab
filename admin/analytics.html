<!-- ======================= admin/analytics.html v2.9.0 =======================
     Wijziging v2.9.0:
     - padding-top: 100px toegevoegd aan main — ruimte voor sticky TopBar + Navbar
     - Volledige inline commentaar toegevoegd op elke coderegel

     Wijziging v2.8.0 (sessie 33):
     - AdminGuard.protect('admin') toegevoegd — niet-admins zien foutscherm
     - AuthModule.onAuthChange uitlog-redirect via adminGuard.js
     - #page-content wrapper toegevoegd rond dashboard inhoud
     - #accessDenied blok toegevoegd (standaard display:none)
     - adminGuard.js toegevoegd aan laadvolgorde (na auth.js)
     Wijziging v2.7.0:
     - CSS toegevoegd voor uitklapbare e-maillijst per tier in tier verdeling
     ======================================================================= -->
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">                                                  <!-- Tekencodering instellen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive weergave -->
    <title>Analytics Dashboard — MyFamTreeCollab</title>                   <!-- Paginatitel -->

    <!-- ======================= FAVICON ======================= -->
    <link rel="icon" type="image/x-icon" href="/MyFamTreeCollab/img/favicon.ico">                         <!-- Standaard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/MyFamTreeCollab/img/favicon-32x32.png">        <!-- PNG favicon 32px -->
    <link rel="apple-touch-icon" sizes="180x180" href="/MyFamTreeCollab/img/apple-touch-icon.png">        <!-- iOS homescreen icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/MyFamTreeCollab/img/favicon-192x192.png">    <!-- Android homescreen icon -->

    <!-- ======================= GLOBALE CSS ======================= -->
    <link rel="stylesheet" href="../css/style.css">                         <!-- Globale stijlen inclusief sticky header -->

    <!-- ======================= GOOGLE FONTS ======================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">            <!-- Preconnect voor snellere fontlading -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"> <!-- IBM Plex fonts laden -->

    <!-- ======================= PAGINA-SPECIFIEKE STIJLEN ======================= -->
    <style>

        /* ── CSS variabelen: kleurenpalet en typografie voor het dashboard ── */
        :root {
            --bg-main:      #565656;                /* Hoofdachtergrond dashboard */
            --bg-card:      #3a3a3a;                /* Kaart achtergrond */
            --bg-card-alt:  #444444;                /* Alternatieve kaart achtergrond */
            --accent:       #00d4aa;                /* Accentkleur groen */
            --accent-dim:   rgba(0, 212, 170, 0.15);/* Transparante accentkleur */
            --text-primary: #f0f0f0;                /* Primaire tekstkleur */
            --text-muted:   #aaa;                   /* Gedempte tekstkleur */
            --border:       rgba(255,255,255,0.08); /* Subtiele randkleur */
            --font-mono:    'IBM Plex Mono', monospace; /* Monospace font */
            --font-sans:    'IBM Plex Sans', sans-serif;/* Sans-serif font */
            --radius:       8px;                    /* Standaard border-radius */
            --shadow:       0 4px 20px rgba(0,0,0,0.35); /* Standaard schaduw */
            --color-danger: #f08080;                /* Rood voor foutmeldingen */
        }

        /* ── Main container: donkere dashboardachtergrond ── */
        main {
            background-color: var(--bg-main);       /* Donkere achtergrond via CSS variabele */
            min-height: 100vh;                      /* Minimaal volledige viewporthoogte */
            padding: 100px 20px 64px;               /* top: 100px (35px topbar + ~56px navbar + 9px marge), zijkanten 20px, onder 64px */
            font-family: var(--font-sans);          /* Sans-serif font via CSS variabele */
        }

        /* ── Toegang geweigerd blok: zichtbaar voor niet-admins ── */
        .access-denied {
            background: var(--bg-card);             /* Kaartachtergrond */
            border: 1px solid var(--color-danger);  /* Rode rand */
            border-radius: 8px;                     /* Afgeronde hoeken */
            padding: 32px;                          /* Interne marge */
            text-align: center;                     /* Gecentreerde tekst */
            max-width: 480px;                       /* Maximale breedte */
            margin: 60px auto;                      /* Horizontaal gecentreerd met ruimte boven */
        }
        .access-denied h2 { font-size: 1.2rem; color: var(--color-danger); margin-bottom: 10px; font-family: var(--font-sans); } /* Foutmelding titel */
        .access-denied p  { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }                                      /* Foutmelding tekst */

        /* ── Verbergen tot auth-check klaar is ── */
        #accessDenied { display: none; }            /* Standaard verborgen — adminGuard.js maakt zichtbaar bij geen toegang */
        #page-content  { display: none; }           /* Standaard verborgen — adminGuard.js maakt zichtbaar bij toegang */

        /* ── Dashboard wrapper: maximale breedte en centrering ── */
        .dash-wrap { max-width: 1100px; margin: 0 auto; }                  /* Gecentreerde container */

        /* ── Dashboard header: titel + knoppen ── */
        .dash-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px; } /* Flex header met scheiding */
        .dash-header h1 { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 600; color: var(--accent); margin: 0; letter-spacing: -0.5px; } /* Monospace titel in accentkleur */
        .dash-header h1 span { color: var(--text-muted); font-weight: 400; }                                                                              /* Gedempte subtitel */

        /* ── Refresh knop ── */
        .btn-refresh { font-family: var(--font-mono); font-size: 0.8rem; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius); padding: 6px 14px; cursor: pointer; transition: background 0.2s; } /* Groene refresh knop */
        .btn-refresh:hover { background: rgba(0,212,170,0.28); }           /* Iets lichter bij hover */

        /* ── Wis data knop ── */
        .btn-clear { font-family: var(--font-mono); font-size: 0.8rem; background: rgba(255,80,80,0.12); color: #ff6b6b; border: 1px solid #ff6b6b; border-radius: var(--radius); padding: 6px 14px; cursor: pointer; transition: background 0.2s; margin-left: 8px; } /* Rode wis-knop */
        .btn-clear:hover { background: rgba(255,80,80,0.25); }             /* Iets lichter bij hover */

        /* ── Statistieken grid: auto-fit kaarten ── */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; } /* Responsief grid */

        /* ── Statistiek kaart ── */
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 20px 16px; box-shadow: var(--shadow); position: relative; overflow: hidden; animation: fadeUp 0.4s ease both; } /* Kaart met schaduw en animatie */
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); } /* Groene bovenlijn */
        .stat-card .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; font-family: var(--font-sans); } /* Gedempte label */
        .stat-card .value { font-family: var(--font-mono); font-size: 2rem; font-weight: 600; color: var(--text-primary); line-height: 1; }                                    /* Grote monospace waarde */
        .stat-card .unit  { font-size: 0.8rem; color: var(--text-muted); margin-left: 4px; font-family: var(--font-sans); }                                                    /* Eenheid naast waarde */

        /* ── Sectietitel ── */
        .section-title { font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin: 0 0 12px 0; }      /* Kleine monospace koptekst */

        /* ── Twee-koloms grid voor panelen ── */
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }    /* Twee gelijke kolommen */
        @media (max-width: 700px) { .bottom-grid { grid-template-columns: 1fr; } }                         /* Één kolom op mobiel */

        /* ── Paneel kaart ── */
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); animation: fadeUp 0.4s ease both; } /* Donkere kaart */

        /* ── Event rij in grafiek ── */
        .event-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }                  /* Horizontale flex rij */
        .event-row:last-child { margin-bottom: 0; }                                                         /* Geen marge op laatste rij */
        .event-label { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-primary); min-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* Afgekapte label */
        .event-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px; height: 8px; overflow: hidden; }  /* Balk achtergrond */
        .event-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); width: 0%; }                               /* Geanimeerde balk */
        .event-count { font-family: var(--font-mono); font-size: 0.78rem; color: var(--accent); min-width: 28px; text-align: right; }                                           /* Teller rechts */

        /* ── Device pills ── */
        .device-grid { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }                        /* Flex rij voor pills */
        .device-pill { background: var(--bg-card-alt); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-primary); display: flex; align-items: center; gap: 6px; } /* Afgeronde pill */

        /* ── Leeg bericht ── */
        .empty-msg { font-family: var(--font-mono); font-size: 0.82rem; color: var(--text-muted); text-align: center; padding: 24px 0; letter-spacing: 0.5px; }                /* Gecentreerde lege status */

        /* ── Sessies tabel paneel ── */
        .sessions-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 28px; animation: fadeUp 0.4s ease both; overflow-x: auto; overflow-y: auto; max-height: 480px; } /* Scrollbaar paneel */

        /* ── Tabel stijlen ── */
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--font-mono); font-size: 0.78rem; }                                                 /* Volledige breedte tabel */
        thead th { position: sticky; top: 0; z-index: 1; background: #1a7a4a; text-align: left; color: #ffffff; padding: 10px 12px 10px 10px; border-bottom: 2px solid #0f5c35; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.68rem; } /* Sticky groene header */
        tbody td { padding: 9px 12px 9px 10px; color: #1a1a1a; background: #c8c8c8; border-bottom: 1px solid #aaaaaa; vertical-align: middle; }                                 /* Lichtgrijze rijen */
        tbody tr:last-child td { border-bottom: none; }                                                     /* Geen rand op laatste rij */
        tbody tr:hover td { background: #d8d8d8; }                                                          /* Iets lichter bij hover */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; background: var(--accent-dim); color: var(--accent); }      /* Groene badge */

        /* ── Filter balk ── */
        .filter-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 24px; } /* Flex filterbalk */
        .filter-label { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); white-space: nowrap; }    /* Gedempte filterlabel */

        /* ── Tier filter knoppen ── */
        .tier-filter { display: flex; flex-wrap: wrap; gap: 8px; }                                          /* Flex rij voor tier knoppen */
        .tier-btn { font-family: var(--font-mono); font-size: 0.75rem; padding: 5px 14px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; font-weight: 600; transition: opacity 0.15s, transform 0.1s; opacity: 0.45; } /* Pill knop */
        .tier-btn:hover  { opacity: 0.75; transform: translateY(-1px); }                                    /* Iets zichtbaarder bij hover */
        .tier-btn.active { opacity: 1;    transform: translateY(-1px); }                                    /* Volledig zichtbaar als actief */
        .tier-btn[data-tier="all"]      { background: #555;    color: #fff;    border-color: #777;    }    /* Grijs — alle tiers */
        .tier-btn[data-tier="anoniem"]  { background: #2a2a2a; color: #888888; border-color: #888888; }    /* Donker — niet ingelogd */
        .tier-btn[data-tier="guest"]    { background: #3a3a4a; color: #aaaacc; border-color: #aaaacc; }    /* Blauwgrijs — guest */
        .tier-btn[data-tier="owner"]    { background: #3a2e0a; color: #f0c040; border-color: #f0c040; }    /* Goud — owner */
        .tier-btn[data-tier="admin"]    { background: #3a1a1a; color: #f08080; border-color: #f08080; }    /* Rood — admin */

        /* ── Tier verdeling rijen: uitklapbaar ── */
        .tier-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; cursor: pointer; user-select: none; } /* Klikbare flex rij */
        .tier-row:hover { opacity: 0.85; }                                                                  /* Iets transparanter bij hover */
        .tier-toggle { font-size: 0.8rem; margin-left: 6px; transition: transform 0.2s; }                  /* Roterende pijl */
        .tier-email-list { display: none; margin: 0 0 12px 8px; border-left: 2px solid rgba(255,255,255,0.08); padding-left: 12px; } /* Verborgen e-maillijst */
        .tier-email-list.open { display: block; }                                                           /* Zichtbaar als open klasse aanwezig */
        .tier-email { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-primary); padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); } /* E-mailadres stijl */
        .tier-email:last-child { border-bottom: none; }                                                     /* Geen rand op laatste e-mail */
        .tier-email-leeg { color: rgba(255,255,255,0.2); font-style: italic; }                              /* Gedempte lege state */

        /* ── Dashboard footer: tijdstempel ── */
        .dash-footer { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-align: right; margin-top: 8px; } /* Rechts uitgelijnde footer */

        /* ── Fade-up animatie voor kaarten ── */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } } /* Omhoog verschijnen */
        .stat-card:nth-child(1) { animation-delay: 0.05s; }               /* Vertraging kaart 1 */
        .stat-card:nth-child(2) { animation-delay: 0.10s; }               /* Vertraging kaart 2 */
        .stat-card:nth-child(3) { animation-delay: 0.15s; }               /* Vertraging kaart 3 */
        .stat-card:nth-child(4) { animation-delay: 0.20s; }               /* Vertraging kaart 4 */
        .panel:nth-child(1)     { animation-delay: 0.25s; }               /* Vertraging paneel 1 */
        .panel:nth-child(2)     { animation-delay: 0.30s; }               /* Vertraging paneel 2 */

    </style>
</head>
<body>

    <!-- ======================= ERUDA DEBUGGER (dev only) ======================= -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>             <!-- Mobiele devtools bibliotheek -->
    <script>eruda.init();</script>                                         <!-- Eruda activeren -->

    <!-- ======================= TOPBAR ======================= -->
    <div id="topbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch -->

    <!-- ======================= NAVBAR ======================= -->
    <div id="navbar-placeholder"></div>                                     <!-- Wordt gevuld via fetch -->

    <!-- ======================= PAGINA-INHOUD ======================= -->
    <main>
        <div class="dash-wrap">                                             <!-- Gecentreerde dashboardcontainer -->

            <!-- ── TOEGANG GEWEIGERD ── Zichtbaar voor niet-admins via adminGuard.js ── -->
            <div id="accessDenied" class="access-denied">                  <!-- Standaard verborgen -->
                <h2>Geen toegang</h2>                                      <!-- Foutmelding titel -->
                <p>Deze pagina is alleen toegankelijk voor administrators.<br>
                   Log in met een admin-account om verder te gaan.</p>     <!-- Foutmelding tekst -->
            </div>

            <!-- ── DASHBOARD INHOUD ── Zichtbaar na geslaagde admin-check ── -->
            <div id="page-content">                                        <!-- Standaard verborgen — adminGuard.js maakt zichtbaar -->

                <!-- Dashboard header: titel + actieknoppen -->
                <div class="dash-header">
                    <h1>Analytics <span>Dashboard</span></h1>             <!-- Paginatitel -->
                    <div>
                        <button class="btn-refresh" id="btn-refresh">&#8635; Vernieuwen</button> <!-- Data vernieuwen -->
                        <button class="btn-clear"   id="btn-clear">&#x2715; Data wissen</button> <!-- Alle data wissen -->
                    </div>
                </div>

                <!-- Filter balk: tier selectie -->
                <div class="filter-bar">
                    <span class="filter-label">Filter op account</span>   <!-- Filter label -->
                    <div class="tier-filter">
                        <button class="tier-btn active" data-tier="all">Alle</button>           <!-- Alle tiers tonen -->
                        <button class="tier-btn" data-tier="anoniem">Niet ingelogd</button>     <!-- Anonieme bezoekers -->
                        <button class="tier-btn" data-tier="guest">Guest</button>               <!-- Guest accounts -->
                        <button class="tier-btn" data-tier="owner">Owner</button>               <!-- Owner accounts -->
                        <button class="tier-btn" data-tier="admin">Admin</button>               <!-- Admin accounts -->
                    </div>
                </div>

                <!-- Statistieken grid — gevuld door analytics-dashboard.js -->
                <div class="stat-grid" id="stat-grid"></div>              <!-- Dynamische statistiekkaarten -->

                <!-- Twee-koloms panelen -->
                <div class="bottom-grid">
                    <div class="panel" id="panel-events">
                        <p class="section-title">Pagina bezoeken</p>      <!-- Sectietitel -->
                        <div id="events-chart"></div>                      <!-- Balkgrafiek — gevuld door analytics-dashboard.js -->
                    </div>
                    <div class="panel" id="panel-pages">
                        <p class="section-title">Tier verdeling</p>       <!-- Sectietitel -->
                        <div id="pages-chart" style="margin-bottom:20px;"></div> <!-- Tierverdeling — gevuld door analytics-dashboard.js -->
                        <p class="section-title">Sessies</p>              <!-- Sectietitel -->
                        <div class="device-grid" id="device-grid"></div>  <!-- Device pills — gevuld door analytics-dashboard.js -->
                    </div>
                </div>

                <!-- Recente bezoeken tabel -->
                <div class="sessions-panel">
                    <p class="section-title">Recente bezoeken</p>         <!-- Sectietitel -->
                    <div id="sessions-table"></div>                        <!-- Tabel — gevuld door analytics-dashboard.js -->
                </div>

                <!-- Dashboard footer: laatste update tijdstempel -->
                <div class="dash-footer" id="dash-footer"></div>          <!-- Gevuld door analytics-dashboard.js -->

            </div><!-- /page-content -->

        </div>
    </main>

    <!-- ======================= FOOTER ======================= -->
    <div id="footer-placeholder"></div>                                     <!-- Wordt gevuld via fetch -->

    <!-- =============================================================
         SCRIPTS — verplichte volgorde:
         supabase → utils.js → auth.js → adminGuard.js → siteAnalytics.js
         → TopBar fetch → topbar.js → admin-check → analytics-dashboard.js
         ============================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <!-- Supabase SDK -->
    <script src="../js/utils.js"></script>                                  <!-- Utilities -->
    <script src="../js/auth.js"></script>                                   <!-- Authenticatie module -->
    <script src="/MyFamTreeCollab/js/adminGuard.js"></script>               <!-- Admin toegangsbeveiliging -->
    <script src="/MyFamTreeCollab/js/siteAnalytics.js"></script>            <!-- Bezoektracking -->

    <!-- ======================= INITIALISATIE ======================= -->
    <script>

        // ── TopBar laden → topbar.js → admin-check → analytics-dashboard.js ──
        fetch('/MyFamTreeCollab/Layout/TopBar.html')                       // TopBar HTML ophalen
            .then(function(r) { return r.text(); })                        // Response naar tekst converteren
            .then(function(html) {
                document.getElementById('topbar-placeholder').innerHTML = html; // TopBar injecteren
                var s    = document.createElement('script');               // Script element aanmaken
                s.src    = '../js/topbar.js';                              // Pad naar topbar.js
                s.onload = function() {
                    AdminGuard.protect('admin').then(function(granted) {   // Admin-check uitvoeren
                        if (!granted) return;                              // Stoppen als geen toegang
                        var p = document.createElement('script');          // Analytics script element
                        p.src = 'analytics-dashboard.js';                 // Pad naar analytics-dashboard.js
                        document.body.appendChild(p);                     // Aan DOM toevoegen om laden te starten
                    });
                };
                document.body.appendChild(s);                             // topbar.js aan DOM toevoegen
            });

        // ── Navbar laden en injecteren ──
        fetch('/MyFamTreeCollab/Layout/Navbar.html')                       // Navbar HTML ophalen
            .then(function(r) { return r.text(); })                        // Response naar tekst converteren
            .then(function(html) {
                document.getElementById('navbar-placeholder').innerHTML = html; // Navbar injecteren
            });

        // ── Footer laden en injecteren ──
        fetch('/MyFamTreeCollab/Layout/Footer.html')                       // Footer HTML ophalen
            .then(function(r) { return r.text(); })                        // Response naar tekst converteren
            .then(function(html) {
                document.getElementById('footer-placeholder').innerHTML = html; // Footer injecteren
            });

    </script>

</body>
</html>
